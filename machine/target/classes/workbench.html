    if (!document.getElementById('section-provenance-debug')) {
      const prov = document.createElement('div');
      prov.className = 'sidebar-section';
      prov.id = 'section-provenance-debug';
      prov.innerHTML = `
        <h2>Seed Provenance</h2>
        <div id="provenance-area"></div>`;
      document.getElementById('sidebar').appendChild(prov);
    }
  }
  addWorkbenchAugments();

  class ManifoldSeedSource { constructor(type){ this.type = type; } getType(){ return this.type; } getDerivedFrom(){ return this.type; } toRawPoints(){ return []; } }
  class CurveSeedSource extends ManifoldSeedSource { constructor(points){ super('user_drawn_curve'); this.points = points || []; } toRawPoints(){ return this.points; } }
  class ImportedSeedSource extends ManifoldSeedSource { constructor(points){ super('imported_image_loop'); this.points = points || []; } toRawPoints(){ return this.points; } }
  class OptimizationSeedSource extends ManifoldSeedSource { constructor(){ super('optimization_seed'); } }
  class SomSeedSource extends ManifoldSeedSource { constructor(){ super('som_seed'); } }
  class DerivedSeedSource extends ManifoldSeedSource { constructor(){ super('derived_seed'); } }
  window.ManifoldSeedSource = ManifoldSeedSource;
  window.CurveSeedSource = CurveSeedSource;
  window.ImportedSeedSource = ImportedSeedSource;
  window.OptimizationSeedSource = OptimizationSeedSource;
  window.SomSeedSource = SomSeedSource;
  window.DerivedSeedSource = DerivedSeedSource;

  const oldEmpty = ProvenanceRecorder.prototype._empty;
  ProvenanceRecorder.prototype._empty = function(){
    const base = oldEmpty.call(this);
    base.sourceType = 'curve';
    base.derivedFrom = 'user_drawn_curve';
    base.transformationMetadata = {};
    return base;
  };
  ProvenanceRecorder.prototype.recordSource = function(sourceType, derivedFrom){ this._record.sourceType = sourceType; this._record.derivedFrom = derivedFrom; };
  ProvenanceRecorder.prototype.recordTransformationMetadata = function(meta){ this._record.transformationMetadata = Object.assign({}, this._record.transformationMetadata || {}, meta || {}); };

  const oldCompile = SeedCompiler.prototype.compile;
  SeedCompiler.prototype.compile = function(provenance){
    const seed = oldCompile.call(this, provenance);
    seed.sourceType = provenance.sourceType || 'curve';
    seed.derivedFrom = provenance.derivedFrom || seed.derivedFrom || 'user_drawn_curve';
    seed.transformationMetadata = provenance.transformationMetadata || {};
    return seed;
  };

  DistanceSurface.prototype._buildFlowField = function(sampledPoints){
    const pts = sampledPoints || [];
    if (!pts.length) {
      this._flowField = { samples: [], sigma: 1, gradientAt(){ return {x:0,y:0,z:0}; } };
      return;
    }
    const n = pts.length;
    const stride = Math.max(1, Math.floor(n / 48));
    const indices = [];
    for (let i = 0; i < n; i += stride) indices.push(i);
    if (indices[indices.length - 1] !== n - 1) indices.push(n - 1);
    const samples = [];
    let maxD = 1;
    for (let a = 0; a < indices.length; a++) {
      for (let b = a + 1; b < indices.length; b++) {
        const pa = pts[indices[a]], pb = pts[indices[b]];
        const d = Utils.dist(pa, pb);
        if (d > maxD) maxD = d;
      }
    }
    const bbox = Utils.boundingBox(pts);
    const span = Math.max(bbox.maxX - bbox.minX, bbox.maxY - bbox.minY, 1);
    const sigma = Math.max(18, span * 0.08);
    for (let a = 0; a < indices.length; a++) {
      for (let b = a + 1; b < indices.length; b++) {
        const pa = pts[indices[a]], pb = pts[indices[b]];
        const mid = Utils.midpoint(pa, pb);
        const d = Utils.dist(pa, pb);
        const phase = (b - a) / Math.max(1, indices.length - 1) * Math.PI * 2;
        const signed = Math.sin(phase) * (d / maxD);
        samples.push({ x: mid.x, y: mid.y, z: signed, w: Math.abs(signed) + 0.15 });
      }
    }
    this._flowField = {
      samples,
      sigma,
      gradientAt(x, y) {
        let gx = 0, gy = 0, gz = 0, wsum = 0;
        const s2 = sigma * sigma;
        for (const s of samples) {
          const dx = x - s.x, dy = y - s.y;
          const r2 = dx*dx + dy*dy;
          const k = Math.exp(-r2 / (2 * s2)) * s.w;
          gz += s.z * k;
          gx += s.z * k * (-dx / s2);
          gy += s.z * k * (-dy / s2);
          wsum += k;
        }
        if (wsum < 1e-6) return { x: 0, y: 0, z: 0 };
        return { x: gx / wsum, y: gy / wsum, z: gz / wsum };
      }
    };
  };
  DistanceSurface.prototype.getFlowField = function(){ return this._flowField || null; };
  const oldBuild = DistanceSurface.prototype.build;
  DistanceSurface.prototype.build = function(sampledPoints){ oldBuild.call(this, sampledPoints); this._buildFlowField(sampledPoints); };

  ProbeSimulator.prototype.setFlowField = function(field){ this._flowField = field; };
  const oldStop = ProbeSimulator.prototype.stop;
  ProbeSimulator.prototype.run = function(sampledPoints){
    oldStop.call(this);
    const pts = sampledPoints || [];
    if (!pts.length) return;
    this._probes = [];
    this._trails = [];
    this._sampledPoints = pts;
    this._running = true;
    for (let i = 0; i < CONFIG.probes.count; i++) {
      const p0 = pts[Math.floor(Math.random() * pts.length)];
      this._probes.push({ x: p0.x + (Math.random()-0.5)*6, y: p0.y + (Math.random()-0.5)*6, vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.4, life: CONFIG.probes.steps, hue:200+Math.random()*40 });
      this._trails.push([]);
    }
    this._step();
  };
  ProbeSimulator.prototype._step = function(){
    if (!this._running) return;
    const ctx = this._ctx;
    ctx.clearRect(0,0,this._canvas.width,this._canvas.height);
    const field = this._flowField;
    const width = this._canvas.width, height = this._canvas.height;
    for (let i = 0; i < this._probes.length; i++) {
      const p = this._probes[i];
      if (p.life <= 0) continue;
      let gx = 0, gy = 0, gz = 0;
      if (field && typeof field.gradientAt === 'function') {
        const g = field.gradientAt(p.x, p.y);
        gx = -g.x; gy = -g.y; gz = g.z;
      } else if (this._sampledPoints && this._sampledPoints.length) {
        const nearest = this._nearestCurvePoint(p);
        const dx = nearest.x - p.x, dy = nearest.y - p.y, d = Math.hypot(dx,dy)+1e-6;
        gx = dx / d; gy = dy / d;
      }
      const gmag = Math.hypot(gx, gy);
      if (gmag > 1e-6) { gx /= gmag; gy /= gmag; }
      const curvaturePenalty = Math.min(1, Math.abs(gz));
      const accel = 0.28 * (1 - 0.55 * curvaturePenalty);
      p.vx = (p.vx + gx * accel) * CONFIG.probes.damping;
      p.vy = (p.vy + gy * accel) * CONFIG.probes.damping;
      const speed = Math.hypot(p.vx, p.vy);
      if (speed > 2.8) { p.vx *= 2.8 / speed; p.vy *= 2.8 / speed; }
      p.x += p.vx; p.y += p.vy;
      p.life--;
      if (p.x < 0 || p.x > width) p.vx *= -0.75;
      if (p.y < 0 || p.y > height) p.vy *= -0.75;
      p.x = Math.max(0, Math.min(width, p.x));
      p.y = Math.max(0, Math.min(height, p.y));
      const trail = this._trails[i];
      trail.push({x:p.x,y:p.y});
      if (trail.length > CONFIG.probes.trailLength) trail.shift();
      for (let t = 1; t < trail.length; t++) {
        const alpha = (t / trail.length) * 0.55;
        ctx.beginPath();
        ctx.strokeStyle = `hsla(${p.hue}, 85%, 70%, ${alpha})`;
        ctx.lineWidth = 1.1;
        ctx.moveTo(trail[t-1].x, trail[t-1].y);
        ctx.lineTo(trail[t].x, trail[t].y);
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.fillStyle = `hsla(${p.hue}, 95%, 72%, 0.95)`;
      ctx.arc(p.x, p.y, 1.8, 0, Math.PI * 2);
      ctx.fill();
    }
    this._animId = requestAnimationFrame(() => this._step());
  };

  const oldInitButtons = Workbench.prototype._initButtons;
  Workbench.prototype._initButtons = function(){
    oldInitButtons.call(this);
    this._activeSeedSource = 'curve';
    const select = document.getElementById('seed-source-select');
    const note = document.getElementById('seed-source-note');
    if (!select) return;
    select.addEventListener('change', () => {
      this._activeSeedSource = select.value;
      const notes = {
        curve: 'Draw mode compiles hand-drawn curves into manifold seeds.',
        image: 'Image mode detects loops, loads the largest loop, and feeds the same pipeline.',
        optimization: 'Optimization seed source is scaffolded only in this build.',
        som: 'SOM seed source is scaffolded only in this build.',
        derived: 'Derived seed source is scaffolded only in this build.'
      };
      note.textContent = notes[select.value] || '';
      if (select.value === 'curve') {
        this._capture.setEnabled(true);
        this._setStatus('Curve seed source active — draw a closed loop.');
      } else if (select.value === 'image') {
        this._capture.setEnabled(false);
        this._setStatus('Image seed source active — upload an image to detect loops.');
      } else {
        this._capture.setEnabled(false);
        this._log(`${select.value} seed source is scaffolded but not fully implemented in this build.`, 'warn');
        this._setStatus(`${select.value} source scaffolded — switch back to Curve or Image for active use.`);
      }
    });
  };

  const oldProcessCurve = Workbench.prototype._processCurve;
  Workbench.prototype._processCurve = function(rawPoints){
    const sourceMap = {
      curve: { sourceType: 'curve', derivedFrom: 'user_drawn_curve' },
      image: { sourceType: 'image', derivedFrom: 'imported_image_loop' },
      optimization: { sourceType: 'optimization', derivedFrom: 'optimization_seed' },
      som: { sourceType: 'som', derivedFrom: 'som_seed' },
      derived: { sourceType: 'derived', derivedFrom: 'derived_seed' }
    };
    const src = sourceMap[this._activeSeedSource] || sourceMap.curve;
    oldProcessCurve.call(this, rawPoints);
    this._provenance.recordSource(src.sourceType, src.derivedFrom);
    this._provenance.recordTransformationMetadata({
      sourceType: src.sourceType,
      imageLoopCount: this._importedLoops ? this._importedLoops.length : 0,
      selectedLoopIndex: this._selectedLoopIndex
    });
    this._seed = this._compiler.compile(this._provenance.get());
    if (document.querySelector('#toggle-probes input').checked) {
      this._probes.setFlowField(this._surface.getFlowField());
      this._probes.run(this._seed.arcLengthSampledPoints);
    }
    this._appendProvenanceSummary();
  };

  const oldUploadImage = Workbench.prototype._uploadImage;
  Workbench.prototype._uploadImage = async function(file){
    this._activeSeedSource = 'image';
    const select = document.getElementById('seed-source-select');
    if (select) select.value = 'image';
    return oldUploadImage.call(this, file);
  };

  const oldRefreshImportedLoop = Workbench.prototype._refreshImportedLoop;
  Workbench.prototype._refreshImportedLoop = function(rawPoints, logMsg = true){
    this._activeSeedSource = 'image';
    const select = document.getElementById('seed-source-select');
    if (select) select.value = 'image';
    return oldRefreshImportedLoop.call(this, rawPoints, logMsg);
  };

  Workbench.prototype._appendProvenanceSummary = function(){
    const area = document.getElementById('provenance-area');
    if (!area || !this._seed) return;
    const p = this._provenance.get();
    area.innerHTML = [
      ['Source', this._seed.sourceType || 'curve'],
      ['Derived From', this._seed.derivedFrom || 'user_drawn_curve'],
      ['Raw Points', (p.rawStrokePoints || []).length],
      ['Smoothed Points', (p.smoothedCurvePoints || []).length],
      ['Sampled Points', (p.arcLengthSampledPoints || []).length],
      ['Rejected Hotspots', (p.hotspotRejected || []).length],
      ['Closure Gap', p.closureGap == null ? '—' : p.closureGap.toFixed(2)],
      ['Resampling Err', p.resamplingError == null ? '—' : p.resamplingError.toFixed(4)]
    ].map(([k,v]) => `<div class="descriptor-row"><span>${k}</span><span>${v}</span></div>`).join('');
  };

  const oldClear = Workbench.prototype._clear;
  Workbench.prototype._clear = function(){
    oldClear.call(this);
    const area = document.getElementById('provenance-area');
    if (area) area.innerHTML = '';
    const select = document.getElementById('seed-source-select');
    if (select) select.value = 'curve';
    this._activeSeedSource = 'curve';
  };

  document.addEventListener('DOMContentLoaded', () => {
    const wb = window._workbench;
    if (!wb) return;
    const btn = document.getElementById('btn-run-probes');
    if (btn && !btn.dataset.patched) {
      btn.dataset.patched = '1';
      const clone = btn.cloneNode(true);
      btn.replaceWith(clone);
      clone.addEventListener('click', () => {
        if (wb._seed) {
          wb._probes.setFlowField(wb._surface.getFlowField());
          wb._probes.run(wb._seed.arcLengthSampledPoints);
          const probesToggle = document.querySelector('#toggle-probes input');
          const probesLabel = document.getElementById('toggle-probes');
          if (probesToggle && probesLabel) { probesToggle.checked = true; probesLabel.classList.add('active'); }
        }
      });
    }
  });
})();
</script>


<script>
// ============================================================
// PHASE 3 PATCH — 3D probes on manifold surface + wider sidebar
// ============================================================
(function(){
  const dsOldBuild = DistanceSurface.prototype.build;
  const psOldRun = ProbeSimulator.prototype.run;
  const psOldStep = ProbeSimulator.prototype._step;
  const psOldStop = ProbeSimulator.prototype.stop;
  const wbOldInitModules = Workbench.prototype._initModules;

  DistanceSurface.prototype._rebuildParamField = function(sampledPoints){
    const pts = sampledPoints || [];
    if (!pts.length) { this._paramField = null; return; }
    const m = Math.min(56, Math.max(28, Math.floor(pts.length / 5)));
    const idxs = [];
    for (let a = 0; a < m; a++) idxs.push(Math.floor((a / m) * pts.length));
    const centroid = pts.reduce((acc,p)=>({x:acc.x+p.x,y:acc.y+p.y}),{x:0,y:0});
    centroid.x /= pts.length; centroid.y /= pts.length;
    let maxD = 0;
    const idx = (u,v) => ((u % m + m) % m) * m + ((v % m + m) % m);
    for (let u = 0; u < m; u++) {
      for (let v = 0; v < m; v++) {
        const d = Utils.dist(pts[idxs[u]], pts[idxs[v]]);
        if (d > maxD) maxD = d;
      }
    }
    const zScale = maxD > 0 ? (Math.min(this._width, this._height) * 0.22 / maxD) : 1;
    const world = new Array(m*m);
    const zgrid = new Array(m*m);
    for (let u = 0; u < m; u++) {
      for (let v = 0; v < m; v++) {
        const a = pts[idxs[u]];
        const b = pts[idxs[v]];
        const mid = Utils.midpoint(a, b);
        const d = Utils.dist(a, b);
        const phase = ((v - u + m) % m) / m * Math.PI * 2.0;
        const signedZ = Math.sin(phase) * d * zScale;
        world[idx(u,v)] = { x: mid.x - centroid.x, y: -(mid.y - centroid.y), z: signedZ };
        zgrid[idx(u,v)] = signedZ;
      }
    }
    const lerp = (a,b,t)=>a+(b-a)*t;
    const sampleWorld = (u,v)=>{
      const U = ((u % m) + m) % m;
      const V = ((v % m) + m) % m;
      const u0 = Math.floor(U), v0 = Math.floor(V);
      const u1 = (u0 + 1) % m, v1 = (v0 + 1) % m;
      const tu = U - u0, tv = V - v0;
      const p00 = world[idx(u0,v0)], p10 = world[idx(u1,v0)], p01 = world[idx(u0,v1)], p11 = world[idx(u1,v1)];
      return {
        x: lerp(lerp(p00.x,p10.x,tu), lerp(p01.x,p11.x,tu), tv),
        y: lerp(lerp(p00.y,p10.y,tu), lerp(p01.y,p11.y,tu), tv),
        z: lerp(lerp(p00.z,p10.z,tu), lerp(p01.z,p11.z,tu), tv)
      };
    };
    const zAt = (u,v)=> zgrid[idx(Math.round(u), Math.round(v))];
    const gradientUV = (u,v)=>{
      const eps = 1.0;
      const dzdu = (zAt(u+eps,v)-zAt(u-eps,v))/(2*eps);
      const dzdv = (zAt(u,v+eps)-zAt(u,v-eps))/(2*eps);
      return { du: dzdu, dv: dzdv };
    };
    this._paramField = { m, idxs, centroid, zScale, maxD, world, zgrid, sampleWorld, gradientUV };
  };
  DistanceSurface.prototype.getParamField = function(){ return this._paramField || null; };
  DistanceSurface.prototype.hasParamField = function(){ return !!this._paramField; };
  DistanceSurface.prototype._ensureProbeGroup = function(){
    if (!this._probeGroup) {
      this._probeGroup = new THREE.Group();
      this._root.add(this._probeGroup);
    }
  };
  DistanceSurface.prototype.clearProbeMarkers = function(){
    if (!this._probeGroup) return;
    while (this._probeGroup.children.length) {
      const c = this._probeGroup.children[0];
      this._probeGroup.remove(c);
      if (c.geometry) c.geometry.dispose();
      if (c.material) c.material.dispose();
    }
  };
  DistanceSurface.prototype.setProbeMarkers = function(markers){
    this._ensureProbeGroup();
    this.clearProbeMarkers();
    for (const m of markers) {
      const geo = new THREE.SphereGeometry(2.8, 10, 10);
      const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color(m.color || `hsl(${m.hue||210},95%,70%)`), transparent:true, opacity:0.96 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(m.x, m.y, m.z);
      this._probeGroup.add(mesh);
      m.__mesh = mesh;
    }
  };
  DistanceSurface.prototype.updateProbeMarkers = function(markers){
    if (!this._probeGroup) return;
    for (const m of markers) if (m.__mesh) m.__mesh.position.set(m.x, m.y, m.z);
  };
  DistanceSurface.prototype.build = function(sampledPoints){
    dsOldBuild.call(this, sampledPoints);
    this._rebuildParamField(sampledPoints);
    this.clearProbeMarkers();
  };

  ProbeSimulator.prototype.setSurface3D = function(surface){ this._surface3D = surface; };
  ProbeSimulator.prototype.run = function(sampledPoints){
    if (this._surface3D && this._surface3D.hasParamField && this._surface3D.hasParamField()) {
      this.stop();
      const field = this._surface3D.getParamField();
      const m = field.m;
    const vMax = field.vMax || m;
      this._mode3D = true;
      this._running = true;
      this._probes3D = [];
      for (let i = 0; i < CONFIG.probes.count; i++) {
        const u = Math.random() * m;
        const v = Math.random() * m;
        const wp = field.sampleWorld(u, v);
        this._probes3D.push({ u, v, du:(Math.random()-0.5)*0.05, dv:(Math.random()-0.5)*0.05, x:wp.x, y:wp.y, z:wp.z, life:CONFIG.probes.steps, hue:200+Math.random()*40 });
      }
      this._surface3D.setProbeMarkers(this._probes3D);
      this._step();
      return;
    }
    this._mode3D = false;
    return psOldRun.call(this, sampledPoints);
  };
  ProbeSimulator.prototype._step = function(){
    if (this._mode3D) {
      if (!this._running || !this._surface3D || !this._surface3D.hasParamField()) return;
      const field = this._surface3D.getParamField();
      const m = field.m;
      for (let i = 0; i < this._probes3D.length; i++) {
        const p = this._probes3D[i];
        if (p.life <= 0) continue;
        const g = field.gradientUV(p.u, p.v);
        let gu = -g.du, gv = -g.dv;
        const gmag = Math.hypot(gu, gv);
        if (gmag > 1e-6) { gu /= gmag; gv /= gmag; }
        const accel = 0.028;
        p.du = (p.du + gu * accel) * CONFIG.probes.damping;
        p.dv = (p.dv + gv * accel) * CONFIG.probes.damping;
        const speed = Math.hypot(p.du, p.dv);
        if (speed > 0.45) { p.du *= 0.45 / speed; p.dv *= 0.45 / speed; }
        p.u = (p.u + p.du + m) % m;
        p.v = clamp(p.v + p.dv, 1, vMax);
        const wp = field.sampleWorld(p.u, p.v);
        p.x = wp.x; p.y = wp.y; p.z = wp.z;
        p.life--;
      }
      this._surface3D.updateProbeMarkers(this._probes3D);
      this._animId = requestAnimationFrame(() => this._step());
      return;
    }
    return psOldStep.call(this);
  };
  ProbeSimulator.prototype.stop = function(){
    if (this._mode3D && this._surface3D && this._surface3D.clearProbeMarkers) this._surface3D.clearProbeMarkers();
    this._mode3D = false;
    this._probes3D = null;
    return psOldStop.call(this);
  };

  Workbench.prototype._initModules = function(){
    wbOldInitModules.call(this);
    this._probes.setSurface3D(this._surface);
  };

  document.addEventListener('DOMContentLoaded', () => {
    const wb = window._workbench;
    if (wb && wb._probes && wb._surface) wb._probes.setSurface3D(wb._surface);
  });
})();
</script>


<script>
// ============================================================
// PHASE 4 PATCH — 2D/3D probe mode + true clear for manifold
// ============================================================
(function(){
  // ---------- DistanceSurface clear ----------
  DistanceSurface.prototype.clear = function(){
    if (this._mesh) {
      this._root.remove(this._mesh);
      this._mesh.geometry.dispose();
      this._mesh.material.dispose();
      this._mesh = null;
    }
    if (this._wire) {
      this._root.remove(this._wire);
      this._wire.geometry.dispose();
      this._wire.material.dispose();
      this._wire = null;
    }
    if (this.clearProbeMarkers) this.clearProbeMarkers();
    this._paramField = null;
    this._autoRotateAngle = 0;
    if (this._root) {
      this._root.rotation.set(0,0,0);
    }
    if (this._controls) {
      this._controls.target.set(0,0,0);
      this._controls.update();
    }
    if (this._camera) {
      this._camera.position.set(0, -300, 220);
      this._camera.lookAt(0,0,0);
      this._camera.updateProjectionMatrix();
    }
  };

  // ---------- Probe mode support ----------
  ProbeSimulator.prototype.setRenderMode = function(mode){
    this._renderMode = (mode === '2d') ? '2d' : '3d';
  };

  ProbeSimulator.prototype._run2D = function(sampledPoints){
    this._mode3D = false;
    this.stop();
    const n = sampledPoints.length;
    const count = CONFIG.probes.count;
    this._probes = [];
    this._trails = [];
    this._running = true;
    this._sampledPoints = sampledPoints;

    for (let i = 0; i < count; i++) {
      const idx = Math.floor(Math.random() * n);
      this._probes.push({
        x: sampledPoints[idx].x,
        y: sampledPoints[idx].y,
        vx: (Math.random() - 0.5) * 1.5,
        vy: (Math.random() - 0.5) * 1.5,
        life: CONFIG.probes.steps
      });
      this._trails.push([]);
    }
    this._step2D();
  };

  ProbeSimulator.prototype._step2D = function(){
    if (!this._running) return;
    const ctx = this._ctx;
    const width = this._canvas.width;
    const height = this._canvas.height;
    ctx.clearRect(0, 0, width, height);

    for (let i = 0; i < this._probes.length; i++) {
      const p = this._probes[i];
      if (p.life <= 0) continue;

      const nearest = this._nearestCurvePoint ? this._nearestCurvePoint(p) : this._sampledPoints[0];
      const dx = nearest.x - p.x;
      const dy = nearest.y - p.y;
      const d = Math.sqrt(dx*dx + dy*dy) + 1e-6;

      p.vx = (p.vx + dx/d * 0.4) * CONFIG.probes.damping;
      p.vy = (p.vy + dy/d * 0.4) * CONFIG.probes.damping;

      const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
      if (speed > 3.5) {
        p.vx *= 3.5/speed;
        p.vy *= 3.5/speed;
      }

      p.x += p.vx;
      p.y += p.vy;
      p.life--;

      const trail = this._trails[i];
      trail.push({ x: p.x, y: p.y });
      if (trail.length > CONFIG.probes.trailLength) trail.shift();

      if (trail.length > 1) {
        for (let t = 1; t < trail.length; t++) {
          const alpha = (t / trail.length) * 0.6;
          ctx.beginPath();
          ctx.strokeStyle = `rgba(100, 100, 220, ${alpha})`;
          ctx.lineWidth = 1;
          ctx.moveTo(trail[t-1].x, trail[t-1].y);
          ctx.lineTo(trail[t].x, trail[t].y);
          ctx.stroke();
        }
      }

      ctx.beginPath();
      ctx.fillStyle = 'rgba(170,190,255,0.9)';
      ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    this._animId = requestAnimationFrame(() => this._step2D());
  };

  const phase3Run = ProbeSimulator.prototype.run;
  ProbeSimulator.prototype.run = function(sampledPoints){
    const mode = this._renderMode || '3d';
    if (mode === '2d') return this._run2D(sampledPoints);
    return phase3Run.call(this, sampledPoints);
  };

  const oldStop = ProbeSimulator.prototype.stop;
  ProbeSimulator.prototype.stop = function(){
    oldStop.call(this);
    if (this._ctx) this._ctx.clearRect(0,0,this._canvas.width,this._canvas.height);
  };

  // ---------- Workbench clear + UI patch ----------
  const oldInitButtonsP4 = Workbench.prototype._initButtons;
  Workbench.prototype._initButtons = function(){
    oldInitButtonsP4.call(this);
    const select = document.getElementById('probe-mode-select');
    if (select){
      select.addEventListener('change', () => {
        this._probes.setRenderMode(select.value);

  };

  const oldClear = Workbench.prototype._clear;

  // when rebuilding seed and probes are on, respect selected probe mode
  const oldProcessCurve = Workbench.prototype._processCurve;
  Workbench.prototype._processCurve = function(rawPoints){

<script>
(function(){
  function setHeaderToggle(id, checked){
    const label = document.getElementById(id); if(!label) return;
    const cb = label.querySelector('input'); if(!cb) return;
    if (cb.checked !== checked) label.click();
  }
  function syncSidebarToHeader(){
    const loop = document.getElementById('vis-loop');
    const pic = document.getElementById('vis-picture');
    const runners = document.getElementById('vis-runners');
    const mani = document.getElementById('vis-manifold');
    if(loop){
      const updateLoop = ()=>{
        const wb = window._workbench; if(!wb||!wb._visualizer) return;
        const on=loop.checked;
        ['raw','smoothed','sampled','hotspots'].forEach(k=>wb._visualizer.setLayerVisible(k,on));
      };
      loop.addEventListener('change', updateLoop); setTimeout(updateLoop,0);
    }
    if(pic){
      const updatePic = ()=>{
        const wb = window._workbench; if(!wb||!wb._visualizer) return;
        const on=pic.checked;
        wb._visualizer.setLayerVisible('imageLoops', on);
        wb._visualizer.setLayerVisible('editHandles', on);
        const draw = document.getElementById('draw-canvas');
        if(draw) draw.style.opacity = on ? '1' : '1';
        const under = document.getElementById('image-underlay');
        if(under) under.style.display = on ? 'block' : 'none';
      };
      pic.addEventListener('change', updatePic); setTimeout(updatePic,0);

      runners.addEventListener('change', updateRun);

        setHeaderToggle('toggle-surface', mani.checked);

      };
      mani.addEventListener('change', updateMani);

    }
    const probeSel=document.getElementById('probe-mode-select');

      probeSel.addEventListener('change', apply); setTimeout(apply,0);

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', syncSidebarToHeader);

})();

<script>
// ============================================================
// CLEAN SINGLE-WORLD PATCH — authoritative rectangle-theorem manifold
// Removes mirrored-sheet / multi-patch runner paths and keeps one
// single-world field + one 3D runner implementation.
// ============================================================
(function(){
  function buildSingleWorldField(pts, width, height){
    const m = Math.min(72, Math.max(32, Math.floor(pts.length / 4)));
    const n = pts.length;
    const idxs = [];
    for (let a = 0; a < m; a++) idxs.push(Math.floor((a / m) * n) % n);
    const idx = (u,v) => ((u % m + m) % m) * m + ((v % m + m) % m);

    const pairData = new Array(m*m);
    let maxD = 0, sumD = 0;
    const midCentroid = { x: 0, y: 0 };

    for (let u = 0; u < m; u++) {
      for (let v = 0; v < m; v++) {
        const p = pts[idxs[u]], q = pts[idxs[v]];
        const midpoint = Utils.midpoint(p, q);
        const d = Utils.dist(p, q);
        maxD = Math.max(maxD, d);
        sumD += d;
        midCentroid.x += midpoint.x;
        midCentroid.y += midpoint.y;
        pairData[idx(u,v)] = { u, v, p, q, midpoint, chordLength: d };
      }
    }

    midCentroid.x /= (m * m);
    midCentroid.y /= (m * m);
    const avgD = sumD / (m * m);
    const zScale = maxD > 0 ? (Math.min(width, height) * 0.24 / maxD) : 1;

    const world = new Array(m*m);
    const colors = new Array(m*m);
    const metric = new Array(m*m);

    for (let u = 0; u < m; u++) {
      for (let v = 0; v < m; v++) {
        const rec = pairData[idx(u,v)];
        const x = rec.midpoint.x - midCentroid.x;
        const y = -(rec.midpoint.y - midCentroid.y);
        const z = (rec.chordLength - avgD) * zScale;
        world[idx(u,v)] = { x, y, z };
        metric[idx(u,v)] = rec.chordLength;
        const t = maxD > 0 ? rec.chordLength / maxD : 0;
        const c = new THREE.Color();
        c.setHSL(0.62 - 0.28 * t, 0.62, 0.36 + 0.22 * t);
        colors[idx(u,v)] = c;
      }
    }

    function triangleSample(arr, U, V) {
      const u0 = Math.floor(U), v0 = Math.floor(V);
      const u1 = (u0 + 1) % m, v1 = (v0 + 1) % m;
      const fu = U - u0, fv = V - v0;
      const a = arr[idx(u0,v0)], b = arr[idx(u1,v0)], c = arr[idx(u0,v1)], d = arr[idx(u1,v1)];
      if ((fu + fv) <= 1.0) {
        const w0 = 1.0 - fu - fv, w1 = fu, w2 = fv;
        return {
          x: a.x * w0 + b.x * w1 + c.x * w2,
          y: a.y * w0 + b.y * w1 + c.y * w2,
          z: a.z * w0 + b.z * w1 + c.z * w2
        };
      } else {
        const w0 = fu + fv - 1.0, w1 = 1.0 - fu, w2 = 1.0 - fv;
        return {
          x: d.x * w0 + c.x * w1 + b.x * w2,
          y: d.y * w0 + c.y * w1 + b.y * w2,
          z: d.z * w0 + c.z * w1 + b.z * w2
        };
      }
    }

    function sampleWorld(u, v) {
      const U = ((u % m) + m) % m;
      const V = ((v % m) + m) % m;
      return triangleSample(world, U, V);
    }

    function metricAt(u, v) {
      return metric[idx(Math.round(u), Math.round(v))];
    }

    function gradientUV(u, v) {
      const eps = 1.0;
      return {
        du: (metricAt(u + eps, v) - metricAt(u - eps, v)) / (2 * eps),
        dv: (metricAt(u, v + eps) - metricAt(u, v - eps)) / (2 * eps)
      };
    }

    return { m, idx, idxs, pairData, world, colors, metric, sampleWorld, gradientUV, maxD, avgD, zScale, midCentroid };
  }

  // ----- Authoritative manifold build -----
  DistanceSurface.prototype.setViewMode = function(){
    this._viewMode = 'rectangleMap';
    if (this._lastSampledPoints && this._lastSampledPoints.length) this.build(this._lastSampledPoints);
  };

  DistanceSurface.prototype.getParamField = function(){ return this._paramField || null; };
  DistanceSurface.prototype.hasParamField = function(){ return !!this._paramField; };

  DistanceSurface.prototype._ensureProbeGroup = function(){
    if (!this._probeGroup) {
      this._probeGroup = new THREE.Group();
      this._root.add(this._probeGroup);
    }
  };

  DistanceSurface.prototype.clearProbeMarkers = function(){
    if (!this._probeGroup) return;
    while (this._probeGroup.children.length) {
      const c = this._probeGroup.children[0];
      this._probeGroup.remove(c);
      if (c.geometry) c.geometry.dispose();
      if (c.material) c.material.dispose();
    }
  };

  DistanceSurface.prototype.setProbeMarkers = function(markers){
    this._ensureProbeGroup();
    this.clearProbeMarkers();
    for (const m of markers) {
      const geo = new THREE.SphereGeometry(1.15, 10, 10);
      const mat = new THREE.MeshBasicMaterial({
        color: new THREE.Color(m.color || `hsl(${m.hue||210},95%,70%)`),
        transparent: true,
        opacity: 0.96,
        depthTest: true,
        depthWrite: true
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(m.x, m.y, m.z);
      mesh.frustumCulled = false;
      this._probeGroup.add(mesh);
      m.__mesh = mesh;
    }
  };

  DistanceSurface.prototype.updateProbeMarkers = function(markers){
    if (!this._probeGroup) return;
    for (const m of markers) {
      if (m.__mesh) {
        m.__mesh.position.set(m.x, m.y, m.z);
        if (m.__mesh.material && m.color) m.__mesh.material.color.set(m.color);
        m.__mesh.visible = true;
      }
    }
  };

  DistanceSurface.prototype.build = function(sampledPoints){
    this._lastSampledPoints = sampledPoints ? sampledPoints.slice() : [];

    if (this._mesh) {
      this._root.remove(this._mesh);
      this._mesh.geometry.dispose();
      this._mesh.material.dispose();
      this._mesh = null;
    }
    if (this._wire) {
      this._root.remove(this._wire);
      this._wire.geometry.dispose();
      this._wire.material.dispose();
      this._wire = null;
    }
    if (this.clearProbeMarkers) this.clearProbeMarkers();

    const pts = sampledPoints || [];
    if (pts.length < 8) { this._paramField = null; return; }

    const field = buildSingleWorldField(pts, this._width, this._height);
    this._paramField = field;

    const { m, idx, world, colors } = field;
    const positions = [];
    const colorArr = [];
    const indices = [];

    for (let u = 0; u < m; u++) {
      for (let v = 0; v < m; v++) {
        const w = world[idx(u,v)];
        positions.push(w.x, w.y, w.z);
        const c = colors[idx(u,v)];
        colorArr.push(c.r, c.g, c.b);
      }
    }

    for (let u = 0; u < m; u++) {
      for (let v = 0; v < m; v++) {
        const a = idx(u,v), b = idx(u+1,v), c = idx(u,v+1), d = idx(u+1,v+1);
        indices.push(a, b, c, b, d, c);
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.Float32BufferAttribute(colorArr, 3));
    geo.setIndex(indices);
    geo.computeVertexNormals();

    const mat = new THREE.MeshPhongMaterial({
      vertexColors: true,
      side: THREE.DoubleSide,
      transparent: false,
      opacity: 1.0,
      shininess: 46
    });
    this._mesh = new THREE.Mesh(geo, mat);
    this._root.add(this._mesh);

    const wireGeo = new THREE.WireframeGeometry(geo);
    const wireMat = new THREE.LineBasicMaterial({ color: 0x9b9bff, transparent: true, opacity: 0.04 });
    this._wire = new THREE.LineSegments(wireGeo, wireMat);
    this._root.add(this._wire);

    const box = new THREE.Box3().setFromObject(this._mesh);
    const size = new THREE.Vector3();
    const center = new THREE.Vector3();
    box.getSize(size); box.getCenter(center);
    const maxSize = Math.max(size.x, size.y, size.z, 1);
    const fitDist = maxSize / (2 * Math.tan((Math.PI * this._camera.fov) / 360));
    this._camera.position.set(center.x, center.y - fitDist * 1.55, center.z + fitDist * 1.06);
    this._camera.near = Math.max(0.1, fitDist / 100);
    this._camera.far = fitDist * 24;
    this._camera.updateProjectionMatrix();
    this._controls.target.copy(center);
    this._controls.update();
    this._autoRotateAngle = 0;
  };

  DistanceSurface.prototype.clear = function(){
    if (this._mesh) {
      this._root.remove(this._mesh);
      this._mesh.geometry.dispose();
      this._mesh.material.dispose();
      this._mesh = null;
    }
    if (this._wire) {
      this._root.remove(this._wire);
      this._wire.geometry.dispose();
      this._wire.material.dispose();
      this._wire = null;
    }
    if (this.clearProbeMarkers) this.clearProbeMarkers();
    this._paramField = null;
    this._autoRotateAngle = 0;
    this._root.rotation.set(0, 0, 0);
    this._controls.target.set(0, 0, 0);
    this._controls.update();
    this._camera.position.set(0, -300, 220);
    this._camera.lookAt(0,0,0);
    this._camera.updateProjectionMatrix();
  };

  // ----- Authoritative 3D runner -----
  const oldSetRenderMode = ProbeSimulator.prototype.setRenderMode || function(mode){ this._renderMode = mode; };
  ProbeSimulator.prototype.setRenderMode = function(mode){
    this._renderMode = (mode === '2d') ? '2d' : '3d';
  };

  ProbeSimulator.prototype.setSurface3D = function(surface){ this._surface3D = surface; };

  ProbeSimulator.prototype._run3DSingleWorld = function(){
    this.stop();
    if (!this._surface3D || !this._surface3D.hasParamField || !this._surface3D.hasParamField()) return;
    const field = this._surface3D.getParamField();
    const m = field.m;
    this._probes3D = [];
    this._mode3D = true;
    this._running = true;
    this._runnerImpl = 'singleWorld';
    for (let i = 0; i < CONFIG.probes.count; i++) {
      const u = Math.random() * m;
      const v = 1 + Math.random() * Math.max(1, vMax - 1);
      const wp = field.sampleWorld(u, v);
      this._probes3D.push({
        u, v,
        du: (Math.random() - 0.5) * 0.12,
        dv: (Math.random() - 0.5) * 0.12,
        x: wp.x, y: wp.y, z: wp.z,
        life: CONFIG.probes.steps,
        hue: 180 + Math.random() * 90
      });
    }
    if (this._surface3D.setProbeMarkers) this._surface3D.setProbeMarkers(this._probes3D);
    this._step();
  };

  const oldRun = ProbeSimulator.prototype.run;
  ProbeSimulator.prototype.run = function(sampledPoints){
    if (this._renderMode !== '2d' && this._surface3D && this._surface3D.hasParamField && this._surface3D.hasParamField()) {
      return this._run3DSingleWorld();
    }
    this._mode3D = false;
    this._runnerImpl = null;
    return oldRun.call(this, sampledPoints);
  };

  const oldStep = ProbeSimulator.prototype._step;
  ProbeSimulator.prototype._step = function(){
    if (this._mode3D && this._running && this._runnerImpl === 'singleWorld') {
      const field = this._surface3D.getParamField();
      const m = field.m;
      const vMax = field.vMax || m;
      for (const p of this._probes3D) {
        if (p.life <= 0) continue;
        const g = field.gradientUV(p.u, p.v);
        let gu = -g.du, gv = -g.dv;
        const gm = Math.hypot(gu, gv);
        if (gm > 1e-6) { gu /= gm; gv /= gm; }
        p.du = (p.du + gu * 0.026) * CONFIG.probes.damping;
        p.dv = (p.dv + gv * 0.026) * CONFIG.probes.damping;
        const speed = Math.hypot(p.du, p.dv);
        if (speed > 0.36) { p.du *= 0.36 / speed; p.dv *= 0.36 / speed; }
        p.u = (p.u + p.du + m) % m;
        p.v = (p.v + p.dv + m) % m;
        const wp = field.sampleWorld(p.u, p.v);
        p.x = wp.x; p.y = wp.y; p.z = wp.z;
        p.life--;
      }
      if (this._surface3D.updateProbeMarkers) this._surface3D.updateProbeMarkers(this._probes3D);
      this._animId = requestAnimationFrame(() => this._step());
      return;
    }
    return oldStep.call(this);
  };

  const oldStop = ProbeSimulator.prototype.stop;
  ProbeSimulator.prototype.stop = function(){
    if (this._mode3D && this._surface3D && this._surface3D.clearProbeMarkers) this._surface3D.clearProbeMarkers();
    this._mode3D = false;
    this._probes3D = null;
    this._runnerImpl = null;
    return oldStop.call(this);
  };

  const oldInitModules = Workbench.prototype._initModules;
  Workbench.prototype._initModules = function(){
    oldInitModules.call(this);
    if (this._surface) this._surface.setViewMode('rectangleMap');
    if (this._probes && this._surface) this._probes.setSurface3D(this._surface);
    const sel = document.getElementById('probe-mode-select');
    if (sel && this._probes) this._probes.setRenderMode(sel.value);
  };

  document.addEventListener('DOMContentLoaded', () => {
    const wb = window._workbench;
    if (wb && wb._surface) wb._surface.setViewMode('rectangleMap');
    if (wb && wb._probes && wb._surface) wb._probes.setSurface3D(wb._surface);
    const sel = document.getElementById('probe-mode-select');
    if (wb && wb._probes && sel) wb._probes.setRenderMode(sel.value);
  });
})();

<script>
// ============================================================
// FINAL MANIFOLD REBUILD PATCH — unordered-pair midpoint-distance manifold

(function(){

    const approxK = Math.round(n * Math.sqrt(safeFraction * 1.85));

      const wp = field.sampleWorld(u, v);
      this._probes3D.push({
        u, v,
        du: (Math.random() - 0.5) * 0.04,
        dv: (Math.random() - 0.5) * 0.04,
        _seamSign: v >= 0 ? 1 : -1,
        x: wp.x, y: wp.y, z: wp.z,
        life: CONFIG.probes.steps,
        hue: v >= 0 ? 220 + Math.random() * 25 : 160 + Math.random() * 25
      });
    }
    if (this._surface3D.setProbeMarkers) this._surface3D.setProbeMarkers(this._probes3D);
    this._step();
  };

  ProbeSimulator.prototype.run = function(sampledPoints){
    if (this._renderMode !== '2d' && this._surface3D && this._surface3D.hasParamField && this._surface3D.hasParamField()) {
      return this._run3DOnManifold();
    }
    if (typeof this._run2D === 'function') return this._run2D(sampledPoints);
    this.stop();
    return;
  };

  ProbeSimulator.prototype._step = function(){
    if (this._mode3D && this._runnerImpl === 'unified3d') {
      if (!this._running || !this._surface3D || !this._surface3D.hasParamField || !this._surface3D.hasParamField()) return;
      const field = this._surface3D.getParamField();
      const m = Math.max(1, Math.floor(field.m || 1));
      const vMax = Math.max(0.1, Number(field.vMax || 1));
      const seamNeutralRadius = Math.max(0.06, Number(field.seamNeutralRadius || (vMax * 0.12)));

      for (const p of (this._probes3D || [])) {
        if (p.life <= 0) continue;
        if (!Number.isFinite(p._seamSign) || p._seamSign === 0) p._seamSign = (p.v >= 0 ? 1 : -1) || 1;
        if (Math.abs(p.v) > seamNeutralRadius * 1.15) p._seamSign = p.v >= 0 ? 1 : -1;

        const g = field.gradientUV(p.u, p.v);
        let gu = -g.du, gv = -g.dv;
        const gmag = Math.hypot(gu, gv);
        if (gmag > 1e-6) { gu /= gmag; gv /= gmag; }

        // Use the manifold field as the authority: drift tangentially, with a smaller pull down-gradient.
        const tu = -gv;
        const tv = gu;
        const av = Math.abs(p.v);
        const seamT = av < seamNeutralRadius ? (1 - av / Math.max(1e-6, seamNeutralRadius)) : 0;
        const seamDrive = p._seamSign * seamT * 0.022;
        const seamDamp = 1 - seamT * 0.35;

        p.du = (p.du + tu * 0.018 + gu * 0.010 + (Math.random() - 0.5) * 0.0015) * CONFIG.probes.damping;
        p.dv = (p.dv + tv * 0.012 + gv * 0.008 + seamDrive + (Math.random() - 0.5) * 0.0015) * CONFIG.probes.damping * seamDamp;

        const speed = Math.hypot(p.du, p.dv);
        if (speed > 0.36) {
          p.du *= 0.36 / speed;
          p.dv *= 0.36 / speed;
        }

        p.u = mod(p.u + p.du, m);
        p.v = p.v + p.dv;
        if (p.v > vMax) { p.v = vMax - (p.v - vMax); p.dv *= -0.82; p._seamSign = -1; }
        if (p.v < -vMax) { p.v = -vMax + (-vMax - p.v); p.dv *= -0.82; p._seamSign = 1; }
        if (Math.abs(p.v) < 0.012) p.v = p._seamSign * 0.012;

        const wp = field.sampleWorld(p.u, p.v);
        p.x = wp.x; p.y = wp.y; p.z = wp.z;
        p.life--;
      }

      if (this._surface3D.updateProbeMarkers) this._surface3D.updateProbeMarkers(this._probes3D || []);
      this._animId = requestAnimationFrame(() => this._step());
      return;
    }
    if (typeof this._step2D === 'function') return this._step2D();
  };
})();
</script>


<script>
// ============================================================
// CONFIGURATION ACCORDION UI
// ============================================================
(function(){
  const CONFIG_SCHEMA = [
    {
      key: 'smoothing',
      label: 'Smoothing',
      fields: [
        { path: ['smoothing','segments'], label: 'Segments', type: 'number', min: 2, max: 200, step: 1, help: 'Catmull–Rom segments per control-point pair.' },
        { path: ['smoothing','closureThreshold'], label: 'Closure Threshold', type: 'number', min: 0.001, max: 1, step: 0.001, help: 'Fraction of arc length used for loop snap/bridge.' }

    },
    {
      key: 'sampling',
      label: 'Sampling',
      fields: [
        { path: ['sampling','targetCount'], label: 'Target Count', type: 'number', min: 16, max: 5000, step: 1, help: 'Arc-length resample target.' }
      ]
    },
    {
      key: 'surface',
      label: 'Surface',
      fields: [
        { path: ['surface','pairSampleFraction'], label: 'Pair Sample Fraction', type: 'number', min: 0.01, max: 1, step: 0.01, help: 'Fraction of pair domain used by the surface builder.' },
        { path: ['surface','gridResolution'], label: 'Grid Resolution', type: 'number', min: 8, max: 512, step: 1, help: 'Resolution hint for surface generation.' }
      ]
    },
    {
      key: 'hotspot',
      label: 'Hotspots',
      fields: [
        { path: ['hotspot','rectangleSearchRadius'], label: 'Rectangle Search Radius', type: 'number', min: 0.001, max: 1, step: 0.001, help: 'Fraction of arc length used during candidate suppression/search.' },
        { path: ['hotspot','minIntensity'], label: 'Min Intensity', type: 'number', min: 0, max: 1, step: 0.01, help: 'Minimum hotspot intensity kept in results.' }
      ]
    },
    {
      key: 'probes',
      label: 'Runners / Probes',
      fields: [
        { path: ['probes','count'], label: 'Count', type: 'number', min: 1, max: 50000, step: 1, help: 'Number of runners spawned.' },
        { path: ['probes','steps'], label: 'Steps', type: 'number', min: 1, max: 100000, step: 1, help: 'Runner lifespan in simulation steps.' },
        { path: ['probes','damping'], label: 'Damping', type: 'number', min: 0, max: 1, step: 0.001, help: 'Velocity damping per step.' },
        { path: ['probes','trailLength'], label: 'Trail Length', type: 'number', min: 0, max: 1000, step: 1, help: 'Visible runner trail length.' }
      ]
    }
  ];

  function getConfigValue(path){
    return path.reduce((acc, key) => acc && acc[key], CONFIG);
  }

  function setConfigValue(path, value){
    let obj = CONFIG;
    for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
    obj[path[path.length - 1]] = value;
  }

  function valueFromInput(field, input){
    if (field.type === 'checkbox') return !!input.checked;
    const raw = input.value;
    const parsed = field.type === 'number' ? Number(raw) : raw;
    return Number.isNaN(parsed) ? getConfigValue(field.path) : parsed;
  }

  function injectStyles(){
    if (document.getElementById('config-accordion-styles')) return;
    const style = document.createElement('style');
    style.id = 'config-accordion-styles';
    style.textContent = `
      .config-accordion { display:flex; flex-direction:column; gap:8px; }
      .config-item { border:1px solid #20203a; background:#10101c; border-radius:8px; overflow:hidden; }
      .config-item.open { border-color:#40407c; box-shadow: inset 0 0 0 1px rgba(120,120,200,0.08); }
      .config-trigger { width:100%; border:0; background:#141424; color:#a0a0d8; display:flex; justify-content:space-between; align-items:center; padding:10px 12px; cursor:pointer; font-family:'Courier New', monospace; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; }
      .config-trigger:hover { background:#18182b; }
      .config-trigger .config-chevron { color:#6f6fb0; transition: transform 0.18s ease; }
      .config-item.open .config-chevron { transform: rotate(90deg); }
      .config-panel { max-height:0; overflow:hidden; transition:max-height 0.2s ease; background:#0f0f1b; }
      .config-panel-inner { padding:10px 12px 12px; display:flex; flex-direction:column; gap:10px; }
      .config-row { display:grid; grid-template-columns: 1fr 110px; gap:10px; align-items:center; }
      .config-row label { color:#8c8cb8; font-size:11px; line-height:1.35; }
      .config-row input { width:100%; background:#17172a; border:1px solid #2c2c52; color:#b8b8f0; border-radius:6px; padding:6px 8px; font-family:'Courier New', monospace; font-size:12px; }
      .config-help { color:#595983; font-size:10px; line-height:1.35; margin-top:2px; }
      .config-footer { display:flex; gap:8px; margin-top:8px; }
      .config-btn { flex:1; padding:8px; background:#1a1a30; border:1px solid #2a2a50; color:#9090d0; border-radius:6px; cursor:pointer; font-family:'Courier New', monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; }
      .config-btn:hover { background:#21213a; color:#b4b4ff; }
      .config-note { color:#5e5e8d; font-size:10px; line-height:1.45; margin-top:8px; }
      #config-status { color:#6c6ca4; font-size:10px; min-height:14px; margin-top:8px; }
    `;
    document.head.appendChild(style);
  }

  function toggleItem(item, open){
    item.classList.toggle('open', open);
    const panel = item.querySelector('.config-panel');
    if (!panel) return;
    panel.style.maxHeight = open ? panel.scrollHeight + 'px' : '0px';
  }

  function rebuildCurrentCurve(){
    const wb = window._workbench;
    if (!wb) return false;
    let raw = null;
    try {
      if (wb._selectedLoopIndex >= 0 && wb._importedLoops && wb._importedLoops[wb._selectedLoopIndex]) {
        wb._refreshImportedLoop(wb._importedLoops[wb._selectedLoopIndex].points, false);
        return true;
      }
      raw = wb._provenance && wb._provenance.get && wb._provenance.get().rawStrokePoints;
      if (raw && raw.length > 1) {
        wb._processCurve(raw);
        return true;
      }
    } catch (err) {
      console.warn('Config rebuild failed', err);
    }
    return false;
  }

  function injectConfigAccordion(){
    if (document.getElementById('section-config-accordion')) return;
    injectStyles();
    const sidebar = document.getElementById('sidebar');
    if (!sidebar) return;
    const anchor = document.getElementById('section-visibility') || document.getElementById('section-probe-mode');
    const sec = document.createElement('div');
    sec.className = 'sidebar-section';
    sec.id = 'section-config-accordion';
    sec.innerHTML = `
      <h2>Configuration</h2>
      <div class="config-accordion" id="config-accordion"></div>
      <div class="config-footer">
        <button class="config-btn" id="btn-config-apply">Apply + Rebuild</button>
        <button class="config-btn" id="btn-config-reset">Reset UI</button>
      </div>
      <div class="config-note">Exposes runtime configuration except smoothing method type and backend transport. Changes update CONFIG immediately; rebuild applies geometry-sensitive settings to the current curve.</div>
      <div id="config-status"></div>
    `;
    if (anchor && anchor.parentNode === sidebar) sidebar.insertBefore(sec, anchor);
    else sidebar.appendChild(sec);

    const acc = sec.querySelector('#config-accordion');
    CONFIG_SCHEMA.forEach((group, idx) => {
      const item = document.createElement('div');
      item.className = 'config-item' + (idx === 0 ? ' open' : '');
      item.dataset.group = group.key;
      const rows = group.fields.map(field => {
        const id = 'cfg-' + field.path.join('-');
        const val = getConfigValue(field.path);
        return `
          <div class="config-row-wrap">
            <div class="config-row">
              <label for="${id}">${field.label}</label>
              <input id="${id}" data-config-path="${field.path.join('.')}" type="${field.type || 'number'}" min="${field.min ?? ''}" max="${field.max ?? ''}" step="${field.step ?? 'any'}" value="${val}">
            </div>
            <div class="config-help">${field.help || ''}</div>
          </div>`;
      }).join('');
      item.innerHTML = `
        <button class="config-trigger" type="button">
          <span>${group.label}</span>
          <span class="config-chevron">▶</span>
        </button>
        <div class="config-panel"><div class="config-panel-inner">${rows}</div></div>`;
      acc.appendChild(item);
      const trigger = item.querySelector('.config-trigger');
      trigger.addEventListener('click', () => {
        const open = !item.classList.contains('open');
        acc.querySelectorAll('.config-item').forEach(other => toggleItem(other, other === item ? open : false));
      });
      toggleItem(item, idx === 0);
    });

    sec.querySelectorAll('input[data-config-path]').forEach(input => {
      const field = CONFIG_SCHEMA.flatMap(g => g.fields).find(f => f.path.join('.') === input.dataset.configPath);
      input.addEventListener('change', () => {
        const value = valueFromInput(field, input);
        setConfigValue(field.path, value);
        const status = document.getElementById('config-status');
        if (status) status.textContent = `Updated ${field.path.join('.')} = ${value}`;
      });
    });

    document.getElementById('btn-config-apply').addEventListener('click', () => {
      const ok = rebuildCurrentCurve();
      const status = document.getElementById('config-status');
      if (status) status.textContent = ok ? 'Configuration applied and current curve rebuilt.' : 'Configuration updated. Draw or load a curve to apply geometry changes.';
    });

    document.getElementById('btn-config-reset').addEventListener('click', () => {
      sec.querySelectorAll('input[data-config-path]').forEach(input => {
        const path = input.dataset.configPath.split('.');
        input.value = getConfigValue(path);
      });
      const status = document.getElementById('config-status');
      if (status) status.textContent = 'UI reset to current CONFIG values.';
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectConfigAccordion);
  } else {
    injectConfigAccordion();
  }
})();
</script>


<script>
// ============================================================
// RUNNER TYPES ACCORDION + MANIFOLD-TRUE MULTI-RUNNER PATCH
// ============================================================
(function(){
  const RUNNER_TYPES = [
    {
      key: 'drifter',
      label: 'Drifter',
      help: 'Original balanced runner: wandering tangential drift with light gradient following.'
    },
    {
      key: 'seeker',
      label: 'Seeker',
      help: 'Stronger gradient descent across the manifold field.'
    },
    {
      key: 'explorer',
      label: 'Explorer',
      help: 'Wider roaming motion with more tangential travel and more noise.'
    },
    {
      key: 'crosser',
      label: 'Crosser',
      help: 'Biases motion through the plane transition instead of lingering near it.'
    },
    {
      key: 'deflector',
      label: 'Deflector',
      help: 'Turns sharply when it meets nearby runners, causing encounter-driven direction changes.'
    },
    {
      key: 'shaper',
      label: 'Shaper',
      help: 'Locally deforms the manifold field for nearby runners by emitting a transient bump/swirl in the topology.'
    },
    {
      key: 'orbiter',
      label: 'Orbiter',
      help: 'Circles local runner clusters and manifold features instead of simply descending the gradient.'
    },
    {
      key: 'flocker',
      label: 'Flocker',
      help: 'Aligns with neighboring runners while staying attached to the manifold geometry.'
    },
    {
      key: 'ridgewalker',
      label: 'Ridgewalker',
      help: 'Prefers contour-following tangential travel, tracing level-set structure of the manifold.'
    },
    {
      key: 'randomwalk',
      label: 'Random Walk',
      help: 'Moves by random direction changes only, without following manifold gradients or nearby runners.'
    }
  ];

  const COMPOSITE_RUNNERS = [
    { key: 'multi1', label: 'Multi-Type Agent 1', help: 'A composite runner that blends the selected runner behaviors below.' },
    { key: 'multi2', label: 'Multi-Type Agent 2', help: 'A second independently configurable composite runner.' },
    { key: 'multi3', label: 'Multi-Type Agent 3', help: 'A third independently configurable composite runner.' }
  ];

  if (!CONFIG.probes.runnerTypes) CONFIG.probes.runnerTypes = {};
  Object.assign(CONFIG.probes.runnerTypes, {
    drifter: CONFIG.probes.runnerTypes.drifter ?? true,
    seeker: CONFIG.probes.runnerTypes.seeker ?? true,
    explorer: CONFIG.probes.runnerTypes.explorer ?? false,
    crosser: CONFIG.probes.runnerTypes.crosser ?? true,
    deflector: CONFIG.probes.runnerTypes.deflector ?? false,
    shaper: CONFIG.probes.runnerTypes.shaper ?? false,
    orbiter: CONFIG.probes.runnerTypes.orbiter ?? false,
    flocker: CONFIG.probes.runnerTypes.flocker ?? false,
    ridgewalker: CONFIG.probes.runnerTypes.ridgewalker ?? false,
    randomwalk: CONFIG.probes.runnerTypes.randomwalk ?? false
  });

  if (!CONFIG.probes.runnerColors) CONFIG.probes.runnerColors = {};
  Object.assign(CONFIG.probes.runnerColors, {
    drifter: CONFIG.probes.runnerColors.drifter ?? '#5bbcff',
    seeker: CONFIG.probes.runnerColors.seeker ?? '#ffb347',
    explorer: CONFIG.probes.runnerColors.explorer ?? '#d47cff',
    crosser: CONFIG.probes.runnerColors.crosser ?? '#68ff9a',
    deflector: CONFIG.probes.runnerColors.deflector ?? '#ff6b6b',
    shaper: CONFIG.probes.runnerColors.shaper ?? '#55e0ff',
    orbiter: CONFIG.probes.runnerColors.orbiter ?? '#ffe066',
    flocker: CONFIG.probes.runnerColors.flocker ?? '#8dffb2',
    ridgewalker: CONFIG.probes.runnerColors.ridgewalker ?? '#9b7bff',
    randomwalk: CONFIG.probes.runnerColors.randomwalk ?? '#ff8f5a',
    multi1: CONFIG.probes.runnerColors.multi1 ?? '#ff66cc',
    multi2: CONFIG.probes.runnerColors.multi2 ?? '#41d9ff',
    multi3: CONFIG.probes.runnerColors.multi3 ?? '#c6ff4d'
  });

  function normalizeProbeColor(value, fallback) {
    const raw = String(value || '').trim();
    if (/^#[0-9a-fA-F]{6}$/.test(raw)) return raw;
    if (/^#[0-9a-fA-F]{3}$/.test(raw)) {
      return '#' + raw.slice(1).split('').map(ch => ch + ch).join('');
    }
    return fallback;
  }

  function probeTypeColor(type) {
    return normalizeProbeColor(CONFIG.probes.runnerColors && CONFIG.probes.runnerColors[type], '#7cb8ff');
  }

  if (!CONFIG.probes.compositeTypes) CONFIG.probes.compositeTypes = {};
  COMPOSITE_RUNNERS.forEach((slot, idx) => {
    const existing = CONFIG.probes.compositeTypes[slot.key] || {};
    const members = Object.assign({}, existing.members || {});
    RUNNER_TYPES.forEach((type, jdx) => {
      if (members[type.key] == null) members[type.key] = (idx === 0 ? CONFIG.probes.runnerTypes[type.key] : false);
    });
    CONFIG.probes.compositeTypes[slot.key] = {
      enabled: existing.enabled ?? false,
      members
    };
  });

  function compositeBehaviorKeys(key) {
    const cfg = CONFIG.probes.compositeTypes && CONFIG.probes.compositeTypes[key];
    const keys = RUNNER_TYPES.filter(t => cfg && cfg.members && cfg.members[t.key]).map(t => t.key);
    return keys.length ? keys : ['drifter'];
  }

  function runnerBehaviorKeys(type) {
    return COMPOSITE_RUNNERS.some(c => c.key === type) ? compositeBehaviorKeys(type) : [type];
  }

  function selectedRunnerTypes() {
    const selectedBase = RUNNER_TYPES
      .filter(t => CONFIG.probes.runnerTypes && CONFIG.probes.runnerTypes[t.key])
      .map(t => t.key);
    const selectedComposite = COMPOSITE_RUNNERS
      .filter(t => CONFIG.probes.compositeTypes && CONFIG.probes.compositeTypes[t.key] && CONFIG.probes.compositeTypes[t.key].enabled)
      .map(t => t.key);
    const selected = selectedBase.concat(selectedComposite);
    return selected.length ? selected : ['drifter'];
  }

  function compositeSummary(key) {
    const keys = compositeBehaviorKeys(key);
    return keys.map(k => (RUNNER_TYPES.find(t => t.key === k) || {label:k}).label).join(', ');
  }

  function injectRunnerTypeStyles() {

      .runner-types-item { border:1px solid #20203a; background:#10101c; border-radius:8px; overflow:hidden; margin-top:8px; }

      .runner-types-trigger:hover { background:#18182b; }
      .runner-types-trigger .runner-types-chevron { color:#6f6fb0; transition:transform 0.18s ease; }
      .runner-types-item.open .runner-types-chevron { transform:rotate(90deg); }
      .runner-types-panel { max-height:0; overflow:hidden; transition:max-height 0.2s ease; background:#0f0f1b; }
      .runner-types-inner { padding:10px 12px 12px; display:flex; flex-direction:column; gap:10px; }
      .runner-check { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:8px 10px; border:1px solid #232347; border-radius:8px; background:#121223; }
      .runner-check-main { display:flex; align-items:flex-start; gap:10px; flex:1; min-width:0; }
      .runner-color-wrap { display:flex; align-items:center; gap:8px; margin-left:10px; }
      .runner-color-label { color:#7c80b8; font-size:10px; letter-spacing:0.04em; text-transform:uppercase; }
      .runner-color-input { width:34px; height:24px; padding:0; border:1px solid #343a66; border-radius:6px; background:#0f1020; cursor:pointer; }
      .runner-composite-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
      .runner-composite-head-main { display:flex; align-items:flex-start; gap:10px; flex:1; min-width:0; }
      .runner-check input { margin-top:2px; accent-color:#7c7cff; }

      #runner-types-status { color:#6c6ca4; font-size:10px; min-height:14px; margin-top:6px; }
      .runner-composite-card { border:1px solid #27274a; background:#11111f; border-radius:8px; padding:8px 10px; }
      .runner-composite-head { display:flex; align-items:flex-start; gap:10px; }
      .runner-composite-head input { margin-top:3px; accent-color:#9a7cff; }
      .runner-composite-title { color:#c5c5ff; font-size:12px; }
      .runner-composite-help { color:#7272a8; font-size:10px; line-height:1.35; margin-top:2px; }
      .runner-composite-members { display:grid; grid-template-columns:1fr 1fr; gap:6px 10px; margin-top:8px; padding-top:8px; border-top:1px solid #20203a; }
      .runner-composite-member { display:flex; align-items:center; gap:6px; color:#9ea4d7; font-size:11px; }
      .runner-composite-member input { accent-color:#9a7cff; }
      .runner-composite-summary { margin-top:8px; color:#6c6ca4; font-size:10px; line-height:1.35; }
      @media (max-width: 1200px) { .runner-composite-members { grid-template-columns:1fr; } }
    `;
    document.head.appendChild(style);
  }

  function toggleRunnerItem(item, open) {
    item.classList.toggle('open', open);
    const panel = item.querySelector('.runner-types-panel');
    if (panel) panel.style.maxHeight = open ? panel.scrollHeight + 'px' : '0px';
  }

  function refreshRunnerStatus() {
    const status = document.getElementById('runner-types-status');
    if (!status) return;
    const names = selectedRunnerTypes().map(key => {
      const base = RUNNER_TYPES.find(t => t.key === key);
      if (base) return base.label;
      const comp = COMPOSITE_RUNNERS.find(t => t.key === key);
      return comp ? `${comp.label} [${compositeSummary(key)}]` : key;
    });
