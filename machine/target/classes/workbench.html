  }

  function refreshCompositeSummary(slotKey) {
    const el = document.querySelector(`[data-composite-summary="${slotKey}"]`);
    if (el) el.textContent = `Blend: ${compositeSummary(slotKey)}`;
  }

  function injectRunnerTypesAccordion() {
    if (document.getElementById('section-runner-types')) return;
    injectRunnerTypeStyles();
    const sidebar = document.getElementById('sidebar');
    if (!sidebar) return;
    const anchor = document.getElementById('section-probe-mode') || document.getElementById('section-config-accordion');
    const sec = document.createElement('div');
    sec.className = 'sidebar-section';
    sec.id = 'section-runner-types';
    sec.innerHTML = `
      <h2>Probe Types</h2>
      <div class="runner-types-item open" id="runner-types-item">
        <button class="runner-types-trigger" type="button">
          <span>Selectable Probes</span>
          <span class="runner-types-chevron">▶</span>
        </button>
        <div class="runner-types-panel">
          <label style="font-size:12px;">
    Plane Intersection Influence
  </label>

  <input
    id="planeInfluenceSlider"
    type="range"
    min="0"
    max="1"
    step="0.01"
    value="1"
    style="width:100%; margin-top:4px;"
  />

  <div style="font-size:11px; opacity:0.8;">
    Reduce attraction to the plane intersection seam
  </div>
          <div class="runner-types-inner" id="runner-types-inner"></div>
        </div>
      </div>
      <div class="runner-types-note">Checked probe types are mixed together when you click <em>Run Probes</em>. Multi-Type Agents blend the behaviors selected inside their slot, and each probe type can have its own display color on the surface.</div>
      <div id="runner-types-status"></div>
    `;
    if (anchor && anchor.parentNode === sidebar) sidebar.insertBefore(sec, anchor);
    else sidebar.appendChild(sec);

    const item = sec.querySelector('#runner-types-item');
    const trigger = item.querySelector('.runner-types-trigger');
    trigger.addEventListener('click', () => toggleRunnerItem(item, !item.classList.contains('open')));
    toggleRunnerItem(item, true);

    const inner = sec.querySelector('#runner-types-inner');
    const baseWrap = document.createElement('div');
    inner.appendChild(baseWrap);
    RUNNER_TYPES.forEach(type => {
      const row = document.createElement('label');
      row.className = 'runner-check';
      row.innerHTML = `
        <div class="runner-check-main">
          <input type="checkbox" data-runner-type="${type.key}" ${CONFIG.probes.runnerTypes[type.key] ? 'checked' : ''}>
          <div>
            <div class="runner-check-label">${type.label}</div>
            <div class="runner-check-help">${type.help}</div>
          </div>
        </div>
        <div class="runner-color-wrap">
          <span class="runner-color-label">Color</span>
          <input class="runner-color-input" type="color" data-runner-color="${type.key}" value="${probeTypeColor(type.key)}" title="${type.label} color">
        </div>
      `;
      baseWrap.appendChild(row);
    });

    const compWrap = document.createElement('div');
    compWrap.style.display = 'flex';
    compWrap.style.flexDirection = 'column';
    compWrap.style.gap = '10px';
    inner.appendChild(compWrap);
    COMPOSITE_RUNNERS.forEach(slot => {
      const cfg = CONFIG.probes.compositeTypes[slot.key];
      const card = document.createElement('div');
      card.className = 'runner-composite-card';
      const membersHtml = RUNNER_TYPES.map(type => `
        <label class="runner-composite-member">
          <input type="checkbox" data-composite-member="${slot.key}" data-member-key="${type.key}" ${cfg.members[type.key] ? 'checked' : ''}>
          <span>${type.label}</span>
        </label>
      `).join('');
      card.innerHTML = `
        <div class="runner-composite-head">
          <label class="runner-composite-head-main">
            <input type="checkbox" data-composite-enable="${slot.key}" ${cfg.enabled ? 'checked' : ''}>
            <div>
              <div class="runner-composite-title">${slot.label}</div>
              <div class="runner-composite-help">${slot.help}</div>
            </div>
          </label>
          <div class="runner-color-wrap">
            <span class="runner-color-label">Color</span>
            <input class="runner-color-input" type="color" data-runner-color="${slot.key}" value="${probeTypeColor(slot.key)}" title="${slot.label} color">
          </div>
        </div>
        <div class="runner-composite-members">${membersHtml}</div>
        <div class="runner-composite-summary" data-composite-summary="${slot.key}"></div>
      `;
      compWrap.appendChild(card);
      refreshCompositeSummary(slot.key);
    });

    inner.querySelectorAll('input[data-runner-type]').forEach(input => {
      input.addEventListener('change', () => {
        CONFIG.probes.runnerTypes[input.dataset.runnerType] = !!input.checked;
        refreshRunnerStatus();
      });
    });
    inner.querySelectorAll('input[data-composite-enable]').forEach(input => {
      input.addEventListener('change', () => {
        CONFIG.probes.compositeTypes[input.dataset.compositeEnable].enabled = !!input.checked;
        refreshRunnerStatus();
      });
    });
    inner.querySelectorAll('input[data-composite-member]').forEach(input => {
      input.addEventListener('change', () => {
        const slotKey = input.dataset.compositeMember;
        CONFIG.probes.compositeTypes[slotKey].members[input.dataset.memberKey] = !!input.checked;
        refreshCompositeSummary(slotKey);
        refreshRunnerStatus();
      });
    });

    COMPOSITE_RUNNERS.forEach(slot => refreshCompositeSummary(slot.key));
    refreshRunnerStatus();
  }

  function runnerMixForCount(total, types) {
    const mix = [];
    for (let i = 0; i < total; i++) mix.push(types[i % types.length]);
    for (let i = mix.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = mix[i]; mix[i] = mix[j]; mix[j] = tmp;
    }
    return mix;
  }

  function runnerHue(type, v) {
    if (type === 'drifter') return v >= 0 ? 225 : 165;
    if (type === 'seeker') return 35;
    if (type === 'explorer') return 290;
    if (type === 'crosser') return 120;
    if (type === 'deflector') return 0;
    if (type === 'shaper') return 195;
    if (type === 'orbiter') return 52;
    if (type === 'flocker') return 150;
    if (type === 'ridgewalker') return 265;
    if (type === 'randomwalk') return 18;
    if (type === 'multi1') return 315;
    if (type === 'multi2') return 200;
    if (type === 'multi3') return 80;
    return 210;
  }

  function runnerSpeedLimit(type) {
    const limits = {
      drifter: 0.36,
      seeker: 0.32,
      explorer: 0.44,
      crosser: 0.36,
      deflector: 0.38,
      shaper: 0.30,
      orbiter: 0.40,
      flocker: 0.34,
      ridgewalker: 0.31,
      randomwalk: 0.42
    };
    if (COMPOSITE_RUNNERS.some(c => c.key === type)) {
      const keys = compositeBehaviorKeys(type);
      const avg = keys.reduce((s, k) => s + (limits[k] || 0.36), 0) / Math.max(1, keys.length);
      return Math.min(0.46, avg + 0.03);
    }
    return limits[type] || 0.36;
  }

  function modDeltaU(a, b, m) {
    let d = a - b;
    if (d >  m / 2) d -= m;
    if (d < -m / 2) d += m;
    return d;
  }

  function wrapU(u, m) {
    return ((u % m) + m) % m;
  }

  function normalize2(x, y) {
    const mag = Math.hypot(x, y);
    if (mag < 1e-9) return { x: 0, y: 0, mag: 0 };
    return { x: x / mag, y: y / mag, mag };
  }

  function buildProbeSpatialIndex(probes, m, vMax) {
    const cellU = Math.max(1.2, m / 44);
    const cellV = Math.max(0.06, vMax / 10);
    const uCells = Math.max(1, Math.ceil(m / cellU));
    const map = new Map();

    for (let i = 0; i < probes.length; i++) {
      const p = probes[i];
      if (!p || p.life <= 0) continue;
      const cu = ((Math.floor(p.u / cellU) % uCells) + uCells) % uCells;
      const cv = Math.floor((p.v + vMax) / cellV);
      const key = cu + '|' + cv;
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(i);
    }

    return { map, cellU, cellV, uCells };
  }

  function gatherNeighbors(index, probes, spatial, m, vMax, maxNeighbors = 8) {
    const p = probes[index];
    const cu = ((Math.floor(p.u / spatial.cellU) % spatial.uCells) + spatial.uCells) % spatial.uCells;
    const cv = Math.floor((p.v + vMax) / spatial.cellV);
    const out = [];
    const seen = new Set();
    for (let duCell = -1; duCell <= 1; duCell++) {
      for (let dvCell = -1; dvCell <= 1; dvCell++) {
        const uCell = ((cu + duCell) % spatial.uCells + spatial.uCells) % spatial.uCells;
        const vCell = cv + dvCell;
        const key = uCell + '|' + vCell;
        const bucket = spatial.map.get(key);
        if (!bucket) continue;
        for (const j of bucket) {
          if (j === index || seen.has(j)) continue;
          const q = probes[j];
          if (!q || q.life <= 0) continue;
          const du = modDeltaU(q.u, p.u, m);
          const dv = q.v - p.v;
          const d2 = du * du + dv * dv;
          if (d2 > 2.25) continue;
          seen.add(j);
          out.push({ probe: q, du, dv, d2 });
          if (out.length >= maxNeighbors) return out;
        }
      }
    }
    return out;
  }

  function applyShaperField(baseG, p, neighbors, m, vMax) {
    const g = { du: baseG.du, dv: baseG.dv };
    for (const n of neighbors) {
      const q = n.probe;
      const qBehaviors = runnerBehaviorKeys(q.runnerType);
      if (!qBehaviors.includes('shaper')) continue;
      const d2 = Math.max(0.0005, n.d2);
      const influence = Math.exp(-d2 / 0.18);
      const dir = normalize2(n.du, n.dv);
      const sign = (q._turnSign != null ? q._turnSign : ((q._turnSign = (Math.random() < 0.5 ? -1 : 1))));
      const swirl = { x: -dir.y * sign, y: dir.x * sign };
      g.du += (-dir.x * 0.16 + swirl.x * 0.08) * influence;
      g.dv += (-dir.y * 0.16 + swirl.y * 0.08) * influence;
    }
    return g;
  }

  function summarizeNeighbors(p, neighbors, m) {
    let nearest = null;
    let nearestD2 = Infinity;
    let avgVelU = 0, avgVelV = 0, avgPosU = 0, avgPosV = 0;
    let repulseU = 0, repulseV = 0;
    for (const n of neighbors) {
      const q = n.probe;
      avgVelU += q.du || 0;
      avgVelV += q.dv || 0;
      avgPosU += p.u + n.du;
      avgPosV += p.v + n.dv;
      const safeD2 = Math.max(0.0025, n.d2);
      repulseU -= n.du / safeD2;
      repulseV -= n.dv / safeD2;
      if (n.d2 < nearestD2) {
        nearestD2 = n.d2;
        nearest = n;
      }
    }
    const count = neighbors.length || 1;
    return {
      count: neighbors.length,
      nearest,
      nearestD2,
      avgVelU: avgVelU / count,
      avgVelV: avgVelV / count,
      avgPosU: avgPosU / count,
      avgPosV: avgPosV / count,
      repulseU,
      repulseV
    };
  }

  function computeRunnerDelta(type, p, g, nb, m, vMax) {
    let gu = -g.du, gv = -g.dv;
    const grad = normalize2(gu, gv);
    gu = grad.x; gv = grad.y;
    const turnSign = (p._turnSign != null ? p._turnSign : ((p._turnSign = (Math.random() < 0.5 ? -1 : 1))));
    const tu = -gv * turnSign;
    const tv = gu * turnSign;

    let duAdd = 0, dvAdd = 0;
    if (type === 'seeker') {
      duAdd = gu * 0.022 + tu * 0.006;
      dvAdd = gv * 0.020 + tv * 0.004;
    } else if (type === 'explorer') {
      duAdd = tu * 0.021 + gu * 0.006 + (Math.random() - 0.5) * 0.0042;
      dvAdd = tv * 0.017 + gv * 0.004 + (Math.random() - 0.5) * 0.0032;
    } else if (type === 'crosser') {
      const seamPush = Math.abs(p.v) < (vMax * 0.18) ? (p.v >= 0 ? -0.018 : 0.018) : 0;
      duAdd = tu * 0.012 + gu * 0.008;
      dvAdd = tv * 0.010 + gv * 0.008 + seamPush;
    } else if (type === 'deflector') {
      duAdd = tu * 0.014 + gu * 0.006;
      dvAdd = tv * 0.010 + gv * 0.006;
      if (nb.nearest && nb.nearestD2 < 0.045) {
        const turn = normalize2(-nb.nearest.dv, nb.nearest.du);
        const sign = ((p._deflectSign = -(p._deflectSign || 1)));
        duAdd += turn.x * 0.055 * sign - nb.nearest.du * 0.024;
        dvAdd += turn.y * 0.055 * sign - nb.nearest.dv * 0.024;
      }
      duAdd += nb.repulseU * 0.003;
      dvAdd += nb.repulseV * 0.003;
    } else if (type === 'shaper') {
      duAdd = tu * 0.014 + gu * 0.006 + nb.repulseU * 0.0015;
      dvAdd = tv * 0.010 + gv * 0.006 + nb.repulseV * 0.0015;
    } else if (type === 'orbiter') {
      if (nb.nearest) {
        const toward = normalize2(nb.nearest.du, nb.nearest.dv);
        const orbitSign = (p._turnSign != null ? p._turnSign : ((p._turnSign = (Math.random() < 0.5 ? -1 : 1))));
        const orbit = { x: -toward.y * orbitSign, y: toward.x * orbitSign };
        const radiusBias = (Math.sqrt(nb.nearestD2) - 0.32);
        duAdd = orbit.x * 0.032 - toward.x * radiusBias * 0.022 + gu * 0.004;
        dvAdd = orbit.y * 0.032 - toward.y * radiusBias * 0.022 + gv * 0.004;
      } else {
        duAdd = tu * 0.020 + gu * 0.004;
        dvAdd = tv * 0.016 + gv * 0.003;
      }
    } else if (type === 'flocker') {
      duAdd = tu * 0.010 + gu * 0.006;
      dvAdd = tv * 0.008 + gv * 0.006;
      if (nb.count) {
        duAdd += nb.avgVelU * 0.14 + modDeltaU(nb.avgPosU, p.u, m) * 0.010 + nb.repulseU * 0.0012;
        dvAdd += nb.avgVelV * 0.14 + (nb.avgPosV - p.v) * 0.010 + nb.repulseV * 0.0012;
      }
    } else if (type === 'ridgewalker') {
      const targetBand = p._ridgeBand != null ? p._ridgeBand : (p._ridgeBand = Math.abs(p.v));
      duAdd = tu * 0.028 + gu * 0.002;
      dvAdd = tv * 0.004 + (Math.sign(p.v || 1) * targetBand - p.v) * 0.014;
    } else if (type === 'randomwalk') {
      const angle = Math.random() * Math.PI * 2;
      const stride = 0.016 + Math.random() * 0.020;
      duAdd = Math.cos(angle) * stride;
      dvAdd = Math.sin(angle) * stride;
    } else {
      duAdd = tu * 0.018 + gu * 0.010 + (Math.random() - 0.5) * 0.0022;
      dvAdd = tv * 0.012 + gv * 0.008 + (Math.random() - 0.5) * 0.0020;
    }
    return { duAdd, dvAdd };
  }

  function applyRunnerDynamics(p, g, neighbors, m, vMax) {
    const nb = summarizeNeighbors(p, neighbors, m);
    const behaviors = runnerBehaviorKeys(p.runnerType || 'drifter');
    let duAdd = 0, dvAdd = 0;
    for (const type of behaviors) {
      const delta = computeRunnerDelta(type, p, g, nb, m, vMax);
      duAdd += delta.duAdd;
      dvAdd += delta.dvAdd;
    }
    duAdd /= Math.max(1, behaviors.length);
    dvAdd /= Math.max(1, behaviors.length);
    if (behaviors.length > 1) {
      duAdd += (Math.random() - 0.5) * 0.0012;
      dvAdd += (Math.random() - 0.5) * 0.0012;
    }
    p.du = (p.du + duAdd) * CONFIG.probes.damping;
    p.dv = (p.dv + dvAdd) * CONFIG.probes.damping;
  }

  ProbeSimulator.prototype._run3DOnManifold = function(){
    this.stop();
    if (!this._surface3D || !this._surface3D.hasParamField || !this._surface3D.hasParamField()) return;
    const field = this._surface3D.getParamField();
    const m = Math.max(1, Math.floor(field.m || 1));
    const vMax = Math.max(0.1, Number(field.vMax || 1));
    const runnerTypes = selectedRunnerTypes();
    const mix = runnerMixForCount(CONFIG.probes.count, runnerTypes);

    this._mode3D = true;
    this._running = true;
    this._runnerImpl = 'unified3d';
    this._probes3D = [];
    this._activeRunnerTypes = runnerTypes.slice();

    for (let i = 0; i < CONFIG.probes.count; i++) {
      const type = mix[i];
      const u = Math.random() * m;
      let v = (Math.random() * 2 - 1) * vMax;
      if (Math.abs(v) < vMax * 0.05) v = (Math.random() < 0.5 ? -1 : 1) * vMax * 0.08;
      const wp = field.sampleWorld(u, v);
      this._probes3D.push({
        u, v,
        du: (Math.random() - 0.5) * 0.04,
        dv: (Math.random() - 0.5) * 0.04,
        x: wp.x, y: wp.y, z: wp.z,
        life: CONFIG.probes.steps,
        runnerType: type,
        color: probeTypeColor(type),
        hue: runnerHue(type, v) + Math.random() * 18,
        _turnSign: Math.random() < 0.5 ? -1 : 1,
        _deflectSign: Math.random() < 0.5 ? -1 : 1
      });
    }

    const wb = window._workbench;
    if (wb && wb._seed) wb._seed.selectedRunnerTypes = runnerTypes.slice();
    if (wb && wb._seed) wb._seed.selectedCompositeRunnerTypes = JSON.parse(JSON.stringify(CONFIG.probes.compositeTypes));
    if (this._surface3D.setProbeMarkers) this._surface3D.setProbeMarkers(this._probes3D);
    this._step();
  };

  const oldStep = ProbeSimulator.prototype._step;
  ProbeSimulator.prototype._step = function(){
    if (this._mode3D && this._runnerImpl === 'unified3d') {
      if (!this._running || !this._surface3D || !this._surface3D.hasParamField || !this._surface3D.hasParamField()) return;
      const field = this._surface3D.getParamField();
      const m = Math.max(1, Math.floor(field.m || 1));
      const vMax = Math.max(0.1, Number(field.vMax || 1));
      const probes = this._probes3D || [];
      const spatial = buildProbeSpatialIndex(probes, m, vMax);

      for (let i = 0; i < probes.length; i++) {
        const p = probes[i];
        if (p.life <= 0) continue;
        const neighbors = gatherNeighbors(i, probes, spatial, m, vMax, 10);
        let g = field.gradientUV(p.u, p.v);
        g = applyShaperField(g, p, neighbors, m, vMax);
        applyRunnerDynamics(p, g, neighbors, m, vMax);

        const speedLimit = runnerSpeedLimit(p.runnerType);
        const speed = Math.hypot(p.du, p.dv);
        if (speed > speedLimit) {
          p.du *= speedLimit / speed;
          p.dv *= speedLimit / speed;
        }

        p.u = wrapU(p.u + p.du, m);
        p.v = p.v + p.dv;
        if (p.v > vMax) { p.v = vMax - (p.v - vMax); p.dv *= -0.82; }
        if (p.v < -vMax) { p.v = -vMax + (-vMax - p.v); p.dv *= -0.82; }

        const wp = field.sampleWorld(p.u, p.v);
        p.x = wp.x; p.y = wp.y; p.z = wp.z;
        p.life--;
      }

      if (this._surface3D.updateProbeMarkers) this._surface3D.updateProbeMarkers(probes);
      this._animId = requestAnimationFrame(() => this._step());
      return;
    }
    return oldStep.call(this);
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectRunnerTypesAccordion);
  } else {
    injectRunnerTypesAccordion();
  }
})();
</script>


<script>
(function(){
  function ensureSnapStyles(){
    if (document.getElementById('snap-view-style')) return;
    const style = document.createElement('style');
    style.id = 'snap-view-style';
    style.textContent = `
      #snap-view-controls{
        position:absolute;
        top:14px;
        right:14px;
        z-index:6;
        display:flex;
        gap:8px;
        pointer-events:auto;
      }
      #snap-view-controls .snap-btn{
        min-width:34px;
        height:30px;
        padding:0 10px;
        background:rgba(13,13,22,0.88);
        border:1px solid #2a2a50;
        color:#a0a0e8;
        font-family:'Courier New', monospace;
        font-size:12px;
        letter-spacing:0.08em;
        text-transform:uppercase;
        border-radius:8px;
        cursor:pointer;
        transition:background 0.15s, color 0.15s, border-color 0.15s;
        backdrop-filter: blur(2px);
      }
      #snap-view-controls .snap-btn:hover{
        background:#1b1b34;
        color:#c0c0ff;
        border-color:#5a5acc;
      }
      #snap-view-controls .snap-btn:active{
        background:#222246;
      }
    `;
    document.head.appendChild(style);
  }

  function ensureSnapButtons(){
    const panel = document.getElementById('canvas-panel');
    if (!panel || document.getElementById('snap-view-controls')) return;
    const wrap = document.createElement('div');
    wrap.id = 'snap-view-controls';
    wrap.innerHTML = `
      <button class="snap-btn" data-axis="x" title="Snap to X axis">X</button>
      <button class="snap-btn" data-axis="y" title="Snap to Y axis">Y</button>
      <button class="snap-btn" data-axis="z" title="Snap to Z axis">Z</button>
    `;
    panel.appendChild(wrap);
    wrap.addEventListener('click', (e) => {
      const btn = e.target.closest('.snap-btn');
      if (!btn) return;
      const axis = btn.getAttribute('data-axis');
      const wb = window._workbench;
      if (!wb || !wb._surface) return;

      const surfaceToggle = document.getElementById('toggle-surface');
      if (surfaceToggle) {
        const cb = surfaceToggle.querySelector('input');
        if (cb && !cb.checked) surfaceToggle.click();
      }
      const rotateToggle = document.getElementById('toggle-rotate');
      if (rotateToggle) {
        const cb = rotateToggle.querySelector('input');
        if (cb && !cb.checked) rotateToggle.click();
      }
      wb._surface.snapView(axis);
      if (typeof wb._setStatus === 'function') {
        wb._setStatus(`Snapped to ${axis.toUpperCase()} view.`);
      }
    });
  }

  DistanceSurface.prototype.snapView = function(axis){
    if (!this._camera || !this._controls) return;
    const target = new THREE.Vector3();
    if (this._controls.target) target.copy(this._controls.target);

    let obj = this._mesh || this._root;
    let size = 200;
    if (obj) {
      const box = new THREE.Box3().setFromObject(obj);
      if (!box.isEmpty()) {
        const center = new THREE.Vector3();
        const dims = new THREE.Vector3();
        box.getCenter(center);
        box.getSize(dims);
        target.copy(center);
        size = Math.max(dims.x, dims.y, dims.z, 1);
      }
    }

    const fitDist = size / (2 * Math.tan((Math.PI * this._camera.fov) / 360));
    const dist = fitDist * 1.35;
    const pos = new THREE.Vector3();
    const a = String(axis || '').toLowerCase();
    if (a === 'x') pos.set(target.x + dist, target.y, target.z);
    else if (a === 'y') pos.set(target.x, target.y + dist, target.z);
    else pos.set(target.x, target.y, target.z + dist);

    this._interactive = true;
    this._controls.enabled = true;
    this._autoRotateAngle = 0;
    if (this._root) {
      this._root.rotation.x = 0;
      this._root.rotation.y = 0;
      this._root.rotation.z = 0;
    }
    this._camera.position.copy(pos);
    this._camera.near = Math.max(0.1, dist / 100);
    this._camera.far  = dist * 30;
    this._camera.updateProjectionMatrix();
    this._controls.target.copy(target);
    this._controls.update();
  };

  function boot(){
    ensureSnapStyles();
    ensureSnapButtons();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>


<script>
// ============================================================
// PLANE / SEAM INTERSECTION INFLUENCE PATCH
// Adds a UI slider and reduces seam-plane attraction dynamically.
// ============================================================
(function(){
  if (!window.CONFIG || !CONFIG.probes) return;

  if (typeof CONFIG.probes.intersectionInfluence !== 'number' || !Number.isFinite(CONFIG.probes.intersectionInfluence)) {
    CONFIG.probes.intersectionInfluence = 1.0;
  }
  CONFIG.probes.intersectionInfluence = Math.max(0, Math.min(1, CONFIG.probes.intersectionInfluence));

  function influenceValue(){
    const v = Number(CONFIG.probes.intersectionInfluence);
    return Number.isFinite(v) ? Math.max(0, Math.min(1, v)) : 1.0;
  }

  function injectIntersectionSliderStyles(){
    if (document.getElementById('intersection-influence-styles')) return;
    const style = document.createElement('style');
    style.id = 'intersection-influence-styles';
    style.textContent = `
      .intersection-control-card {
        border:1px solid #27274a;
        background:#11111f;
        border-radius:8px;
        padding:10px;
        display:flex;
        flex-direction:column;
        gap:8px;
      }
      .intersection-control-head {
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
      }
      .intersection-control-title {
        color:#c5c5ff;
        font-size:11px;
        text-transform:uppercase;
        letter-spacing:0.05em;
      }
      .intersection-control-value {
        color:#8fd0ff;
        font-size:11px;
        min-width:40px;
        text-align:right;
      }
      .intersection-control-help {
        color:#6c6ca4;
        font-size:10px;
        line-height:1.45;
      }
      .intersection-control-slider {
        width:100%;
        accent-color:#7db7ff;
        cursor:pointer;
      }
    `;
    document.head.appendChild(style);
  }

  function updateIntersectionSliderReadout(){
    const valueEl = document.getElementById('intersection-influence-value');
    const inputEl = document.getElementById('intersection-influence-slider');
    const v = influenceValue();
    if (valueEl) valueEl.textContent = `${Math.round(v * 100)}%`;
    if (inputEl && String(inputEl.value) !== String(v)) inputEl.value = String(v);
  }

  function injectIntersectionSlider(){
    if (document.getElementById('intersection-influence-card')) {
      updateIntersectionSliderReadout();
      return;
    }
    injectIntersectionSliderStyles();
    const inner = document.getElementById('runner-types-inner');
    if (!inner) return;

    const card = document.createElement('div');
    card.className = 'intersection-control-card';
    card.id = 'intersection-influence-card';
    card.innerHTML = `
      <div class="intersection-control-head">
        <div class="intersection-control-title">Plane Intersection Weight</div>
        <div class="intersection-control-value" id="intersection-influence-value"></div>
      </div>
      <input id="intersection-influence-slider" class="intersection-control-slider" type="range" min="0" max="1" step="0.01" value="${influenceValue()}">
      <div class="intersection-control-help">Lower this to reduce how strongly probes are pulled toward the seam / plane intersection band. 100% matches the current behavior. 0% makes the seam contribution neutral.</div>
    `;
    inner.insertBefore(card, inner.firstChild);

    const slider = card.querySelector('#intersection-influence-slider');
    slider.addEventListener('input', () => {
      CONFIG.probes.intersectionInfluence = Math.max(0, Math.min(1, Number(slider.value)));
      updateIntersectionSliderReadout();
      const status = document.getElementById('runner-types-status');
      if (status) {
        status.textContent = `${status.textContent.split(' | Plane seam weight:')[0]} | Plane seam weight: ${Math.round(influenceValue()*100)}%`;
      }
    });
    updateIntersectionSliderReadout();

    const item = document.getElementById('runner-types-item');
    const panel = item && item.querySelector('.runner-types-panel');
    if (item && panel && item.classList.contains('open')) panel.style.maxHeight = panel.scrollHeight + 'px';
  }

  const oldRefreshRunnerStatus = window.refreshRunnerStatus || null;
  if (typeof oldRefreshRunnerStatus === 'function') {
    window.refreshRunnerStatus = function(){
      oldRefreshRunnerStatus();
      const status = document.getElementById('runner-types-status');
      if (status) status.textContent += ` | Plane seam weight: ${Math.round(influenceValue()*100)}%`;
    };
  }

  const oldGetParamField = DistanceSurface.prototype.getParamField;
  DistanceSurface.prototype.getParamField = function(){
    const field = oldGetParamField ? oldGetParamField.call(this) : null;
    if (!field || typeof field.gradientUV !== 'function') return field;
    if (field._intersectionInfluenceWrapped) return field;

    const baseGradientUV = field.gradientUV.bind(field);
    field.gradientUV = function(u, v){
      const g = baseGradientUV(u, v) || { du: 0, dv: 0 };
      const av = Math.abs(Number(v) || 0);
      const seamNeutralRadius = Math.max(1e-6, Number(field.seamNeutralRadius || 0));
      if (seamNeutralRadius > 0 && av < seamNeutralRadius) {
        const t = av / seamNeutralRadius;
        const fade = t * t * (3 - 2 * t);
        const influence = influenceValue();
        const seamFactor = fade * influence;
        return { du: g.du, dv: g.dv * seamFactor };
      }
      return g;
    };
    field._intersectionInfluenceWrapped = true;
    return field;
  };

  const oldComputeRunnerDelta = window.computeRunnerDelta;
  if (typeof oldComputeRunnerDelta === 'function') {
    window.computeRunnerDelta = function(type, p, g, nb, m, vMax){
      const out = oldComputeRunnerDelta(type, p, g, nb, m, vMax);
      if (type === 'crosser' && out && typeof out.dvAdd === 'number') {
        out.dvAdd *= (0.35 + 0.65 * influenceValue());
      }
      return out;
    };
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectIntersectionSlider);
  } else {
    injectIntersectionSlider();
  }
})();
</script>
<script>

// Parameters stored in CONFIG.probes.runnerParams and wired into
// computeRunnerDelta via override.
// ============================================================
(function(){

  // ── Default parameter definitions per probe type ──────────
  const PROBE_PARAMS = {
    drifter: [
      { key: 'tangential', label: 'Tangential', min: 0, max: 1, step: 0.01, default: 0.018 },
      { key: 'gradient',   label: 'Gradient',   min: 0, max: 1, step: 0.01, default: 0.010 },

    ],
    orbiter: [
      { key: 'orbit_strength', label: 'Orbit Str',  min: 0, max: 1, step: 0.01, default: 0.032 },
      { key: 'radius_bias',    label: 'Radius Bias', min: 0, max: 1, step: 0.01, default: 0.022 }
    ],
    flocker: [
      { key: 'alignment',  label: 'Alignment',  min: 0, max: 1, step: 0.01, default: 0.14 },
      { key: 'cohesion',   label: 'Cohesion',   min: 0, max: 1, step: 0.01, default: 0.010 }
    ],
    ridgewalker: [
      { key: 'tangential',  label: 'Tangential',  min: 0, max: 1, step: 0.01, default: 0.028 },
      { key: 'band_lock',   label: 'Band Lock',   min: 0, max: 1, step: 0.01, default: 0.014 }
    ],
    randomwalk: [
      { key: 'step_size', label: 'Step Size', min: 0.001, max: 0.2, step: 0.001, default: 0.028 }
    ]
  };

  // ── Seed CONFIG ───────────────────────────────────────────
  if (!CONFIG.probes.runnerParams) CONFIG.probes.runnerParams = {};
  for (const [type, params] of Object.entries(PROBE_PARAMS)) {
    if (!CONFIG.probes.runnerParams[type]) CONFIG.probes.runnerParams[type] = {};
    for (const p of params) {
      if (CONFIG.probes.runnerParams[type][p.key] == null) {
        CONFIG.probes.runnerParams[type][p.key] = p.default;
      }
    }
  }

  function rp(type, key) {
    return CONFIG.probes.runnerParams[type] && CONFIG.probes.runnerParams[type][key] != null
      ? CONFIG.probes.runnerParams[type][key]
      : (PROBE_PARAMS[type] || []).find(p => p.key === key)?.default ?? 0;
  }

  // ── Styles ────────────────────────────────────────────────
  (function injectStyles(){
    if (document.getElementById('probe-param-styles')) return;
    const style = document.createElement('style');
    style.id = 'probe-param-styles';
    style.textContent = `
      .probe-params {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 8px 10px 4px 28px;
        background: #0e0e1e;
        border-top: 1px solid #1e1e38;
      }
      .probe-param-row {
        display: grid;
        grid-template-columns: 72px 1fr 42px;
        align-items: center;
        gap: 8px;
      }
      .probe-param-label {
        color: #7878a8;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }
      .probe-param-slider {
        width: 100%;
        accent-color: #6a6adf;
        cursor: pointer;
        height: 14px;
      }
      .probe-param-value {
        color: #a0a8e0;
        font-size: 10px;
        text-align: right;
        font-family: 'Courier New', monospace;
        min-width: 38px;
      }
    `;
    document.head.appendChild(style);
  })();

  // ── Inject param sliders below each runner-check row ─────
  function injectParamControls() {
    const inner = document.getElementById('runner-types-inner');
    if (!inner) return;

    for (const [type, params] of Object.entries(PROBE_PARAMS)) {
      if (!params.length) continue;

      // Find the label element with this runner's checkbox
      const cb = inner.querySelector(`input[data-runner-type="${type}"]`);
      if (!cb) continue;
      const row = cb.closest('.runner-check');
      if (!row) continue;

      // Don't double-inject
      if (row.nextElementSibling && row.nextElementSibling.classList.contains('probe-params')) continue;

      const container = document.createElement('div');
      container.className = 'probe-params';
      container.dataset.probeParamsFor = type;

      for (const p of params) {
        const id = `pp-${type}-${p.key}`;
        const current = rp(type, p.key);
        const rowEl = document.createElement('div');
        rowEl.className = 'probe-param-row';
        rowEl.innerHTML = `
          <span class="probe-param-label">${p.label}</span>
          <input id="${id}" class="probe-param-slider" type="range"
            min="${p.min}" max="${p.max}" step="${p.step}" value="${current}">
          <span class="probe-param-value" id="${id}-val">${fmt(current, p)}</span>
        `;
        container.appendChild(rowEl);

        // Wire up
        const slider = rowEl.querySelector(`#${id}`);
        const valueEl = rowEl.querySelector(`#${id}-val`);
        slider.addEventListener('input', () => {
          const v = Number(slider.value);
          CONFIG.probes.runnerParams[type][p.key] = v;
          valueEl.textContent = fmt(v, p);
        });
      }

      row.insertAdjacentElement('afterend', container);
    }
  }

  function fmt(v, p) {
    if (p.step < 0.01) return v.toFixed(4);
    if (p.step < 0.1) return v.toFixed(2);
    return v.toFixed(2);
  }

  // ── Override computeRunnerDelta to use stored params ──────
  // We wrap the global computeRunnerDelta that was defined in the
  // runner types accordion script (it's a closure var there, but
  // ProbeSimulator._step calls applyRunnerDynamics which calls it).
  // Since computeRunnerDelta is a local closure, we patch
  // applyRunnerDynamics by overriding ProbeSimulator._step with
  // param-aware versions embedded inline.

  const _origStep = ProbeSimulator.prototype._step;
  ProbeSimulator.prototype._step = function() {
    if (this._mode3D && this._runnerImpl === 'unified3d') {
      if (!this._running || !this._surface3D || !this._surface3D.hasParamField || !this._surface3D.hasParamField()) return;
      const field = this._surface3D.getParamField();
      const m = Math.max(1, Math.floor(field.m || 1));
      const vMax = Math.max(0.1, Number(field.vMax || 1));
      const probes = this._probes3D || [];

      // Rebuild spatial index inline (same logic as runner types patch)
      const cellU = Math.max(1.2, m / 44);
      const cellV = Math.max(0.06, vMax / 10);
      const uCells = Math.max(1, Math.ceil(m / cellU));
      const spatialMap = new Map();
      for (let i = 0; i < probes.length; i++) {
        const p = probes[i];
        if (!p || p.life <= 0) continue;
        const cu = ((Math.floor(p.u / cellU) % uCells) + uCells) % uCells;
        const cv = Math.floor((p.v + vMax) / cellV);
        const key = cu + '|' + cv;
        if (!spatialMap.has(key)) spatialMap.set(key, []);
        spatialMap.get(key).push(i);
      }
      const spatial = { map: spatialMap, cellU, cellV, uCells };

      function wrapU(u, m) { return ((u % m) + m) % m; }
      function modDeltaU(a, b, m) { let d = a - b; if (d > m/2) d -= m; if (d < -m/2) d += m; return d; }
      function norm2(x, y) { const mag = Math.hypot(x, y); if (mag < 1e-9) return {x:0,y:0}; return {x:x/mag,y:y/mag}; }

      function gatherNeighbors(idx) {
        const p = probes[idx];
        const cu = ((Math.floor(p.u / cellU) % uCells) + uCells) % uCells;
        const cv = Math.floor((p.v + vMax) / cellV);
        const out = []; const seen = new Set();
        for (let du = -1; du <= 1; du++) {
          for (let dv = -1; dv <= 1; dv++) {
            const uc = ((cu + du) % uCells + uCells) % uCells;
            const vc = cv + dv;
            const bucket = spatialMap.get(uc + '|' + vc);
            if (!bucket) continue;
            for (const j of bucket) {
              if (j === idx || seen.has(j)) continue;
              const q = probes[j]; if (!q || q.life <= 0) continue;
              const duu = modDeltaU(q.u, p.u, m);
              const dvv = q.v - p.v;
              const d2 = duu*duu + dvv*dvv;
              if (d2 > 2.25) continue;
              seen.add(j);
              out.push({probe:q, du:duu, dv:dvv, d2});
              if (out.length >= 10) return out;
            }
          }
        }
        return out;
      }

      function computeDelta(type, p, g, neighbors) {
        const nb_nearest = neighbors.reduce((b,n) => n.d2 < (b ? b.d2 : Infinity) ? n : b, null);
        const nb_count = neighbors.length;
        let avgVU=0,avgVV=0,avgPU=0,avgPV=0,repU=0,repV=0;
        for (const n of neighbors) {
          const q = n.probe;
          avgVU += q.du||0; avgVV += q.dv||0;
          avgPU += p.u + n.du; avgPV += p.v + n.dv;
          const sd2 = Math.max(0.0025, n.d2);
          repU -= n.du/sd2; repV -= n.dv/sd2;
        }
        const cnt = nb_count || 1;
        avgVU/=cnt; avgVV/=cnt; avgPU/=cnt; avgPV/=cnt;

        let gu = -g.du, gv_ = -g.dv;
        const gr = norm2(gu, gv_); gu = gr.x; gv_ = gr.y;
        const ts = (p._turnSign != null ? p._turnSign : (p._turnSign = Math.random()<0.5?-1:1));
        const tu = -gv_ * ts, tv = gu * ts;

        let duAdd=0, dvAdd=0;

        if (type === 'drifter') {
          const tW = rp('drifter','tangential'), gW = rp('drifter','gradient'), nW = rp('drifter','noise');
          duAdd = tu*tW + gu*gW + (Math.random()-0.5)*nW*2;
          dvAdd = tv*tW*0.67 + gv_*gW + (Math.random()-0.5)*nW*2;
        } else if (type === 'seeker') {
          duAdd = gu*rp('seeker','gradient') + tu*rp('seeker','tangential');
          dvAdd = gv_*rp('seeker','gradient') + tv*rp('seeker','tangential');
        } else if (type === 'explorer') {
          const nW = rp('explorer','noise'), tW = rp('explorer','tangential');
          duAdd = tu*tW + gu*0.006 + (Math.random()-0.5)*nW*2;
          dvAdd = tv*tW*0.81 + gv_*0.004 + (Math.random()-0.5)*nW*2;
        } else if (type === 'crosser') {
          const spW = rp('crosser','seam_push'), tW = rp('crosser','tangential');
          const seamPush = Math.abs(p.v) < (vMax*0.18) ? (p.v>=0 ? -spW : spW) : 0;
          duAdd = tu*tW + gu*0.008;
          dvAdd = tv*tW*0.83 + gv_*0.008 + seamPush;
        } else if (type === 'deflector') {
          const dW = rp('deflector','deflect_strength'), rW = rp('deflector','repulse_strength');
          duAdd = tu*0.014 + gu*0.006;
          dvAdd = tv*0.010 + gv_*0.006;
          if (nb_nearest && nb_nearest.d2 < 0.045) {
            const turn = norm2(-nb_nearest.dv, nb_nearest.du);
            const sign = (p._deflectSign = -(p._deflectSign||1));
            duAdd += turn.x*dW*sign - nb_nearest.du*0.024;
            dvAdd += turn.y*dW*sign - nb_nearest.dv*0.024;
          }
          duAdd += repU*rW; dvAdd += repV*rW;
        } else if (type === 'shaper') {
          const rW = rp('shaper','repulse_strength');
          duAdd = tu*0.014 + gu*0.006 + repU*rW;
          dvAdd = tv*0.010 + gv_*0.006 + repV*rW;
        } else if (type === 'orbiter') {
          const oW = rp('orbiter','orbit_strength'), rbW = rp('orbiter','radius_bias');
          if (nb_nearest) {
            const toward = norm2(nb_nearest.du, nb_nearest.dv);
            const os = (p._turnSign != null ? p._turnSign : (p._turnSign = Math.random()<0.5?-1:1));
            const orb = {x:-toward.y*os, y:toward.x*os};
            const rBias = Math.sqrt(nb_nearest.d2) - 0.32;
            duAdd = orb.x*oW - toward.x*rBias*rbW + gu*0.004;
            dvAdd = orb.y*oW - toward.y*rBias*rbW + gv_*0.004;
          } else {
            duAdd = tu*0.020 + gu*0.004;
            dvAdd = tv*0.016 + gv_*0.003;
          }
        } else if (type === 'flocker') {
          const aW = rp('flocker','alignment'), cW = rp('flocker','cohesion');
          duAdd = tu*0.010 + gu*0.006;
          dvAdd = tv*0.008 + gv_*0.006;
          if (nb_count) {
            duAdd += avgVU*aW + modDeltaU(avgPU, p.u, m)*cW + repU*0.0012;
            dvAdd += avgVV*aW + (avgPV - p.v)*cW + repV*0.0012;
          }
        } else if (type === 'ridgewalker') {
          const tW = rp('ridgewalker','tangential'), bW = rp('ridgewalker','band_lock');
          const targetBand = p._ridgeBand != null ? p._ridgeBand : (p._ridgeBand = Math.abs(p.v));
          duAdd = tu*tW + gu*0.002;
          dvAdd = tv*0.004 + (Math.sign(p.v||1)*targetBand - p.v)*bW;
        } else if (type === 'randomwalk') {
          const ss = rp('randomwalk','step_size');
          const angle = Math.random()*Math.PI*2;
          duAdd = Math.cos(angle)*ss;
          dvAdd = Math.sin(angle)*ss;
        } else {
          duAdd = tu*0.018 + gu*0.010 + (Math.random()-0.5)*0.0022;
          dvAdd = tv*0.012 + gv_*0.008 + (Math.random()-0.5)*0.0020;
        }
        return { duAdd, dvAdd };
      }

      // Shaper field application (inline)
      function applyShaper(baseG, p, neighbors) {
        const g = { du: baseG.du, dv: baseG.dv };
        for (const n of neighbors) {
          const q = n.probe;
          const qType = q.runnerType || 'drifter';
          const isShaperQ = qType === 'shaper' || (
            CONFIG.probes.compositeTypes && CONFIG.probes.compositeTypes[qType] &&
            CONFIG.probes.compositeTypes[qType].members && CONFIG.probes.compositeTypes[qType].members['shaper']
          );
          if (!isShaperQ) continue;
          const d2 = Math.max(0.0005, n.d2);
          const infl = Math.exp(-d2/0.18);
          const dir = norm2(n.du, n.dv);
          const sign = (q._turnSign != null ? q._turnSign : (q._turnSign = Math.random()<0.5?-1:1));
          const swirlW = rp('shaper','swirl_strength');
          g.du += (-dir.x*0.16 + (-dir.y*sign)*swirlW) * infl;
          g.dv += (-dir.y*0.16 + ( dir.x*sign)*swirlW) * infl;
        }
        return g;
      }

      function getBehaviors(type) {
        const COMPOSITE_KEYS = ['multi1','multi2','multi3'];
        if (COMPOSITE_KEYS.includes(type)) {
          const cfg = CONFIG.probes.compositeTypes && CONFIG.probes.compositeTypes[type];
          if (!cfg || !cfg.members) return ['drifter'];
          const keys = Object.entries(cfg.members).filter(([,v])=>v).map(([k])=>k);
          return keys.length ? keys : ['drifter'];
        }
        return [type];
      }

      const speedLimits = {
        drifter:0.36, seeker:0.32, explorer:0.44, crosser:0.36,
        deflector:0.38, shaper:0.30, orbiter:0.40, flocker:0.34,
        ridgewalker:0.31, randomwalk:0.42
      };

      for (let i = 0; i < probes.length; i++) {
        const p = probes[i];
        if (p.life <= 0) continue;
        const neighbors = gatherNeighbors(i);
        let g = field.gradientUV(p.u, p.v);
        g = applyShaper(g, p, neighbors);

        const behaviors = getBehaviors(p.runnerType || 'drifter');
        let duAdd=0, dvAdd=0;
        for (const btype of behaviors) {
          const d = computeDelta(btype, p, g, neighbors);
          duAdd += d.duAdd; dvAdd += d.dvAdd;
        }
        duAdd /= Math.max(1, behaviors.length);
        dvAdd /= Math.max(1, behaviors.length);
        if (behaviors.length > 1) {
          duAdd += (Math.random()-0.5)*0.0012;
          dvAdd += (Math.random()-0.5)*0.0012;
        }

  // ----------------------------------------------------------

    function selectedTypes(){

        .filter(([,v]) => v).map(([k]) => k);
      const comp = COMPOSITE_KEYS.filter(k =>
        CONFIG.probes.compositeTypes &&
        CONFIG.probes.compositeTypes[k] &&
        CONFIG.probes.compositeTypes[k].enabled);
      const all = base.concat(comp);
      return all.length ? all : ['drifter'];

    const runnerTypes = selectedTypes();
    const total = CONFIG.probes.count;
    const mix = [];
    for (let i = 0; i < total; i++) mix.push(runnerTypes[i % runnerTypes.length]);
    for (let i = mix.length - 1; i > 0; i--){

    this._running    = true;

        deflector:0, shaper:195, orbiter:52, flocker:150,
        ridgewalker:265, randomwalk:18,
        multi1:315, multi2:200, multi3:80

      return (hues[t] || 210) + Math.random() * 18;
    }

    for (let i = 0; i < total; i++){
      const type = mix[i];
      const u    = Math.random() * m;

      // Spawn uniformly across both sheets.
      // Even index -> upper sheet (v > 0)
      // Odd index  -> lower sheet (v < 0)
      const absV = 0.05 * vMax + Math.random() * 0.95 * vMax;
      const v    = (i % 2 === 0) ? absV : -absV;

      const wp = field.sampleWorld(u, v);

      this._probes3D.push({
        u, v,
        du: (Math.random() - 0.5) * 0.04,
        dv: (Math.random() - 0.5) * 0.04,
        x: wp.x, y: wp.y, z: wp.z,
        life:         CONFIG.probes.steps,
        runnerType:   type,
        color:        colorForType(type),
        hue:          hueForType(type),
        _turnSign:    Math.random() < 0.5 ? -1 : 1,
        _deflectSign: Math.random() < 0.5 ? -1 : 1
      });
    }

    if (this._surface3D.setProbeMarkers)
      this._surface3D.setProbeMarkers(this._probes3D);

    const wb = window._workbench;
    if (wb && wb._seed) wb._seed.selectedRunnerTypes = runnerTypes.slice();

    this._step();
  };


  // ----------------------------------------------------------
  // 3. PROBE STEP — clean, no seam handling
  // v ranges freely. Reflect only at +-vMax.
  // sampleWorld called with actual signed v.
  // ----------------------------------------------------------

  ProbeSimulator.prototype._step = function(){

    if (this._mode3D && this._runnerImpl === 'unified3d'){
      if (!this._running || !this._surface3D ||
          !this._surface3D.hasParamField ||
          !this._surface3D.hasParamField()) return;

      const field  = this._surface3D.getParamField();
      const m      = Math.max(1, Math.floor(field.m  || 1));
      const vMax   = Math.max(0.1, Number(field.vMax || 1));
      const probes = this._probes3D || [];

      // Spatial index.
      const cellU  = Math.max(1.2, m / 44);
      const cellV  = Math.max(0.06, vMax / 10);
      const uCells = Math.max(1, Math.ceil(m / cellU));
      const sMap   = new Map();
      for (let i = 0; i < probes.length; i++){
        const p = probes[i];
        if (!p || p.life <= 0) continue;
        const cu  = ((Math.floor(p.u / cellU) % uCells) + uCells) % uCells;
        // Use signed v for cell lookup so upper and lower sheet
        // probes don't incorrectly share neighbor cells.
        const cv  = Math.floor((p.v + vMax) / cellV);
        const key = cu + '|' + cv;
        if (!sMap.has(key)) sMap.set(key, []);
        sMap.get(key).push(i);
      }

      function modDeltaU(a, b){ let d=a-b; if(d>m/2)d-=m; if(d<-m/2)d+=m; return d; }
      function wrapU(u){ return ((u%m)+m)%m; }
      function norm2(x,y){ const mg=Math.hypot(x,y); if(mg<1e-9)return{x:0,y:0}; return{x:x/mg,y:y/mg}; }

      function gatherNeighbors(idx){
        const p  = probes[idx];
        const cu = ((Math.floor(p.u / cellU) % uCells) + uCells) % uCells;
        const cv = Math.floor((p.v + vMax) / cellV);
        const out = []; const seen = new Set();
        for (let du=-1; du<=1; du++){
          for (let dv=-1; dv<=1; dv++){
            const uc  = ((cu+du)%uCells+uCells)%uCells;
            const key = uc+'|'+(cv+dv);
            const bkt = sMap.get(key);
            if (!bkt) continue;
            for (const j of bkt){
              if (j===idx||seen.has(j)) continue;
              const q=probes[j]; if(!q||q.life<=0) continue;
              const duu=modDeltaU(q.u, p.u);
              const dvv=q.v - p.v;
              const d2 =duu*duu+dvv*dvv;
              if (d2>2.25) continue;
              seen.add(j);
              out.push({probe:q, du:duu, dv:dvv, d2});
              if (out.length>=10) return out;
            }
          }
        }
        return out;
      }

      function applyShaper(baseG, p, neighbors){
        const g={du:baseG.du, dv:baseG.dv};
        for (const n of neighbors){
          const q=n.probe; const qt=q.runnerType||'drifter';
          const isShaper=qt==='shaper'||(
            CONFIG.probes.compositeTypes&&
            CONFIG.probes.compositeTypes[qt]&&
            CONFIG.probes.compositeTypes[qt].members&&
            CONFIG.probes.compositeTypes[qt].members['shaper']);
          if (!isShaper) continue;
          const d2=Math.max(0.0005,n.d2);
          const infl=Math.exp(-d2/0.18);
          const dir=norm2(n.du,n.dv);
          const sign=(q._turnSign!=null?q._turnSign:(q._turnSign=Math.random()<0.5?-1:1));
          const sw=(CONFIG.probes.runnerParams&&CONFIG.probes.runnerParams.shaper&&
                    CONFIG.probes.runnerParams.shaper.swirl_strength)||0.08;
          g.du+=(-dir.x*0.16+(-dir.y*sign)*sw)*infl;
          g.dv+=(-dir.y*0.16+( dir.x*sign)*sw)*infl;
        }
        return g;
      }

      function rp(type, key){
        return (CONFIG.probes.runnerParams&&
                CONFIG.probes.runnerParams[type]&&
                CONFIG.probes.runnerParams[type][key]!=null)
          ? CONFIG.probes.runnerParams[type][key] : 0;
      }

      function getBehaviors(type){
        const COMP=['multi1','multi2','multi3'];
        if (COMP.includes(type)){
          const cfg=CONFIG.probes.compositeTypes&&CONFIG.probes.compositeTypes[type];
          if (!cfg||!cfg.members) return ['drifter'];
          const keys=Object.entries(cfg.members).filter(([,v])=>v).map(([k])=>k);
          return keys.length?keys:['drifter'];
        }
        return [type];
      }

      function computeDelta(type, p, g, neighbors){
        let avgVU=0,avgVV=0,avgPU=0,avgPV=0,repU=0,repV=0;
        let nb_nearest=null, nb_nearestD2=Infinity;
        for (const n of neighbors){
          const q=n.probe;
          avgVU+=q.du||0; avgVV+=q.dv||0;
          avgPU+=p.u+n.du; avgPV+=p.v+n.dv;
          const sd2=Math.max(0.0025,n.d2);
          repU-=n.du/sd2; repV-=n.dv/sd2;
          if(n.d2<nb_nearestD2){nb_nearestD2=n.d2;nb_nearest=n;}
        }
        const cnt=neighbors.length||1;
        avgVU/=cnt; avgVV/=cnt; avgPU/=cnt; avgPV/=cnt;

        let gu=-g.du, gv_=-g.dv;
        const gr=norm2(gu,gv_); gu=gr.x; gv_=gr.y;
        const ts=(p._turnSign!=null?p._turnSign:(p._turnSign=Math.random()<0.5?-1:1));
        const tu=-gv_*ts, tv=gu*ts;

        let duAdd=0, dvAdd=0;

        if (type==='drifter'){
          const tW=rp('drifter','tangential')||0.018;
          const gW=rp('drifter','gradient')||0.010;
          const nW=rp('drifter','noise')||0.0022;
          duAdd=tu*tW+gu*gW+(Math.random()-0.5)*nW*2;
          dvAdd=tv*tW*0.67+gv_*gW+(Math.random()-0.5)*nW*2;
        } else if (type==='seeker'){
          duAdd=gu*(rp('seeker','gradient')||0.022)+tu*(rp('seeker','tangential')||0.006);
          dvAdd=gv_*(rp('seeker','gradient')||0.022)+tv*(rp('seeker','tangential')||0.006);
        } else if (type==='explorer'){
          const tW=rp('explorer','tangential')||0.021;
          const nW=rp('explorer','noise')||0.0042;
          duAdd=tu*tW+gu*0.006+(Math.random()-0.5)*nW*2;
          dvAdd=tv*tW*0.81+gv_*0.004+(Math.random()-0.5)*nW*2;
        } else if (type==='crosser'){
          // Strong dv so crossers naturally traverse the seam.
          const tW=rp('crosser','tangential')||0.012;
          duAdd=tu*tW+gu*0.008;
          dvAdd=tv*tW*0.83+gv_*0.018;
        } else if (type==='deflector'){
          const dW=rp('deflector','deflect_strength')||0.055;
          const rW=rp('deflector','repulse_strength')||0.003;
          duAdd=tu*0.014+gu*0.006;
          dvAdd=tv*0.010+gv_*0.006;
          if (nb_nearest&&nb_nearestD2<0.045){
            const turn=norm2(-nb_nearest.dv,nb_nearest.du);
            const sign=(p._deflectSign=-(p._deflectSign||1));
            duAdd+=turn.x*dW*sign-nb_nearest.du*0.024;
            dvAdd+=turn.y*dW*sign-nb_nearest.dv*0.024;
          }
          duAdd+=repU*rW; dvAdd+=repV*rW;
        } else if (type==='shaper'){
          const rW=rp('shaper','repulse_strength')||0.0015;
          duAdd=tu*0.014+gu*0.006+repU*rW;
          dvAdd=tv*0.010+gv_*0.006+repV*rW;
        } else if (type==='orbiter'){
          const oW=rp('orbiter','orbit_strength')||0.032;
          const rbW=rp('orbiter','radius_bias')||0.022;
          if (nb_nearest){
            const toward=norm2(nb_nearest.du,nb_nearest.dv);
            const os=(p._turnSign!=null?p._turnSign:(p._turnSign=Math.random()<0.5?-1:1));
            const orb={x:-toward.y*os,y:toward.x*os};
            const rBias=Math.sqrt(nb_nearestD2)-0.32;
            duAdd=orb.x*oW-toward.x*rBias*rbW+gu*0.004;
            dvAdd=orb.y*oW-toward.y*rBias*rbW+gv_*0.004;
          } else {
            duAdd=tu*0.020+gu*0.004;
            dvAdd=tv*0.016+gv_*0.003;
          }
        } else if (type==='flocker'){
          const aW=rp('flocker','alignment')||0.14;
          const cW=rp('flocker','cohesion')||0.010;
          duAdd=tu*0.010+gu*0.006;
          dvAdd=tv*0.008+gv_*0.006;
          if (neighbors.length){
            duAdd+=avgVU*aW+modDeltaU(avgPU, p.u)*cW+repU*0.0012;
            dvAdd+=avgVV*aW+(avgPV-p.v)*cW+repV*0.0012;
          }
        } else if (type==='ridgewalker'){
          const tW=rp('ridgewalker','tangential')||0.028;
          const bW=rp('ridgewalker','band_lock')||0.014;
          // Target a signed v band — stays on whichever sheet it spawned on.
          const targetBand=(p._ridgeBand!=null?p._ridgeBand:(p._ridgeBand=p.v));
          duAdd=tu*tW+gu*0.002;
          dvAdd=tv*0.004+(targetBand-p.v)*bW;
        } else if (type==='randomwalk'){
          const ss=rp('randomwalk','step_size')||0.028;
          const angle=Math.random()*Math.PI*2;
          duAdd=Math.cos(angle)*ss;
          dvAdd=Math.sin(angle)*ss;
        } else {
          duAdd=tu*0.018+gu*0.010+(Math.random()-0.5)*0.0022;
          dvAdd=tv*0.012+gv_*0.008+(Math.random()-0.5)*0.0020;
        }
        return {duAdd, dvAdd};
      }

      const speedLimits={
        drifter:0.36, seeker:0.32, explorer:0.44, crosser:0.40,
        deflector:0.38, shaper:0.30, orbiter:0.40, flocker:0.34,
        ridgewalker:0.31, randomwalk:0.42
      };

      for (let i=0; i<probes.length; i++){
        const p=probes[i];
        if (p.life<=0) continue;

        const neighbors=gatherNeighbors(i);
        let g=field.gradientUV(p.u, p.v);
        g=applyShaper(g, p, neighbors);

        const behaviors=getBehaviors(p.runnerType||'drifter');
        let duAdd=0, dvAdd=0;
        for (const btype of behaviors){
          const d=computeDelta(btype,p,g,neighbors);
          duAdd+=d.duAdd; dvAdd+=d.dvAdd;
        }
        duAdd/=Math.max(1,behaviors.length);
        dvAdd/=Math.max(1,behaviors.length);
        if (behaviors.length>1){
          duAdd+=(Math.random()-0.5)*0.0012;
          dvAdd+=(Math.random()-0.5)*0.0012;
        }

        p.du=(p.du+duAdd)*CONFIG.probes.damping;
        p.dv=(p.dv+dvAdd)*CONFIG.probes.damping;

        const stype=p.runnerType||'drifter';
        let speedLimit=speedLimits[stype]||0.36;
        if (['multi1','multi2','multi3'].includes(stype)){
          const bkeys=getBehaviors(stype);
          speedLimit=Math.min(0.46,
            bkeys.reduce((s,k)=>s+(speedLimits[k]||0.36),0)/
            Math.max(1,bkeys.length)+0.03);
        }
        const spd=Math.hypot(p.du,p.dv);
        if (spd>speedLimit){p.du*=speedLimit/spd; p.dv*=speedLimit/spd;}

        p.u=wrapU(p.u+p.du);
        p.v=p.v+p.dv;

        // ================================================
        // BOUNDARY CONDITIONS — simple and correct.
        // Reflect only at the true edges +-vMax.
        // v=0 is not a boundary. Probes pass through freely.
        // ================================================
        if (p.v > vMax){ p.v = 2*vMax - p.v; p.dv = -p.dv; }
        if (p.v < -vMax){ p.v = -2*vMax - p.v; p.dv = -p.dv; }

        // Sample world with actual signed v.
        const wp=field.sampleWorld(p.u, p.v);
        p.x=wp.x; p.y=wp.y; p.z=wp.z;
        p.life--;
      }

      if (this._surface3D.updateProbeMarkers)
        this._surface3D.updateProbeMarkers(probes);

      this._animId=requestAnimationFrame(()=>this._step());
      return;
    }

    if (typeof this._step2D==='function') return this._step2D();
  };


  // ----------------------------------------------------------
  // 4. HIDE OBSOLETE UI
  // ----------------------------------------------------------

  function hideObsoleteUI(){
    const card=document.getElementById('intersection-influence-card');
    if (card) card.style.display='none';
    const oldSlider=document.getElementById('planeInfluenceSlider');
    if (oldSlider){
      const wrap=oldSlider.parentElement;
      if (wrap) wrap.style.display='none';
    }
  }
  if (document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', hideObsoleteUI);
  } else {
    setTimeout(hideObsoleteUI, 200);
  }


  // ----------------------------------------------------------
  // 5. LOG
  // ----------------------------------------------------------

  document.addEventListener('DOMContentLoaded', ()=>{
    const wb=window._workbench;
    if (!wb||typeof wb._log!=='function') return;
    wb._log('Seam patch v3: both sheets active, v=0 transparent.','info');
  });

})();

    this._probes3D   = [];

    function colorForType(t){
      return (CONFIG.probes.runnerColors && CONFIG.probes.runnerColors[t]) || '#7cb8ff';
    }
    function hueForType(t){
      const hues = {
        drifter:220, seeker:35, explorer:290, crosser:120,
        deflector:0, shaper:195, orbiter:52, flocker:150,
        ridgewalker:265, randomwalk:18,
        multi1:315, multi2:200, multi3:80
      };
      return (hues[t] || 210) + Math.random() * 18;
    }

    for (let i = 0; i < total; i++){
      const type = mix[i];
      const u    = Math.random() * m;

      // Spawn uniformly across both sheets.
      // Even index -> upper sheet (v > 0)
      // Odd index  -> lower sheet (v < 0)
      const absV = 0.05 * vMax + Math.random() * 0.95 * vMax;
      const v    = (i % 2 === 0) ? absV : -absV;

      const wp = field.sampleWorld(u, v);

      this._probes3D.push({
        u, v,
        du: (Math.random() - 0.5) * 0.04,
        dv: (Math.random() - 0.5) * 0.04,
        x: wp.x, y: wp.y, z: wp.z,
        life:         CONFIG.probes.steps,
        runnerType:   type,
        color:        colorForType(type),
        hue:          hueForType(type),
        _turnSign:    Math.random() < 0.5 ? -1 : 1,
        _deflectSign: Math.random() < 0.5 ? -1 : 1
      });
    }

    if (this._surface3D.setProbeMarkers)
      this._surface3D.setProbeMarkers(this._probes3D);

    const wb = window._workbench;
    if (wb && wb._seed) wb._seed.selectedRunnerTypes = runnerTypes.slice();

    this._step();
  };


  // ----------------------------------------------------------
  // 3. PROBE STEP — clean, no seam handling
  // v ranges freely. Reflect only at +-vMax.
  // sampleWorld called with actual signed v.
  // ----------------------------------------------------------

  ProbeSimulator.prototype._step = function(){

    if (this._mode3D && this._runnerImpl === 'unified3d'){
      if (!this._running || !this._surface3D ||
          !this._surface3D.hasParamField ||
          !this._surface3D.hasParamField()) return;

      const field  = this._surface3D.getParamField();
      const m      = Math.max(1, Math.floor(field.m  || 1));
      const vMax   = Math.max(0.1, Number(field.vMax || 1));
      const probes = this._probes3D || [];

      // Spatial index.
      const cellU  = Math.max(1.2, m / 44);
      const cellV  = Math.max(0.06, vMax / 10);
      const uCells = Math.max(1, Math.ceil(m / cellU));
      const sMap   = new Map();
      for (let i = 0; i < probes.length; i++){
        const p = probes[i];
        if (!p || p.life <= 0) continue;
        const cu  = ((Math.floor(p.u / cellU) % uCells) + uCells) % uCells;
        // Use signed v for cell lookup so upper and lower sheet
        // probes don't incorrectly share neighbor cells.
        const cv  = Math.floor((p.v + vMax) / cellV);
        const key = cu + '|' + cv;
        if (!sMap.has(key)) sMap.set(key, []);
        sMap.get(key).push(i);
      }

      function modDeltaU(a, b){ let d=a-b; if(d>m/2)d-=m; if(d<-m/2)d+=m; return d; }
      function wrapU(u){ return ((u%m)+m)%m; }
      function norm2(x,y){ const mg=Math.hypot(x,y); if(mg<1e-9)return{x:0,y:0}; return{x:x/mg,y:y/mg}; }

      function gatherNeighbors(idx){
        const p  = probes[idx];
        const cu = ((Math.floor(p.u / cellU) % uCells) + uCells) % uCells;
        const cv = Math.floor((p.v + vMax) / cellV);
        const out = []; const seen = new Set();
        for (let du=-1; du<=1; du++){
          for (let dv=-1; dv<=1; dv++){
            const uc  = ((cu+du)%uCells+uCells)%uCells;
            const key = uc+'|'+(cv+dv);
            const bkt = sMap.get(key);
            if (!bkt) continue;
            for (const j of bkt){
              if (j===idx||seen.has(j)) continue;
              const q=probes[j]; if(!q||q.life<=0) continue;
              const duu=modDeltaU(q.u, p.u);
              const dvv=q.v - p.v;
              const d2 =duu*duu+dvv*dvv;
              if (d2>2.25) continue;
              seen.add(j);
              out.push({probe:q, du:duu, dv:dvv, d2});
              if (out.length>=10) return out;
            }
          }
        }
        return out;
      }

      function applyShaper(baseG, p, neighbors){
        const g={du:baseG.du, dv:baseG.dv};
        for (const n of neighbors){
          const q=n.probe; const qt=q.runnerType||'drifter';
          const isShaper=qt==='shaper'||(
            CONFIG.probes.compositeTypes&&
            CONFIG.probes.compositeTypes[qt]&&
            CONFIG.probes.compositeTypes[qt].members&&
            CONFIG.probes.compositeTypes[qt].members['shaper']);
          if (!isShaper) continue;
          const d2=Math.max(0.0005,n.d2);
          const infl=Math.exp(-d2/0.18);
          const dir=norm2(n.du,n.dv);
          const sign=(q._turnSign!=null?q._turnSign:(q._turnSign=Math.random()<0.5?-1:1));
          const sw=(CONFIG.probes.runnerParams&&CONFIG.probes.runnerParams.shaper&&
                    CONFIG.probes.runnerParams.shaper.swirl_strength)||0.08;
          g.du+=(-dir.x*0.16+(-dir.y*sign)*sw)*infl;
          g.dv+=(-dir.y*0.16+( dir.x*sign)*sw)*infl;
        }
        return g;
      }

      function rp(type, key){
        return (CONFIG.probes.runnerParams&&
                CONFIG.probes.runnerParams[type]&&
                CONFIG.probes.runnerParams[type][key]!=null)
          ? CONFIG.probes.runnerParams[type][key] : 0;
      }

      function getBehaviors(type){
        const COMP=['multi1','multi2','multi3'];
        if (COMP.includes(type)){
          const cfg=CONFIG.probes.compositeTypes&&CONFIG.probes.compositeTypes[type];
          if (!cfg||!cfg.members) return ['drifter'];
          const keys=Object.entries(cfg.members).filter(([,v])=>v).map(([k])=>k);
          return keys.length?keys:['drifter'];
        }
        return [type];
      }

      function computeDelta(type, p, g, neighbors){
        let avgVU=0,avgVV=0,avgPU=0,avgPV=0,repU=0,repV=0;
        let nb_nearest=null, nb_nearestD2=Infinity;
        for (const n of neighbors){
          const q=n.probe;
          avgVU+=q.du||0; avgVV+=q.dv||0;
          avgPU+=p.u+n.du; avgPV+=p.v+n.dv;
          const sd2=Math.max(0.0025,n.d2);
          repU-=n.du/sd2; repV-=n.dv/sd2;
          if(n.d2<nb_nearestD2){nb_nearestD2=n.d2;nb_nearest=n;}
        }
        const cnt=neighbors.length||1;
        avgVU/=cnt; avgVV/=cnt; avgPU/=cnt; avgPV/=cnt;

        let gu=-g.du, gv_=-g.dv;
        const gr=norm2(gu,gv_); gu=gr.x; gv_=gr.y;
        const ts=(p._turnSign!=null?p._turnSign:(p._turnSign=Math.random()<0.5?-1:1));
        const tu=-gv_*ts, tv=gu*ts;

        let duAdd=0, dvAdd=0;

        if (type==='drifter'){
          const tW=rp('drifter','tangential')||0.018;
          const gW=rp('drifter','gradient')||0.010;
          const nW=rp('drifter','noise')||0.0022;
          duAdd=tu*tW+gu*gW+(Math.random()-0.5)*nW*2;
          dvAdd=tv*tW*0.67+gv_*gW+(Math.random()-0.5)*nW*2;
        } else if (type==='seeker'){
          duAdd=gu*(rp('seeker','gradient')||0.022)+tu*(rp('seeker','tangential')||0.006);
          dvAdd=gv_*(rp('seeker','gradient')||0.022)+tv*(rp('seeker','tangential')||0.006);
        } else if (type==='explorer'){
          const tW=rp('explorer','tangential')||0.021;
          const nW=rp('explorer','noise')||0.0042;
          duAdd=tu*tW+gu*0.006+(Math.random()-0.5)*nW*2;
          dvAdd=tv*tW*0.81+gv_*0.004+(Math.random()-0.5)*nW*2;
        } else if (type==='crosser'){
          // Strong dv so crossers naturally traverse the seam.
          const tW=rp('crosser','tangential')||0.012;
          duAdd=tu*tW+gu*0.008;
          dvAdd=tv*tW*0.83+gv_*0.018;
        } else if (type==='deflector'){
          const dW=rp('deflector','deflect_strength')||0.055;
          const rW=rp('deflector','repulse_strength')||0.003;
          duAdd=tu*0.014+gu*0.006;
          dvAdd=tv*0.010+gv_*0.006;
          if (nb_nearest&&nb_nearestD2<0.045){
            const turn=norm2(-nb_nearest.dv,nb_nearest.du);
            const sign=(p._deflectSign=-(p._deflectSign||1));
            duAdd+=turn.x*dW*sign-nb_nearest.du*0.024;
            dvAdd+=turn.y*dW*sign-nb_nearest.dv*0.024;
          }
          duAdd+=repU*rW; dvAdd+=repV*rW;
        } else if (type==='shaper'){
          const rW=rp('shaper','repulse_strength')||0.0015;
          duAdd=tu*0.014+gu*0.006+repU*rW;
          dvAdd=tv*0.010+gv_*0.006+repV*rW;
        } else if (type==='orbiter'){
          const oW=rp('orbiter','orbit_strength')||0.032;
          const rbW=rp('orbiter','radius_bias')||0.022;
          if (nb_nearest){
            const toward=norm2(nb_nearest.du,nb_nearest.dv);
            const os=(p._turnSign!=null?p._turnSign:(p._turnSign=Math.random()<0.5?-1:1));
            const orb={x:-toward.y*os,y:toward.x*os};
            const rBias=Math.sqrt(nb_nearestD2)-0.32;
            duAdd=orb.x*oW-toward.x*rBias*rbW+gu*0.004;
            dvAdd=orb.y*oW-toward.y*rBias*rbW+gv_*0.004;
          } else {
            duAdd=tu*0.020+gu*0.004;
            dvAdd=tv*0.016+gv_*0.003;
          }
        } else if (type==='flocker'){
          const aW=rp('flocker','alignment')||0.14;
          const cW=rp('flocker','cohesion')||0.010;
          duAdd=tu*0.010+gu*0.006;
          dvAdd=tv*0.008+gv_*0.006;
          if (neighbors.length){
            duAdd+=avgVU*aW+modDeltaU(avgPU, p.u)*cW+repU*0.0012;
            dvAdd+=avgVV*aW+(avgPV-p.v)*cW+repV*0.0012;
          }
        } else if (type==='ridgewalker'){
          const tW=rp('ridgewalker','tangential')||0.028;
          const bW=rp('ridgewalker','band_lock')||0.014;
          // Target a signed v band — stays on whichever sheet it spawned on.
          const targetBand=(p._ridgeBand!=null?p._ridgeBand:(p._ridgeBand=p.v));
          duAdd=tu*tW+gu*0.002;
          dvAdd=tv*0.004+(targetBand-p.v)*bW;
        } else if (type==='randomwalk'){
          const ss=rp('randomwalk','step_size')||0.028;
          const angle=Math.random()*Math.PI*2;
          duAdd=Math.cos(angle)*ss;
          dvAdd=Math.sin(angle)*ss;
        } else {
          duAdd=tu*0.018+gu*0.010+(Math.random()-0.5)*0.0022;
          dvAdd=tv*0.012+gv_*0.008+(Math.random()-0.5)*0.0020;
        }
        return {duAdd, dvAdd};
      }

      const speedLimits={
        drifter:0.36, seeker:0.32, explorer:0.44, crosser:0.40,
        deflector:0.38, shaper:0.30, orbiter:0.40, flocker:0.34,
        ridgewalker:0.31, randomwalk:0.42
      };

      for (let i=0; i<probes.length; i++){
        const p=probes[i];
        if (p.life<=0) continue;

        const neighbors=gatherNeighbors(i);
        let g=field.gradientUV(p.u, p.v);
        g=applyShaper(g, p, neighbors);

        const behaviors=getBehaviors(p.runnerType||'drifter');
        let duAdd=0, dvAdd=0;
        for (const btype of behaviors){
          const d=computeDelta(btype,p,g,neighbors);
          duAdd+=d.duAdd; dvAdd+=d.dvAdd;
        }
        duAdd/=Math.max(1,behaviors.length);
        dvAdd/=Math.max(1,behaviors.length);
        if (behaviors.length>1){
          duAdd+=(Math.random()-0.5)*0.0012;
          dvAdd+=(Math.random()-0.5)*0.0012;
        }

        p.du=(p.du+duAdd)*CONFIG.probes.damping;
        p.dv=(p.dv+dvAdd)*CONFIG.probes.damping;

        const stype=p.runnerType||'drifter';
        let speedLimit=speedLimits[stype]||0.36;
        if (['multi1','multi2','multi3'].includes(stype)){
          const bkeys=getBehaviors(stype);
          speedLimit=Math.min(0.46,
            bkeys.reduce((s,k)=>s+(speedLimits[k]||0.36),0)/
            Math.max(1,bkeys.length)+0.03);
        }
        const spd=Math.hypot(p.du,p.dv);
        if (spd>speedLimit){p.du*=speedLimit/spd; p.dv*=speedLimit/spd;}

        p.u=wrapU(p.u+p.du);
        p.v=p.v+p.dv;

        // ================================================
        // BOUNDARY CONDITIONS — simple and correct.
        // Reflect only at the true edges +-vMax.
        // v=0 is not a boundary. Probes pass through freely.
        // ================================================
        if (p.v > vMax){ p.v = 2*vMax - p.v; p.dv = -p.dv; }
        if (p.v < -vMax){ p.v = -2*vMax - p.v; p.dv = -p.dv; }

        // Sample world with actual signed v.
        const wp=field.sampleWorld(p.u, p.v);
        p.x=wp.x; p.y=wp.y; p.z=wp.z;
        p.life--;
      }

      if (this._surface3D.updateProbeMarkers)
        this._surface3D.updateProbeMarkers(probes);

      this._animId=requestAnimationFrame(()=>this._step());
      return;
    }

    if (typeof this._step2D==='function') return this._step2D();
  };


  // ----------------------------------------------------------
  // 4. HIDE OBSOLETE UI
  // ----------------------------------------------------------

  function hideObsoleteUI(){
    const card=document.getElementById('intersection-influence-card');
    if (card) card.style.display='none';
    const oldSlider=document.getElementById('planeInfluenceSlider');
    if (oldSlider){
      const wrap=oldSlider.parentElement;
      if (wrap) wrap.style.display='none';
    }
  }
  if (document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', hideObsoleteUI);
  } else {
    setTimeout(hideObsoleteUI, 200);
  }


  // ----------------------------------------------------------
  // 5. LOG
  // ----------------------------------------------------------

  document.addEventListener('DOMContentLoaded', ()=>{
    const wb=window._workbench;
    if (!wb||typeof wb._log!=='function') return;
    wb._log('Seam patch v3: both sheets active, v=0 transparent.','info');
  });

})();

</script>

<script>
// ============================================================
// SEAM PATCH v3 — UI FIX
// Corrects hideObsoleteUI which was hiding the entire
// runner-types-panel by hiding the slider's parentElement.
// Now hides only the slider and its immediate siblings.
// ============================================================
(function(){
  function fixObsoleteUI(){
    // Restore the runner-types-panel if it was hidden.
    const panel = document.querySelector('.runner-types-panel');
    if (panel) panel.style.display = '';

    // Also restore runner-types-inner.
    const inner = document.getElementById('runner-types-inner');
    if (inner) inner.style.display = '';

    // Hide only the plane influence slider and its
    // immediate label and description siblings.
    const slider = document.getElementById('planeInfluenceSlider');
    if (slider){
      // Hide the slider itself.
      slider.style.display = 'none';
      // Hide the preceding label sibling if it exists.
      const prev = slider.previousElementSibling;
      if (prev && prev.tagName !== 'DIV') prev.style.display = 'none';
      // Hide the following description sibling if it exists.
      const next = slider.nextElementSibling;
      if (next) next.style.display = 'none';
    }

    // Hide the intersection influence card (safe — standalone).
    const card = document.getElementById('intersection-influence-card');
    if (card) card.style.display = 'none';
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', fixObsoleteUI);
  } else {
    setTimeout(fixObsoleteUI, 50);
  }
})();
</script>
