<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manifold Seed Workbench</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #c8c8d8;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 10px 18px;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      gap: 24px;
      background: #0d0d16;
    }

    #header h1 {
      font-size: 13px;
      font-weight: normal;
      letter-spacing: 0.12em;
      color: #7878c8;
      text-transform: uppercase;
    }

    .toggle-group {
      display: flex;
      gap: 12px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: #888;
      user-select: none;
      transition: color 0.15s;
    }

    .toggle.active { color: #a0a0e8; }

    .toggle input { display: none; }

    .toggle-dot {
      width: 28px; height: 14px;
      border-radius: 7px;
      background: #222238;
      position: relative;
      transition: background 0.15s;
    }

    .toggle.active .toggle-dot { background: #4444a0; }

    .toggle-dot::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #555;
      top: 2px; left: 2px;
      transition: left 0.15s, background 0.15s;
    }

    .toggle.active .toggle-dot::after {
      left: 16px;
      background: #a0a0ff;
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #canvas-panel {
      position: relative;
      flex: 1;
      background: #080810;
    }

    #draw-canvas {
      position: absolute;
      top: 0; left: 0;
      cursor: crosshair;
      z-index: 1;
    }

    #image-underlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.38;
      display: none;
      pointer-events: none;
      z-index: 0;
      filter: saturate(0.9) contrast(1.05);
    }

    #preview-canvas { z-index: 2; }
    #overlay-canvas { z-index: 3; }
    #surface-container { z-index: 0; }

    #preview-canvas,
    #overlay-canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
    }

    #surface-container {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #surface-container.visible { opacity: 1; }
    #surface-container.interactive { pointer-events: auto; }

    #sidebar {
      width: 360px;
      border-left: 1px solid #1e1e2e;
      display: flex;
      flex-direction: column;
      background: #0d0d16;
      overflow-y: auto;
    }

    .sidebar-section {
      padding: 14px 16px;
      border-bottom: 1px solid #1a1a28;
    }

    .sidebar-section h2 {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #4a4a7a;
      margin-bottom: 10px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      color: #666;
    }

    .stat-row span:last-child { color: #9090c0; }

    .btn {
      width: 100%;
      padding: 8px;
      background: #1a1a30;
      border: 1px solid #2a2a50;
      color: #8080c0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      transition: background 0.15s, color 0.15s;
    }

    .btn:hover { background: #22223a; color: #a0a0e8; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn.primary { border-color: #4444a0; color: #a0a0ff; }
    .btn.primary:hover { background: #1e1e40; }
    .btn.active { background: #1f1f46; border-color: #5a5acc; color: #b8b8ff; }

    .hotspot-list {
      max-height: 120px;
      overflow-y: auto;
    }

    .hotspot-item {
      font-size: 11px;
      color: #606090;
      padding: 2px 0;
      border-bottom: 1px solid #14141e;
    }

    .hotspot-item span { color: #8080b0; }

    .descriptor-row { display:flex; justify-content:space-between; margin-bottom:4px; color:#666; }
    .descriptor-row span:last-child { color:#9aa0d0; }

    #status-bar {
      padding: 5px 18px;
      border-top: 1px solid #1e1e2e;
      background: #0d0d16;
      font-size: 11px;
      color: #444466;
      display: flex;
      justify-content: space-between;
    }

    #status-msg { color: #6060a0; }

    .log-area {
      font-size: 10px;
      color: #444466;
      max-height: 80px;
      overflow-y: auto;
      line-height: 1.6;
    }

    .log-area .log-line { padding: 1px 0; }
    .log-area .log-line.info { color: #5050a0; }
    .log-area .log-line.warn { color: #a08030; }
    .log-area .log-line.error { color: #a04040; }
  </style>
</head>
<body>

<div id="header">
  <h1>Manifold Seed Workbench</h1>
  <div class="toggle-group">
    <label class="toggle" id="toggle-smoothed">
      <input type="checkbox" checked />
      <div class="toggle-dot"></div>
      Smoothed
    </label>
    <label class="toggle" id="toggle-sampled">
      <input type="checkbox" checked />
      <div class="toggle-dot"></div>

    </label>
    <label class="toggle" id="toggle-hotspots">
      <input type="checkbox" checked />
      <div class="toggle-dot"></div>
      Hotspots
    </label>
    <label class="toggle" id="toggle-surface">
      <input type="checkbox" />
      <div class="toggle-dot"></div>

    </label>
    <label class="toggle" id="toggle-plane">

</div>

<div id="main">
  <div id="canvas-panel">
    <img id="image-underlay" alt="Uploaded reference" />
    <canvas id="draw-canvas"></canvas>
    <canvas id="preview-canvas"></canvas>
    <canvas id="overlay-canvas"></canvas>
    <div id="surface-container"></div>
  </div>

  <div id="sidebar">
    <div class="sidebar-section">
      <h2>Curve Stats</h2>
      <div class="stat-row"><span>Raw points</span><span id="stat-raw">—</span></div>
      <div class="stat-row"><span>Sampled points</span><span id="stat-sampled">—</span></div>
      <div class="stat-row"><span>Arc length</span><span id="stat-arclen">—</span></div>
      <div class="stat-row"><span>Closure gap</span><span id="stat-gap">—</span></div>
      <div class="stat-row"><span>Hotspots</span><span id="stat-hotspots">—</span></div>
    </div>

    <div class="sidebar-section">
      <h2>Hotspot Candidates</h2>
      <div class="hotspot-list" id="hotspot-list"></div>
    </div>

    <div class="sidebar-section">
      <h2>Actions</h2>
      <input type="file" id="file-image" accept="image/*" style="display:none;" />
      <button class="btn" id="btn-upload-image">Upload Image</button>
      <button class="btn" id="btn-clear-image" disabled>Clear Image</button>
      <button class="btn" id="btn-edit-points" disabled>Edit Points</button>
      <button class="btn" id="btn-redraw-section" disabled>Redraw Section</button>
      <button class="btn" id="btn-clear">Clear</button>
      <button class="btn" id="btn-run-probes">Run Probes</button>
      <button class="btn primary" id="btn-export" disabled>Export Seed</button>
      <button class="btn primary" id="btn-send" disabled>Send to Backend</button>


    <div class="sidebar-section" id="section-visibility">
      <h2>Visibility</h2>
      <div class="control-group">
        <label class="check-row"><input type="checkbox" id="vis-loop" checked> <span>Loop Visuals</span></label>
        <label class="check-row"><input type="checkbox" id="vis-picture" checked> <span>Picture Visuals</span></label>
        <label class="check-row"><input type="checkbox" id="vis-runners"> <span>Runners</span></label>
        <label class="check-row"><input type="checkbox" id="vis-manifold"> <span>3D Manifold</span></label>
      </div>
    </div>

    <div class="sidebar-section" id="section-probe-mode">
      <h2>Probe Mode</h2>
      <select id="probe-mode-select" class="input" style="width:100%;">
        <option value="3d">3D Surface</option>
        <option value="2d">2D Overlay</option>
      </select>
    </div>
    </div>

    <div class="sidebar-section">
      <h2>Provenance Log</h2>
      <div class="log-area" id="log-area"></div>
    </div>

    <div class="sidebar-section" id="section-descriptor" style="display:none;">
      <h2>Backend Descriptor</h2>
      <div id="descriptor-panel"></div>
    </div>
  </div>
</div>

<div id="status-bar">
  <span id="status-msg">Draw a closed loop to begin.</span>
  <span id="status-coords">—</span>
</div>

<script>

// ============================================================
// CONSTANTS
// ============================================================

const CONFIG = {
  smoothing: {
    method: 'catmull_rom',
    segments: 20,           // segments per control point pair
    closureThreshold: 0.05  // fraction of arc length for snap
  },
  sampling: {
    targetCount: 300
  },
  surface: {
    pairSampleFraction: 0.15,  // fraction of all pairs to sample
    gridResolution: 80
  },
  hotspot: {
    rectangleSearchRadius: 0.12,  // fraction of arc length
    minIntensity: 0.3
  },
  probes: {
    count: 10000,
    steps: 12000,
    damping: 0.92,
    trailLength: 40,
    runnerColors: {
      drifter: '#5bbcff',
      seeker: '#ffb347',
      explorer: '#d47cff',
      crosser: '#68ff9a',
      deflector: '#ff6b6b',
      shaper: '#55e0ff',
      orbiter: '#ffe066',
      flocker: '#8dffb2',
      ridgewalker: '#9b7bff',
      randomwalk: '#ff8f5a',
      multi1: '#ff66cc',
      multi2: '#41d9ff',
      multi3: '#c6ff4d'
    }
  },
  backend: {
    baseUrl: '',
    endpoint: '/api/v1/manifold/seed'
  }
};


// ============================================================
// UTILITIES
// ============================================================

const Utils = (() => {
  function dist(a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    return Math.sqrt(dx*dx + dy*dy);
  }

  function lerp(a, b, t) {
    return { x: a.x + (b.x - a.x)*t, y: a.y + (b.y - a.y)*t };
  }

  function midpoint(a, b) {
    return { x: (a.x+b.x)/2, y: (a.y+b.y)/2 };
  }

  function dot(a, b) {
    return a.x*b.x + a.y*b.y;
  }

  function normalize(v) {
    const m = Math.sqrt(v.x*v.x + v.y*v.y);
    if (m < 1e-10) return { x: 0, y: 0 };
    return { x: v.x/m, y: v.y/m };
  }

  function generateId() {
    return 'seed_' + Date.now().toString(36) + '_' +
           Math.random().toString(36).slice(2, 7);
  }

  function boundingBox(points) {
    let minX = Infinity, minY = Infinity;
    let maxX = -Infinity, maxY = -Infinity;
    for (const p of points) {
      if (p.x < minX) minX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.x > maxX) maxX = p.x;
      if (p.y > maxY) maxY = p.y;
    }
    return { minX, minY, maxX, maxY };
  }

  return { dist, lerp, midpoint, dot, normalize, generateId, boundingBox };
})();


// ============================================================
// STROKE CAPTURE
// ============================================================

class StrokeCapture {
  constructor(canvas) {
    this._canvas   = canvas;
    this._points   = [];
    this._drawing  = false;
    this._enabled  = true;
    this._listeners = { strokeStart: [], strokeMove: [], strokeEnd: [] };
    this._bind();
  }

  setEnabled(enabled) {
    this._enabled = !!enabled;
    if (!this._enabled) this._drawing = false;
  }

  on(event, fn) {
    if (this._listeners[event]) this._listeners[event].push(fn);
  }

  _emit(event, data) {
    (this._listeners[event] || []).forEach(fn => fn(data));
  }

  _bind() {
    const c = this._canvas;
    c.addEventListener('mousedown',  e => this._start(e));
    c.addEventListener('mousemove',  e => this._move(e));
    c.addEventListener('mouseup',    e => this._end(e));
    c.addEventListener('mouseleave', e => this._end(e));
    c.addEventListener('touchstart', e => { e.preventDefault(); this._start(e.touches[0]); }, { passive: false });
    c.addEventListener('touchmove',  e => { e.preventDefault(); this._move(e.touches[0]); }, { passive: false });
    c.addEventListener('touchend',   e => { e.preventDefault(); this._end(e); },             { passive: false });
  }

  _coords(e) {
    const r = this._canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  _start(e) {
    if (!this._enabled) return;
    this._drawing = true;
    this._points  = [this._coords(e)];
    this._emit('strokeStart', [...this._points]);
  }

  _move(e) {
    if (!this._enabled || !this._drawing) return;
    const p    = this._coords(e);
    const last = this._points[this._points.length - 1];
    if (Utils.dist(p, last) > 2) {
      this._points.push(p);
      this._emit('strokeMove', [...this._points]);
    }
    document.getElementById('status-coords').textContent = `${Math.round(p.x)}, ${Math.round(p.y)}`;
  }

  _end(e) {
    if (!this._enabled || !this._drawing || this._points.length < 10) {
      this._drawing = false;
      return;
    }
    this._drawing = false;
    this._emit('strokeEnd', [...this._points]);
  }

  clear() {
    this._points  = [];
    this._drawing = false;
  }
}


// ============================================================
// LIVE DRAW PREVIEW
// ============================================================

class LiveDrawPreview {
  constructor(canvas) {
    this._canvas = canvas;
    this._ctx = canvas.getContext('2d');
  }

  resize() {
    // no-op: canvas size is managed externally
  }

  clear() {
    this._ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);
  }

  draw(points) {
    const ctx = this._ctx;
    ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);
    if (!points || points.length === 0) return;

    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.strokeStyle = 'rgba(160, 160, 255, 0.95)';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();

    const last = points[points.length - 1];
    ctx.beginPath();
    ctx.arc(last.x, last.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200, 200, 255, 0.95)';
    ctx.fill();
  }
}

// ============================================================
// CURVE PROCESSOR
// ============================================================

class CurveProcessor {
  /**
   * Main entry point.
   * Returns { raw, smoothed, sampled, closureGap, resamplingError }
   */
  process(rawPoints) {
    const raw = [...rawPoints];
    const smoothed = this._smooth(raw);
    const { curve: closed, gap } = this._close(smoothed);
    const { points: sampled, error } = this._arcLengthResample(
      closed, CONFIG.sampling.targetCount
    );
    return {
      raw,
      smoothed: closed,
      sampled,
      closureGap: gap,
      resamplingError: error
    };
  }

  // ---- Stage 2: Catmull-Rom smoothing ----

  _smooth(points) {
    if (points.length < 4) return points;
    const result = [];
    const n = points.length;
    // Treat as open spline; closure handled separately
    for (let i = 0; i < n - 1; i++) {
      const p0 = points[Math.max(0, i-1)];
      const p1 = points[i];
      const p2 = points[i+1];
      const p3 = points[Math.min(n-1, i+2)];
      const segs = CONFIG.smoothing.segments;
      for (let t = 0; t < segs; t++) {
        result.push(this._catmullRom(p0, p1, p2, p3, t / segs));
      }
    }
    result.push(points[n-1]);
    return result;
  }

  _catmullRom(p0, p1, p2, p3, t) {
    const t2 = t*t, t3 = t2*t;
    return {
      x: 0.5 * ((2*p1.x) + (-p0.x+p2.x)*t +
          (2*p0.x - 5*p1.x + 4*p2.x - p3.x)*t2 +
          (-p0.x + 3*p1.x - 3*p2.x + p3.x)*t3),
      y: 0.5 * ((2*p1.y) + (-p0.y+p2.y)*t +
          (2*p0.y - 5*p1.y + 4*p2.y - p3.y)*t2 +
          (-p0.y + 3*p1.y - 3*p2.y + p3.y)*t3)
    };
  }

  // ---- Stage 3: Loop closure ----

  _close(points) {
    const first = points[0];
    const last  = points[points.length - 1];
    const gap   = Utils.dist(first, last);

    // Estimate arc length for threshold
    let arcLen = 0;
    for (let i = 1; i < points.length; i++) arcLen += Utils.dist(points[i-1], points[i]);
    const threshold = arcLen * CONFIG.smoothing.closureThreshold;

    if (gap < threshold) {
      // Snap
      const closed = [...points];
      closed[closed.length - 1] = { ...first };
      return { curve: closed, gap };
    } else {
      // Insert bridge segment
      const bridge = [];
      const steps  = CONFIG.smoothing.segments;
      for (let t = 0; t <= steps; t++) {
        bridge.push(Utils.lerp(last, first, t / steps));
      }
      return { curve: [...points, ...bridge], gap };
    }
  }

  // ---- Stage 4: Arc-length reparameterization ----

  _arcLengthResample(points, targetCount) {
    // Build cumulative arc length table
    const cumLen = [0];
    for (let i = 1; i < points.length; i++) {
      cumLen.push(cumLen[i-1] + Utils.dist(points[i-1], points[i]));
    }
    const totalLen = cumLen[cumLen.length - 1];
    const step     = totalLen / (targetCount - 1);

    const sampled = [];
    let   j       = 0;
    let   error   = 0;

    for (let i = 0; i < targetCount; i++) {
      const target = i * step;
      while (j < cumLen.length - 2 && cumLen[j+1] < target) j++;
      const segLen = cumLen[j+1] - cumLen[j];
      const t      = segLen < 1e-10 ? 0 : (target - cumLen[j]) / segLen;
      const p      = Utils.lerp(points[j], points[j+1], t);
      sampled.push(p);
      // Track interpolation error
      const actualDist = j+1 < points.length
        ? Utils.dist(p, points[j+1]) : 0;
      error = Math.max(error, Math.abs(actualDist - step * (1 - t)));
    }

    return { points: sampled, error };
  }
}


// ============================================================
// DISTANCE SURFACE
// ============================================================

class DistanceSurface {
  constructor(container, width, height) {
    this._container = container;
    this._width = width;
    this._height = height;
    this._renderer = null;
    this._scene = null;
    this._camera = null;
    this._controls = null;
    this._root = null;
    this._mesh = null;
    this._wire = null;
    this._animId = null;
    this._interactive = false;
    this._autoRotateAngle = 0;
    this._init();
  }

  _init() {
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio || 1);
    renderer.setSize(this._width, this._height);
    renderer.setClearColor(0x000000, 0);
    this._container.appendChild(renderer.domElement);
    this._renderer = renderer;

    this._scene = new THREE.Scene();
    this._camera = new THREE.PerspectiveCamera(42, this._width / this._height, 0.1, 10000);
    this._camera.position.set(0, -300, 220);
    this._camera.lookAt(0, 0, 0);

    this._controls = new THREE.OrbitControls(this._camera, renderer.domElement);
    this._controls.enabled = false;
    this._controls.enableDamping = true;
    this._controls.dampingFactor = 0.08;
    this._controls.rotateSpeed = 0.8;
    this._controls.panSpeed = 0.8;
    this._controls.target.set(0, 0, 0);

    this._root = new THREE.Group();
    this._scene.add(this._root);

    this._scene.add(new THREE.AmbientLight(0x303060, 1.15));
    const dir = new THREE.DirectionalLight(0x9090ff, 1.1);
    dir.position.set(0.8, -1.0, 1.6);
    this._scene.add(dir);

    const planeGeo = new THREE.PlaneGeometry(600, 600, 1, 1);
    const planeMat = new THREE.MeshBasicMaterial({ color: 0x2b2b4f, transparent: true, opacity: 0.08, side: THREE.DoubleSide });
    this._plane = new THREE.Mesh(planeGeo, planeMat);
    this._root.add(this._plane);

    const axes = new THREE.AxesHelper(120);
    axes.material.transparent = true;
    axes.material.opacity = 0.25;
    this._root.add(axes);

    this._animate();
  }

  build(sampledPoints) {
    if (this._mesh) {
      this._root.remove(this._mesh);
      this._mesh.geometry.dispose();
      this._mesh.material.dispose();
      this._mesh = null;
    }
    if (this._wire) {
      this._root.remove(this._wire);
      this._wire.geometry.dispose();
      this._wire.material.dispose();
      this._wire = null;
    }

    const pts = sampledPoints;
    if (!pts || pts.length < 8) return;

    const m = Math.min(56, Math.max(28, Math.floor(pts.length / 5)));
    const idxs = [];
    for (let a = 0; a < m; a++) idxs.push(Math.floor((a / m) * pts.length));

    const centroid = pts.reduce((acc,p)=>({x:acc.x+p.x,y:acc.y+p.y}),{x:0,y:0});
    centroid.x /= pts.length; centroid.y /= pts.length;

    let maxD = 0;
    for (let u = 0; u < m; u++) {
      for (let v = 0; v < m; v++) {
        const d = Utils.dist(pts[idxs[u]], pts[idxs[v]]);
        if (d > maxD) maxD = d;
      }
    }
    const zScale = maxD > 0 ? (Math.min(this._width, this._height) * 0.22 / maxD) : 1;

    const positions = [];
    const indices = [];
    const colors = [];

    for (let u = 0; u < m; u++) {
      for (let v = 0; v < m; v++) {
        const a = pts[idxs[u]];
        const b = pts[idxs[v]];
        const mid = Utils.midpoint(a, b);
        const d = Utils.dist(a, b);
        const phase = ((v - u + m) % m) / m * Math.PI * 2.0;
        const signedZ = Math.sin(phase) * d * zScale;
        positions.push(mid.x - centroid.x, -(mid.y - centroid.y), signedZ);

        const t = maxD > 0 ? (d / maxD) : 0;
        const zt = 0.5 + 0.5 * Math.sign(signedZ) * Math.min(1, Math.abs(signedZ) / (maxD * zScale + 1e-9));
        colors.push(0.18 + 0.22 * t, 0.18 + 0.15 * zt, 0.42 + 0.45 * t);
      }
    }

    const idx = (u, v) => ((u % m + m) % m) * m + ((v % m + m) % m);
    for (let u = 0; u < m; u++) {
      for (let v = 0; v < m; v++) {
        const a = idx(u, v);
        const b = idx(u + 1, v);
        const c = idx(u, v + 1);
        const d = idx(u + 1, v + 1);
        indices.push(a, b, c, b, d, c);
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    geo.setIndex(indices);
    geo.computeVertexNormals();

    const mat = new THREE.MeshPhongMaterial({
      vertexColors: true,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.72,
      shininess: 50
    });

    this._mesh = new THREE.Mesh(geo, mat);
    this._root.add(this._mesh);

    const wireGeo = new THREE.WireframeGeometry(geo);
    const wireMat = new THREE.LineBasicMaterial({ color: 0x9b9bff, transparent: true, opacity: 0.24 });
    this._wire = new THREE.LineSegments(wireGeo, wireMat);
    this._root.add(this._wire);

    const box = new THREE.Box3().setFromObject(this._mesh);
    const size = new THREE.Vector3();
    box.getSize(size);
    const maxSize = Math.max(size.x, size.y, size.z, 1);
    const fitDist = maxSize / (2 * Math.tan((Math.PI * this._camera.fov) / 360));
    this._camera.position.set(0, -fitDist * 1.5, fitDist * 1.05);
    this._camera.near = Math.max(0.1, fitDist / 100);
    this._camera.far = fitDist * 20;
    this._camera.updateProjectionMatrix();
    this._controls.target.set(0, 0, 0);
    this._controls.update();
    this._autoRotateAngle = 0;
  }

  setInteractive(enabled) {
    this._interactive = !!enabled;
    this._controls.enabled = this._interactive;
  }

  setPlaneVisible(visible) {
    if (this._plane) this._plane.visible = !!visible;
  }

  _animate() {
    this._animId = requestAnimationFrame(() => this._animate());
    if (this._interactive) {
      this._controls.update();
    } else if (this._root) {
      this._autoRotateAngle += 0.0035;
      this._root.rotation.z = this._autoRotateAngle;
      this._root.rotation.x = 0.55;
    }
    this._renderer.render(this._scene, this._camera);
  }

  resize(width, height) {
    this._width = width;
    this._height = height;
    this._renderer.setSize(width, height);
    this._camera.aspect = width / height;
    this._camera.updateProjectionMatrix();
  }

  destroy() {
    cancelAnimationFrame(this._animId);
    this._controls.dispose();
    this._renderer.dispose();
  }
}


// ============================================================
// HOTSPOT DETECTOR
// ============================================================

class HotspotDetector {
  /**
   * Detect rectangle-candidate hotspots on a closed sampled curve.
   *
   * Strategy: for each point i, search for three points j, k, l such that
   * the four midpoints of the pairs (i,k) and (j,l) are approximately equal
   * and the distances satisfy approximate rectangle symmetry.
   *
   * This is a heuristic approximation of the rectangular peg theorem search.
   *
   * Returns { candidates, rejected }
   */
  detect(sampledPoints) {
    const pts       = sampledPoints;
    const n         = pts.length;
    const candidates = [];
    const rejected   = [];

    // Compute total arc length for threshold
    let arcLen = 0;
    for (let i = 1; i < n; i++) arcLen += Utils.dist(pts[i-1], pts[i]);

    const searchRadius = arcLen * CONFIG.hotspot.rectangleSearchRadius;
    const step = Math.max(1, Math.floor(n / 60)); // stride for performance

    for (let i = 0; i < n; i += step) {
      for (let k = i + step*2; k < n; k += step) {
        const mid_ik = Utils.midpoint(pts[i], pts[k]);
        const d_ik   = Utils.dist(pts[i], pts[k]);

        // Search for j, l such that midpoint(j,l) ≈ mid_ik
        // and dist(j,l) ≈ d_ik (approximate square/rectangle)
        for (let j = i + step; j < k; j += step) {
          // l is approximately diametrically opposite j through mid_ik
          const lx = 2*mid_ik.x - pts[j].x;
          const ly = 2*mid_ik.y - pts[j].y;

          // Find nearest sampled point to (lx, ly)
          let bestDist = Infinity, bestL = -1;
          for (let l = k+1; l < n; l += step) {
            const d = Utils.dist(pts[l], { x: lx, y: ly });
            if (d < bestDist) { bestDist = d; bestL = l; }
          }

          if (bestL < 0) continue;

          const midErr = bestDist;
          const d_jl   = Utils.dist(pts[j], pts[bestL]);
          const symErr = Math.abs(d_jl - d_ik) / (d_ik + 1e-6);

          // Score: lower error → higher intensity
          const rawIntensity = 1.0 / (1.0 + midErr/8 + symErr);

          const hotspot = {
            x:             mid_ik.x,
            y:             mid_ik.y,
            intensity:     rawIntensity,
            candidateType: 'rectangle_gate',
            _i: i, _j: j, _k: k, _l: bestL
          };

          if (rawIntensity >= CONFIG.hotspot.minIntensity) {
            candidates.push(hotspot);
          } else {
            rejected.push(hotspot);
          }
        }
      }
    }

    // Deduplicate candidates by proximity
    const deduped = this._deduplicate(candidates, searchRadius * 0.5);
    return { candidates: deduped, rejected };
  }

  _deduplicate(candidates, radius) {
    // Sort by intensity descending, suppress nearby lower-intensity candidates
    candidates.sort((a, b) => b.intensity - a.intensity);
    const kept = [];
    for (const c of candidates) {
      const suppressed = kept.some(k => Utils.dist(k, c) < radius);
      if (!suppressed) kept.push(c);
    }
    return kept;
  }
}



// ============================================================
// IMAGE LOOP IMPORTER (OpenCV.js)
// ============================================================

class ImageLoopImporter {
  constructor(imageEl, panelEl) {
    this._imageEl = imageEl;
    this._panelEl = panelEl;
    this._cvReadyPromise = null;
    this._displayRect = null;
  }

  async setFile(file) {
    const url = URL.createObjectURL(file);
    await new Promise((resolve, reject) => {
      this._imageEl.onload = () => resolve();
      this._imageEl.onerror = reject;
      this._imageEl.src = url;
    });
    this._imageEl.style.display = 'block';
    this._displayRect = this._computeDisplayRect();
  }

  hasImage() {
    return !!this._imageEl.getAttribute('src');
  }

  clear() {
    this._imageEl.removeAttribute('src');
    this._imageEl.style.display = 'none';
    this._displayRect = null;
  }

  async detectLoops() {
    await this._waitForCV();
    if (!this.hasImage()) throw new Error('No image loaded');
    this._displayRect = this._computeDisplayRect();

    const tmpCanvas = document.createElement('canvas');
    const nw = this._imageEl.naturalWidth;
    const nh = this._imageEl.naturalHeight;
    tmpCanvas.width = nw;
    tmpCanvas.height = nh;
    const tctx = tmpCanvas.getContext('2d');
    tctx.drawImage(this._imageEl, 0, 0, nw, nh);

    const src = cv.imread(tmpCanvas);
    const gray = new cv.Mat();
    const blur = new cv.Mat();
    const edges = new cv.Mat();
    const contours = new cv.MatVector();
    const hierarchy = new cv.Mat();

    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
    cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0);
    cv.Canny(blur, edges, 70, 180);
    cv.findContours(edges, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

    const loops = [];
    for (let i = 0; i < contours.size(); i++) {
      const cnt = contours.get(i);
      const area = Math.abs(cv.contourArea(cnt, false));
      const peri = cv.arcLength(cnt, true);
      if (area < (nw * nh * 0.002) || peri < 60) { cnt.delete(); continue; }

      const approx = new cv.Mat();
      cv.approxPolyDP(cnt, approx, Math.max(2, peri * 0.003), true);

      const pts = [];
      for (let j = 0; j < approx.data32S.length; j += 2) {
        const ix = approx.data32S[j], iy = approx.data32S[j+1];
        pts.push(this._imageToCanvas(ix, iy));
      }
      if (pts.length >= 8) {
        if (Utils.dist(pts[0], pts[pts.length-1]) > 2) pts.push({ ...pts[0] });
        loops.push({ points: pts, area, perimeter: peri });
      }
      approx.delete();
      cnt.delete();
    }
    src.delete(); gray.delete(); blur.delete(); edges.delete(); contours.delete(); hierarchy.delete();

    loops.sort((a,b)=>b.area-a.area);
    return loops;
  }

  _computeDisplayRect() {
    const pw = this._panelEl.clientWidth;
    const ph = this._panelEl.clientHeight;
    const iw = this._imageEl.naturalWidth || 1;
    const ih = this._imageEl.naturalHeight || 1;
    const scale = Math.min(pw / iw, ph / ih);
    const w = iw * scale, h = ih * scale;
    return { x: (pw-w)/2, y: (ph-h)/2, width: w, height: h, scale };
  }

  _imageToCanvas(ix, iy) {
    const r = this._displayRect;
    return { x: r.x + ix * r.scale, y: r.y + iy * r.scale };
  }

  async _waitForCV() {
    if (window.cv && cv.Mat) return;
    if (!this._cvReadyPromise) {
      this._cvReadyPromise = new Promise((resolve, reject) => {
        let tries = 0;
        const timer = setInterval(() => {
          tries++;
          if (window.cv && cv.Mat) { clearInterval(timer); resolve(); }
          else if (tries > 400) { clearInterval(timer); reject(new Error('OpenCV.js failed to load')); }
        }, 100);
      });
    }
    return this._cvReadyPromise;
  }
}


// ============================================================
// PROBE SIMULATOR
// ============================================================

class ProbeSimulator {
  constructor(canvas) {
    this._canvas  = canvas;
    this._ctx     = canvas.getContext('2d');
    this._probes  = [];
    this._trails  = [];
    this._animId  = null;
    this._surface = null; // gradient function
    this._running = false;
  }

  /**
   * Build a gradient field from the distance surface z-values.
   * surfacePoints: [{x, y, z}]
   */
  setSurface(sampledPoints, zValues) {
    // Build a simple KD-lite: for any query point, find nearby surface
    // points and compute gradient by finite differences
    this._surfaceData   = sampledPoints;
    this._surfaceZ      = zValues;
  }

  /**
   * Spawn probes at random sampled curve points and animate.
   */
  run(sampledPoints) {
    this.stop();
    const n       = sampledPoints.length;
    const count   = CONFIG.probes.count;
    this._probes  = [];
    this._trails  = [];
    this._running = true;

    for (let i = 0; i < count; i++) {
      const idx = Math.floor(Math.random() * n);
      this._probes.push({
        x:  sampledPoints[idx].x,
        y:  sampledPoints[idx].y,
        vx: (Math.random() - 0.5) * 1.5,
        vy: (Math.random() - 0.5) * 1.5,
        life: CONFIG.probes.steps
      });
      this._trails.push([]);
    }

    this._sampledPoints = sampledPoints;
    this._step();
  }

  _step() {
    if (!this._running) return;
    const ctx    = this._ctx;
    const width  = this._canvas.width;
    const height = this._canvas.height;

    // Fade trails
    ctx.clearRect(0, 0, width, height);

    for (let i = 0; i < this._probes.length; i++) {
      const p = this._probes[i];
      if (p.life <= 0) continue;

      // Gradient: move toward nearest sampled curve point (attractor)
      const nearest = this._nearestCurvePoint(p);
      const dx = nearest.x - p.x;
      const dy = nearest.y - p.y;
      const d  = Math.sqrt(dx*dx + dy*dy) + 1e-6;

      // Gradient descent toward curve, with damping
      p.vx = (p.vx + dx/d * 0.4) * CONFIG.probes.damping;
      p.vy = (p.vy + dy/d * 0.4) * CONFIG.probes.damping;

      // Avoid steep curvature spikes (large velocity → clamp)
      const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
      if (speed > 3.5) {
        p.vx *= 3.5/speed;
        p.vy *= 3.5/speed;
      }

      p.x += p.vx;
      p.y += p.vy;
      p.life--;

      // Record trail
      const trail = this._trails[i];
      trail.push({ x: p.x, y: p.y });
      if (trail.length > CONFIG.probes.trailLength) trail.shift();

      // Draw fading trail
      if (trail.length > 1) {
        for (let t = 1; t < trail.length; t++) {
          const alpha = (t / trail.length) * 0.6;
          ctx.beginPath();
          ctx.strokeStyle = `rgba(100, 100, 220, ${alpha})`;
          ctx.lineWidth   = 1;
          ctx.moveTo(trail[t-1].x, trail[t-1].y);
          ctx.lineTo(trail[t].x,   trail[t].y);
          ctx.stroke();
        }
      }
    }

    this._animId = requestAnimationFrame(() => this._step());
  }

  _nearestCurvePoint(p) {
    const pts = this._sampledPoints;
    let best  = pts[0], bestD = Infinity;
    // Stride search for performance
    const stride = Math.max(1, Math.floor(pts.length / 40));
    for (let i = 0; i < pts.length; i += stride) {
      const d = Utils.dist(p, pts[i]);
      if (d < bestD) { bestD = d; best = pts[i]; }
    }
    return best;
  }

  stop() {
    this._running = false;
    cancelAnimationFrame(this._animId);
    this._ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);
  }
}


// ============================================================
// PROVENANCE RECORDER
// ============================================================

class ProvenanceRecorder {
  constructor() {
    this._record = this._empty();
  }

  _empty() {
    return {
      rawStrokePoints:       null,
      smoothedCurvePoints:   null,
      arcLengthSampledPoints: null,
      hotspotCandidates:     null,
      hotspotRejected:       null,
      smoothingMethod:       CONFIG.smoothing.method,
      samplingMethod:        'arc_length_uniform',
      closureGap:            null,
      resamplingError:       null
    };
  }

  recordRaw(points) {
    this._record.rawStrokePoints = points;
  }

  recordSmoothed(points) {
    this._record.smoothedCurvePoints = points;
  }

  recordSampled(points) {
    this._record.arcLengthSampledPoints = points;
  }

  recordClosure(gap) {
    this._record.closureGap = gap;
  }

  recordResamplingError(error) {
    this._record.resamplingError = error;
  }

  recordHotspots(candidates, rejected) {
    this._record.hotspotCandidates = candidates;
    this._record.hotspotRejected   = rejected;
  }

  get() {
    return { ...this._record };
  }

  reset() {
    this._record = this._empty();
  }
}


// ============================================================
// SEED COMPILER
// ============================================================

class SeedCompiler {
  /**
   * Assembles all provenance data into the final JSON seed payload.
   */
  compile(provenance) {
    const sampled = provenance.arcLengthSampledPoints || [];
    const bbox    = sampled.length > 0 ? Utils.boundingBox(sampled) : {};

    let arcLen = 0;
    for (let i = 1; i < sampled.length; i++) {
      arcLen += Utils.dist(sampled[i-1], sampled[i]);
    }

    // Detect self-intersections (simple sweep — O(n²) on strided sample)
    const warnings = this._selfIntersectionWarnings(sampled);

    return {
      manifoldSeedId: Utils.generateId(),
      parentSeedIds:  [],
      derivedFrom:    'user_drawn_curve',

      rawStrokePoints:        provenance.rawStrokePoints       || [],
      smoothedCurvePoints:    provenance.smoothedCurvePoints   || [],
      arcLengthSampledPoints: sampled,

      rectangleHotspots: (provenance.hotspotCandidates || []).map(h => ({
        x:             h.x,
        y:             h.y,
        intensity:     h.intensity,
        candidateType: h.candidateType
      })),

      metadata: {
        sampleCount:     sampled.length,
        totalArcLength:  arcLen,
        boundingBox:     bbox,
        smoothingMethod: provenance.smoothingMethod,
        samplingMethod:  provenance.samplingMethod
      },

      debug: {
        closureGapBeforeSnap:      provenance.closureGap,
        resamplingErrorEstimate:   provenance.resamplingError,
        selfIntersectionWarnings:  warnings,
        hotspotCandidatesRejected: (provenance.hotspotRejected || []).length
      }
    };
  }

  _selfIntersectionWarnings(pts) {
    const warnings = [];
    const stride   = Math.max(1, Math.floor(pts.length / 50));
    for (let i = 0; i < pts.length - 1; i += stride) {
      for (let j = i + stride*2; j < pts.length - 1; j += stride) {
        if (this._segmentsIntersect(pts[i], pts[i+1], pts[j], pts[j+1])) {
          warnings.push(`segments ${i}-${i+1} and ${j}-${j+1}`);
          if (warnings.length > 5) return warnings; // cap
        }
      }
    }
    return warnings;
  }

  _segmentsIntersect(a, b, c, d) {
    // Standard cross-product intersection test
    const cross = (o, u, v) => (u.x-o.x)*(v.y-o.y) - (u.y-o.y)*(v.x-o.x);
    const d1 = cross(c, d, a), d2 = cross(c, d, b);
    const d3 = cross(a, b, c), d4 = cross(a, b, d);
    if (((d1>0&&d2<0)||(d1<0&&d2>0)) && ((d3>0&&d4<0)||(d3<0&&d4>0))) return true;
    return false;
  }
}


// ============================================================
// SEED TRANSPORT
// ============================================================

class SeedTransport {
  constructor(baseUrl = '') {
    this._baseUrl = baseUrl || '';
  }

  async submitSeed(seed) {
    return this.send(seed);
  }

  async send(seed) {
    try {
      const endpoint = `${this._baseUrl}${CONFIG.backend.endpoint}`;
      const response = await fetch(endpoint, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(seed)
      });
      if (!response.ok) {
        return { ok: false, error: `HTTP ${response.status}` };
      }
      const data = await response.json();
      return { ok: true, data };
    } catch (err) {
      return { ok: false, error: err.message };
    }
  }
}


// ============================================================
// VISUALIZER
// ============================================================

class Visualizer {
  constructor(canvas) {
    this._canvas = canvas;
    this._ctx    = canvas.getContext('2d');
    this._layers = {
      raw:            { visible: true,  data: null },
      smoothed:       { visible: true,  data: null },
      sampled:        { visible: true,  data: null },
      hotspots:       { visible: true,  data: null },
      imageLoops:     { visible: true,  data: null },
      editHandles:    { visible: true,  data: null },
      backendCurve:   { visible: true,  data: null },
      curvature:      { visible: true,  data: null },
      gates:          { visible: true,  data: null }
    };
  }

  setLayerVisible(name, visible) {
    if (this._layers[name]) {
      this._layers[name].visible = visible;
      this._redraw();
    }
  }

  drawRaw(points)              { this._layers.raw.data          = points;   this._redraw(); }
  drawSmoothed(points)         { this._layers.smoothed.data     = points;   this._redraw(); }
  drawSampled(points)          { this._layers.sampled.data      = points;   this._redraw(); }
  drawHotspots(hotspots)       { this._layers.hotspots.data     = hotspots; this._redraw(); }
  drawImageLoops(loops, selectedIndex = -1) { this._layers.imageLoops.data = { loops, selectedIndex }; this._redraw(); }
  drawEditHandles(points)      { this._layers.editHandles.data  = points;   this._redraw(); }
  drawBackendCurve(points)     { this._layers.backendCurve.data = points;   this._redraw(); }
  drawCurvatureOverlay(samples){ this._layers.curvature.data    = samples;  this._redraw(); }
  drawGates(gates)             { this._layers.gates.data        = gates;    this._redraw(); }

  clear() {
    for (const k of Object.keys(this._layers)) this._layers[k].data = null;
    this._ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);
  }

  _redraw() {
    const ctx = this._ctx;
    ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);
    const L = this._layers;

    if (L.raw.visible && L.raw.data)
      this._drawPolyline(L.raw.data, 'rgba(60,60,100,0.4)', 1);

    if (L.smoothed.visible && L.smoothed.data)
      this._drawPolyline(L.smoothed.data, 'rgba(80,80,180,0.7)', 1.5);

    if (L.sampled.visible && L.sampled.data) {
      ctx.fillStyle = 'rgba(120,120,220,0.5)';
      for (const p of L.sampled.data) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2);
        ctx.fill();
      }
    }

    if (L.hotspots.visible && L.hotspots.data) {
      for (const h of L.hotspots.data) {
        const r = 4 + h.intensity * 8;
        ctx.beginPath();
        ctx.arc(h.x, h.y, r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(180,100,220,${0.4 + h.intensity*0.5})`;
        ctx.lineWidth   = 1.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(h.x, h.y, 2, 0, Math.PI*2);
        ctx.fillStyle = `rgba(200,120,255,${h.intensity})`;
        ctx.fill();
      }
    }

    if (L.imageLoops.visible && L.imageLoops.data) {
      const { loops, selectedIndex } = L.imageLoops.data;
      loops.forEach((loop, idx) => {
        this._drawPolyline(loop, idx === selectedIndex ? 'rgba(255,210,80,0.95)' : 'rgba(90,180,255,0.55)', idx === selectedIndex ? 2.2 : 1.2);
      });
    }

    if (L.editHandles.visible && L.editHandles.data) {
      for (const p of L.editHandles.data) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,230,140,0.95)';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p.x, p.y, 6, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(40,40,20,0.9)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    if (L.backendCurve.visible && L.backendCurve.data)
      this._drawPolyline(L.backendCurve.data, 'rgba(80,220,160,0.85)', 2);

    if (L.curvature.visible && L.curvature.data) {
      for (const s of L.curvature.data) {
        const t = Math.min(1, Math.abs(s.scalarCurvature) / 2.0);
        const r = s.isSingular ? 255 : Math.round(80 + 175*t);
        const g = s.isSingular ? 80  : Math.round(180 - 100*t);
        const b = s.isFlat     ? 200 : Math.round(100 + 80*t);
        ctx.beginPath();
        ctx.arc(s.x, s.y, 3, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${r},${g},${b},0.7)`;
        ctx.fill();
      }
    }

    if (L.gates.visible && L.gates.data) {
      const gateColors = { portal: '60,200,255', attractor: '255,180,60', merge_zone: '100,255,140', split_zone: '255,100,120' };
      for (const g of L.gates.data) {
        const col = gateColors[g.gateType] || '200,200,200';
        const r   = 6 + g.intensity * 10;
        ctx.beginPath();
        ctx.arc(g.x, g.y, r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(${col},${0.5 + g.confidence*0.4})`;
        ctx.lineWidth   = 2;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(g.x, g.y, 3, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${col},0.9)`;
        ctx.fill();
      }
    }
  }

  _drawPolyline(points, color, lineWidth) {
    if (!points || points.length < 2) return;
    const ctx = this._ctx;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
    ctx.strokeStyle = color;
    ctx.lineWidth   = lineWidth;
    ctx.stroke();
  }
}



// ============================================================
// BACKEND RESPONSE HANDLER
// ============================================================

class BackendResponseHandler {
  constructor(visualizer, workbench) {
    this._visualizer = visualizer;
    this._workbench = workbench;
  }

  handle(data) {
    if (!data || typeof data !== 'object') {
      this._workbench.log('Backend returned no usable data.', 'warn');
      return;
    }

    if (data.manifoldId) this._workbench.setManifoldId(data.manifoldId);
    if (data.compiledDescriptor) this._workbench.updateDescriptorPanel(data.compiledDescriptor);
    if (data.provenanceSummary) this._workbench.updateProvenance(data.provenanceSummary);

    if (Array.isArray(data.normalizedCurve) && data.normalizedCurve.length > 1) {
      const t     = data.normalizationTransform;
      const scale = t ? t.scale  : 1;
      const offX  = t ? t.offsetX : 0;
      const offY  = t ? t.offsetY : 0;
      const pts = data.normalizedCurve.map(p => ({
        x: p.x * scale + offX,
        y: p.y * scale + offY
      }));
      this._visualizer.drawBackendCurve(pts);
      this._workbench.log(`Backend curve: ${pts.length} points.`, 'info');
    }

    if (Array.isArray(data.curvatureSamples) && data.curvatureSamples.length > 0) {
      const t     = data.normalizationTransform;
      const scale = t ? t.scale   : 1;
      const offX  = t ? t.offsetX : 0;
      const offY  = t ? t.offsetY : 0;
      const samples = data.curvatureSamples.map(s => ({
        x: s.x * scale + offX,
        y: s.y * scale + offY,
        scalarCurvature: s.scalarCurvature,
        isSingular: s.isSingular,
        isFlat: s.isFlat
      }));
      this._visualizer.drawCurvatureOverlay(samples);
      this._workbench.log(`Curvature overlay: ${samples.length} samples.`, 'info');
    }

    if (Array.isArray(data.gateDescriptors) && data.gateDescriptors.length > 0) {
      this._visualizer.drawGates(data.gateDescriptors);
      this._workbench.log(`Gates: ${data.gateDescriptors.length}.`, 'info');
    }

    if (Array.isArray(data.warnings) && data.warnings.length > 0) {
      data.warnings.forEach(w => this._workbench.log(`Backend warning: ${w}`, 'warn'));
    }

    if (data.status === 'rejected') {
      const errs = (data.validationResult && data.validationResult.errors) || ['unknown'];
      this._workbench.log(`Seed rejected: ${errs.join(', ')}`, 'error');
      this._workbench.setStatus(`Rejected: ${errs[0]}`);
    }
  }
}

// ============================================================
// WORKBENCH — top-level coordinator
// ============================================================

class Workbench {
  constructor() {
    this._provenance      = new ProvenanceRecorder();
    this._processor       = new CurveProcessor();
    this._detector        = new HotspotDetector();
    this._compiler        = new SeedCompiler();
    this._transport       = new SeedTransport(CONFIG.backend.baseUrl || '');

    this._seed            = null;
    this._manifoldId      = null;
    this._importedLoops   = [];
    this._selectedLoopIndex = -1;
    this._editPointsMode  = false;
    this._redrawSectionMode = false;
    this._dragHandleIndex = -1;

    this._initCanvases();
    this._initModules();
    this._initToggles();
    this._initButtons();
    this._initResize();

    this._log('Workbench initialized.', 'info');
    this._setStatus('Draw a closed loop to begin.');
  }

  _initCanvases() {
    this._drawCanvas       = document.getElementById('draw-canvas');
    this._imageUnderlay    = document.getElementById('image-underlay');
    this._previewCanvas    = document.getElementById('preview-canvas');
    this._overlayCanvas    = document.getElementById('overlay-canvas');
    this._surfaceContainer = document.getElementById('surface-container');
    this._resizeCanvases();
  }

  _resizeCanvases() {
    const panel = document.getElementById('canvas-panel');
    const w = panel.clientWidth, h = panel.clientHeight;
    this._drawCanvas.width      = w;
    this._drawCanvas.height     = h;
    this._previewCanvas.width   = w;
    this._previewCanvas.height  = h;
    this._overlayCanvas.width   = w;
    this._overlayCanvas.height  = h;
    this._surfaceContainer.style.width  = w + 'px';
    this._surfaceContainer.style.height = h + 'px';
  }

  _initModules() {
    const w = this._drawCanvas.width;
    const h = this._drawCanvas.height;

    this._capture     = new StrokeCapture(this._drawCanvas);
    this._livePreview = new LiveDrawPreview(this._previewCanvas);
    this._visualizer  = new Visualizer(this._drawCanvas);
    this._surface     = new DistanceSurface(this._surfaceContainer, w, h);
    this._probes      = new ProbeSimulator(this._overlayCanvas);
    this._imageImporter = new ImageLoopImporter(this._imageUnderlay, document.getElementById('canvas-panel'));
    this._responseHandler = new BackendResponseHandler(this._visualizer, this);

    this._capture.on('strokeStart', pts => this._livePreview.draw(pts));
    this._capture.on('strokeMove',  pts => this._livePreview.draw(pts));
    this._capture.on('strokeEnd',   pts => {
      this._livePreview.clear();
      this._handleStroke(pts);
    });

    this._bindEditInteractions();
  }

  _bindEditInteractions() {
    const canvas = this._drawCanvas;
    canvas.addEventListener('mousedown', e => {
      const p = this._canvasPoint(e);

      if (this._editPointsMode && this._selectedLoopIndex >= 0) {
        const handles = this._currentEditHandles();
        for (let i = 0; i < handles.length; i++) {
          if (Utils.dist(p, handles[i]) < 8) {
            this._dragHandleIndex = i;
            this._capture.setEnabled(false);
            e.preventDefault();
            e.stopPropagation();
            return;
          }
        }
      }

      if (!this._editPointsMode && !this._redrawSectionMode && this._importedLoops.length > 0) {
        let bestIdx = -1, bestDist = Infinity;
        this._importedLoops.forEach((loop, idx) => {
          const d = this._distanceToPolyline(p, loop.points);
          if (d < bestDist) { bestDist = d; bestIdx = idx; }
        });
        if (bestIdx >= 0 && bestDist < 10) {
          this._selectedLoopIndex = bestIdx;
          this._visualizer.drawImageLoops(this._importedLoops.map(l => l.points), this._selectedLoopIndex);
          this._refreshImportedLoop(this._importedLoops[this._selectedLoopIndex].points, false);
          this._setStatus(`Selected loop ${bestIdx + 1} of ${this._importedLoops.length}.`);
          e.preventDefault();
          e.stopPropagation();
        }
      }
    }, true);

    window.addEventListener('mousemove', e => {
      if (this._dragHandleIndex < 0 || this._selectedLoopIndex < 0) return;
      const p = this._canvasPoint(e);
      const loop = this._importedLoops[this._selectedLoopIndex];
      if (!loop) return;
      loop.points[this._dragHandleIndex] = p;
      this._refreshImportedLoop(loop.points, false);
    });

    window.addEventListener('mouseup', e => {
      if (this._dragHandleIndex >= 0) {
        this._dragHandleIndex = -1;
        this._capture.setEnabled(!this._redrawSectionMode);
      }
    });
  }

  _canvasPoint(e) {
    const r = this._drawCanvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  _distanceToPolyline(p, pts) {
    let best = Infinity;
    for (let i = 1; i < pts.length; i++) {
      best = Math.min(best, this._pointSegmentDistance(p, pts[i-1], pts[i]));
    }
    return best;
  }

  _pointSegmentDistance(p, a, b) {
    const abx = b.x - a.x, aby = b.y - a.y;
    const apx = p.x - a.x, apy = p.y - a.y;
    const ab2 = abx*abx + aby*aby || 1;
    let t = (apx*abx + apy*aby) / ab2;
    t = Math.max(0, Math.min(1, t));
    const qx = a.x + abx*t, qy = a.y + aby*t;
    return Math.hypot(p.x - qx, p.y - qy);
  }

  _currentEditHandles() {
    const loop = this._importedLoops[this._selectedLoopIndex];
    return loop ? loop.points : [];
  }

  _initToggles() {
    const bind = (id, layerOrAction) => {
      const el = document.getElementById(id);
      const cb = el.querySelector('input');
      el.addEventListener('click', () => {
        cb.checked = !cb.checked;
        el.classList.toggle('active', cb.checked);
        if (typeof layerOrAction === 'string') {
          this._visualizer.setLayerVisible(layerOrAction, cb.checked);
        } else {
          layerOrAction(cb.checked);
        }
      });
      if (cb.checked) el.classList.add('active');
    };

    bind('toggle-smoothed', 'smoothed');
    bind('toggle-sampled',  'sampled');
    bind('toggle-hotspots', 'hotspots');
    bind('toggle-surface',  visible => {
      this._surfaceContainer.classList.toggle('visible', visible);
      const rotateOn = document.querySelector('#toggle-rotate input').checked && visible;
      this._setRotateMode(rotateOn);
    });
    bind('toggle-plane', visible => {
      this._surface.setPlaneVisible(visible);
    });
    bind('toggle-rotate', visible => {
      const surfaceOn = document.querySelector('#toggle-surface input').checked;
      const active    = visible && surfaceOn;
      this._setRotateMode(active);
      this._setStatus(active ? 'Rotate mode — drag to orbit, wheel to zoom.' : 'Rotate mode disabled.');
    });
    bind('toggle-probes', visible => {
      if (visible && this._seed) this._probes.run(this._seed.arcLengthSampledPoints);
      else this._probes.stop();
    });
  }

  _setRotateMode(active) {
    this._surfaceContainer.classList.toggle('interactive', active);
    this._surface.setInteractive(active);
    this._drawCanvas.style.pointerEvents    = active ? 'none' : 'auto';
    this._drawCanvas.style.cursor           = active ? 'default' : (this._redrawSectionMode ? 'cell' : 'crosshair');
    this._previewCanvas.style.pointerEvents = 'none';
    this._overlayCanvas.style.pointerEvents = 'none';
  }

  _initButtons() {
    const fileInput = document.getElementById('file-image');
    document.getElementById('btn-upload-image').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async e => {
      const file = e.target.files && e.target.files[0];
      if (file) await this._uploadImage(file);
      fileInput.value = '';
    });
    document.getElementById('btn-clear-image').addEventListener('click', () => this._clearImage());
    document.getElementById('btn-edit-points').addEventListener('click', e => {
      this._editPointsMode = !this._editPointsMode;
      e.currentTarget.classList.toggle('active', this._editPointsMode);
      this._visualizer.drawEditHandles(this._editPointsMode && this._selectedLoopIndex >= 0 ? this._importedLoops[this._selectedLoopIndex].points : null);
      this._capture.setEnabled(!this._editPointsMode);
      this._setStatus(this._editPointsMode ? 'Edit points mode — drag control points.' : 'Edit points mode off.');
      this._drawCanvas.style.cursor = this._editPointsMode ? 'move' : (this._redrawSectionMode ? 'cell' : 'crosshair');
    });
    document.getElementById('btn-redraw-section').addEventListener('click', e => {
      this._redrawSectionMode = !this._redrawSectionMode;
      e.currentTarget.classList.toggle('active', this._redrawSectionMode);
      this._capture.setEnabled(!this._editPointsMode);
      this._drawCanvas.style.cursor = this._redrawSectionMode ? 'cell' : (this._editPointsMode ? 'move' : 'crosshair');
      this._setStatus(this._redrawSectionMode ? 'Redraw section mode — draw replacement section across selected loop.' : 'Redraw section mode off.');
    });
    document.getElementById('btn-clear').addEventListener('click', () => this._clear());
    document.getElementById('btn-run-probes').addEventListener('click', () => { if (this._seed) this._probes.run(this._seed.arcLengthSampledPoints); });
    document.getElementById('btn-export').addEventListener('click', () => { if (this._seed) this._exportJSON(); });
    document.getElementById('btn-send').addEventListener('click', async () => { if (this._seed) await this._sendSeed(); });
  }

  _initResize() {
    window.addEventListener('resize', () => {
      this._resizeCanvases();
      this._surface.resize(this._drawCanvas.width, this._drawCanvas.height);
      if (this._imageImporter.hasImage()) this._imageImporter._displayRect = null;
    });
  }

  async _handleStroke(rawPoints) {
    if (this._redrawSectionMode && this._selectedLoopIndex >= 0 && rawPoints.length >= 2) {
      this._applyRedrawnSection(rawPoints);
      return;
    }
    this._processCurve(rawPoints);
  }

  _processCurve(rawPoints) {
    this._setStatus('Processing curve...');
    this._log(`Stroke captured: ${rawPoints.length} raw points`, 'info');

    const result = this._processor.process(rawPoints);

    this._provenance.reset();
    this._provenance.recordRaw(result.raw);
    this._provenance.recordSmoothed(result.smoothed);
    this._provenance.recordSampled(result.sampled);
    this._provenance.recordClosure(result.closureGap);
    this._provenance.recordResamplingError(result.resamplingError);

    this._updateStats({ raw: result.raw.length, sampled: result.sampled.length, arclen: this._arcLength(result.sampled), gap: result.closureGap });

    this._visualizer.drawRaw(result.raw);
    this._visualizer.drawSmoothed(result.smoothed);
    this._visualizer.drawSampled(result.sampled);

    this._surface.build(result.sampled);

    const { candidates, rejected } = this._detector.detect(result.sampled);
    this._provenance.recordHotspots(candidates, rejected);
    this._visualizer.drawHotspots(candidates);
    this._updateHotspotList(candidates);

    this._seed = this._compiler.compile(this._provenance.get());
    document.getElementById('stat-hotspots').textContent = candidates.length;
    document.getElementById('btn-export').disabled = false;
    document.getElementById('btn-send').disabled   = false;

    this._setStatus(`Ready — seed ${this._seed.manifoldSeedId}`);
  }

  async _uploadImage(file) {
    try {
      this._setStatus('Loading image...');
      await this._imageImporter.setFile(file);
      document.getElementById('btn-clear-image').disabled = false;
      this._log(`Image loaded: ${file.name}`, 'info');
      this._setStatus('Detecting loops...');
      this._importedLoops = await this._imageImporter.detectLoops();
      this._selectedLoopIndex = this._importedLoops.length ? 0 : -1;
      this._visualizer.drawImageLoops(this._importedLoops.map(l => l.points), this._selectedLoopIndex);
      if (this._selectedLoopIndex >= 0) {
        document.getElementById('btn-edit-points').disabled = false;
        document.getElementById('btn-redraw-section').disabled = false;
        this._log(`Detected ${this._importedLoops.length} loop(s); auto-selected largest.`, 'info');
        this._refreshImportedLoop(this._importedLoops[this._selectedLoopIndex].points, false);
      } else {
        this._setStatus('No closed loops detected.');
        this._log('No loops detected in image.', 'warn');
      }
    } catch (err) {
      this._log(`Image loop detection failed: ${err.message}`, 'error');
      this._setStatus(`Image detection failed: ${err.message}`);
    }
  }

  _clearImage() {
    this._imageImporter.clear();
    this._importedLoops = [];
    this._selectedLoopIndex = -1;
    this._editPointsMode = false;
    this._redrawSectionMode = false;
    document.getElementById('btn-clear-image').disabled = true;
    document.getElementById('btn-edit-points').disabled = true;
    document.getElementById('btn-redraw-section').disabled = true;
    document.getElementById('btn-edit-points').classList.remove('active');
    document.getElementById('btn-redraw-section').classList.remove('active');
    this._visualizer.drawImageLoops([], -1);
    this._visualizer.drawEditHandles(null);
    this._drawCanvas.style.cursor = 'crosshair';
    this._capture.setEnabled(true);
  }

  _refreshImportedLoop(rawPoints, logMsg = true) {
    this._visualizer.drawImageLoops(this._importedLoops.map(l => l.points), this._selectedLoopIndex);
    this._visualizer.drawEditHandles(this._editPointsMode ? rawPoints : null);
    if (logMsg) this._log('Imported loop loaded into drawing pipeline.', 'info');
    this._processCurve(rawPoints);
  }

  _applyRedrawnSection(strokePoints) {
    const loop = this._importedLoops[this._selectedLoopIndex];
    if (!loop) return;
    const startIdx = this._nearestIndex(loop.points, strokePoints[0]);
    const endIdx   = this._nearestIndex(loop.points, strokePoints[strokePoints.length - 1]);
    let a = Math.min(startIdx, endIdx), b = Math.max(startIdx, endIdx);
    loop.points = [...loop.points.slice(0, a), ...strokePoints, ...loop.points.slice(b + 1)];
    if (Utils.dist(loop.points[0], loop.points[loop.points.length - 1]) > 2) loop.points.push({ ...loop.points[0] });
    this._log(`Redrew section from control ${startIdx} to ${endIdx}.`, 'info');
    this._refreshImportedLoop(loop.points, false);
  }

  _nearestIndex(points, target) {
    let best = 0, bestD = Infinity;
    for (let i = 0; i < points.length; i++) {
      const d = Utils.dist(points[i], target);
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }

  async _sendSeed() {
    this._setStatus('Sending seed to backend...');
    this._log(`POST ${CONFIG.backend.endpoint} — ${this._seed.manifoldSeedId}`, 'info');
    const result = await this._transport.submitSeed(this._seed);
    if (!result.ok) {
      this._log(`Transport error: ${result.error}`, 'error');
      this._setStatus(`Send failed: ${result.error}`);
      return;
    }
    this._log(`Backend: ${result.data.status} — ${result.data.manifoldId}`, 'info');
    this._setStatus(`Manifold compiled: ${result.data.manifoldId}`);
    this._responseHandler.handle(result.data);
  }

  _clear() {
    this._capture.clear();
    this._capture.setEnabled(true);
    this._livePreview.clear();
    this._visualizer.clear();
    this._probes.stop();
    this._provenance.reset();
    this._seed = null;
    this._manifoldId = null;
    this._clearImage();
    document.getElementById('btn-export').disabled = true;
    document.getElementById('btn-send').disabled = true;
    document.getElementById('hotspot-list').innerHTML = '';
    document.getElementById('section-descriptor').style.display = 'none';
    this._updateStats({ raw: '—', sampled: '—', arclen: '—', gap: '—' });
    document.getElementById('stat-hotspots').textContent = '—';
    this._setStatus('Draw a closed loop to begin.');
    this._log('Workbench cleared.', 'info');
  }

  _exportJSON() {
    const blob = new Blob([JSON.stringify(this._seed, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${this._seed.manifoldSeedId}.json`;
    a.click();
    URL.revokeObjectURL(url);
    this._log(`Exported ${this._seed.manifoldSeedId}.json`, 'info');
  }

  setManifoldId(id) { this._manifoldId = id; }
  updateDescriptorPanel(descriptor) {
    const section = document.getElementById('section-descriptor');
    const panel   = document.getElementById('descriptor-panel');
    section.style.display = 'block';
    const rows = [
      ['ID', descriptor.manifoldId],
      ['Topology', descriptor.topologyType],
      ['Backend', descriptor.backendType],
      ['Dimension', descriptor.intrinsicDimensionality],
      ['Gates', descriptor.gateCount],
      ['Arc length', descriptor.totalArcLength ? descriptor.totalArcLength.toFixed(2) : '—']
    ];
    panel.innerHTML = rows.map(([label,val]) => `<div class="descriptor-row"><span>${label}</span><span>${val ?? '—'}</span></div>`).join('');
  }
  updateProvenance(summary) { this._log(`Provenance: derivedFrom=${summary.derivedFrom}, gates accepted=${summary.hotspotCandidatesAccepted}`, 'info'); }

  log(msg, level='info') { this._log(msg, level); }
  setStatus(msg) { this._setStatus(msg); }

  _arcLength(pts) {
    let len = 0;
    for (let i = 1; i < pts.length; i++) len += Utils.dist(pts[i-1], pts[i]);
    return Math.round(len);
  }

  _updateStats({ raw, sampled, arclen, gap }) {
    document.getElementById('stat-raw').textContent = raw;
    document.getElementById('stat-sampled').textContent = sampled;
    document.getElementById('stat-arclen').textContent = typeof arclen === 'number' ? arclen + 'px' : arclen;
    document.getElementById('stat-gap').textContent = typeof gap === 'number' ? gap.toFixed(1) + 'px' : gap;
  }

  _updateHotspotList(candidates) {
    const list = document.getElementById('hotspot-list');
    list.innerHTML = '';
    if (candidates.length === 0) {
      list.innerHTML = '<div class="hotspot-item">none detected</div>';
      return;
    }
    for (const h of candidates.slice(0, 20)) {
      const div = document.createElement('div');
      div.className = 'hotspot-item';
      div.innerHTML = `(${Math.round(h.x)}, ${Math.round(h.y)}) <span>i=${h.intensity.toFixed(2)}</span>`;
      list.appendChild(div);
    }
  }

  _setStatus(msg) {
    document.getElementById('status-msg').textContent = msg;
  }

  _log(msg, level='info') {
    const area = document.getElementById('log-area');
    const line = document.createElement('div');
    line.className = `log-line ${level}`;
    const ts = new Date().toTimeString().slice(0, 8);
    line.textContent = `[${ts}] ${msg}`;
    area.appendChild(line);
    area.scrollTop = area.scrollHeight;
  }
}


// ============================================================
// BOOT
// ============================================================

window.addEventListener('DOMContentLoaded', () => {
  window._workbench = new Workbench();
});

</script>
